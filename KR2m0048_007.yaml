body:
  text: 荒政叢書卷七湖廣布政司參議俞森撰魏禧救荒策天災莫過于荒天災之可以人事救之亦莫過于荒古之行荒政言荒策者不一有永利者有利用一時不可再用者有可行者有言之足聽行之不必效者要或散見諸記籍中未有統要余托所見聞擇其可常行無弊者條之救荒之策先事為上當事次之事後為下先事者米價未貴百姓未饑吾有策以經之四境安飽而吾無救荒之名所謂美利不言是也當事者米貴而未盡民饑而未死有策以濟而民無所重困所謂急則治標是也事後者米已乏竭民多殍死遷就支吾少有所全活所謂害莫若輕是也凡先事之策八當事之策二十有八事後之策三先事之策一曰重農農者粟之本或興屯田或修水利或賑貸牛種或親行田野勸相或分督里役地方謫舉游惰或開墾荒之法而首在不以工役妨農時不以獄訟擾農家如此則農事舉矣一曰立義倉貧民富民多不相得富者欺貧貧者忌富貧民閒時已欲見事風生一迫饑饉則勢必為亂初則搶米再之劫富再之公然嘯聚為賊富民目前受貧民之害貧民日後受官府之刑兵刃之慘真貧富兩不得益也所以朱子修舉社倉不特救一時餓殍實所以保富全貧護人身家養人亷恥為法至善今師其意而少損益之凡每坊設立義倉不必分派若干家若干人隨其相附近處擇便為之聽民自議自行則衆情和矣但建倉費重或勸富民或設處公費隨時斟酌此在官長以真心勤力行之凡欲立義倉先集父老士民懇切開諭以義倉之利身先捐俸以勸富室然後出示逺近令十日內報命凡報命者合坊具連名呈一紙內稱遵諭設立義倉共計户丁若干出穀者若干舉值事者一正二副某人造册二本一丁册一義穀出入册凡丁册不論男婦貧富貴賤皆載之呈及二册官皆用印旋給本坊收掌其官所助穀若干照各坊丁數多少派貯倉內舊册寫完則仍以新造之册送官用印坊中有富豪慳吝不肯助義者許本坊呈官視所應出者加罰三等所舉值事之人有不法不公者本坊呈官重罰公舉他人代之或本人有病故久出者仍簽他人代之俱要呈官其呈仍用印付還或坊中事繁三人不能理許值事人隨簽幾人幫之本坊俱要酌處公費以酬其勞至義穀出入之數官府不預只于當發糶時先期出示令各坊清核丁數定于某日糶米官府時行巡訪于當收糴之時先期出示以某日起糴穀至某日報完踰期不完者以缺穀多少議罰凡坊內與糴者設簽一根寫尸首姓名下注共計幾口糴米時左設一人散簽右設二三人量米來糴者先將名下應糴米錢若干交左人領簽即將簽投右人照簽領米散米已完右人繳簽交左人收明日如之富室及僮婢皆許與糴凡糶米如原價每升一分今價三分則取分六釐二分則取分四釐分半則取分二釐分二釐則取一分升一分則不出陳矣蓋酌取餘息以供耗折及修倉雜用諸費也凡石斛升斗之類皆一聽官造日久器壞許如法私造仍送官驗押蓋以賞罰之權歸于官則人知所畏以出入之數歸于民則官無可私所謂官民相制其法無弊者也造倉之法如係五間只以四間貯穀空閒一間以便搬移倉穀防整倉及新穀發熱等事法詳治譜可按而行之湯念平先生勸積義穀序曰民窮日甚借貸無門一有災荒坐而待斃昔朱文公社倉一法最為盡善然時詘舉贏實為難事宜師其意而力行之為積義穀法每坊造一木匱置本坊神廟每月朔望謁廟者各持義穀少許或一角或半升或一升至小斗而止勿得過多不願助者聽隨其意而因其力不相強也數少而不欲多者相形則意沮力輕則可久也共推一端謹者司登記雖一角半升必紀其名以彰好義推一稍有恆産而素行忠信者司出入每朔望迄晚即將貯匱者登倉次年春夏推陳出新因數多寡貸與農人息取加二小荒則以貸諸貧人而減其息必公議而酌行之若大荒則盡捐以賑困窮必計衆而均分之先其老弱之無告及孝子節婦之貧者是舉也専以備荒而利農他雖公事急需不得輕移以致耗散有恃強而索者衆共持之不聽則控諸官庶幾可久行而不廢夫為數甚少則人皆樂助月月積之嵗嵗行之斯可無大饑之患矣噫省目前宴飲之費即可蘇異日數人之命減一月雞鵝之粟即可救他年同類之生獨何憚而不為哉又募義穀疏云里中親友夀誕稱觴當共計其費出義穀欲為人稱觴者亦計其費出之或宴㑹有不可已者則薄其費而以義穀補之夫省酒食之浮費以利濟饑貧此祝夀之上術也又有疾病及一切祈求亦于神廟發願出義穀若干夫省齊醮之虛文以利濟饑貧此祈神之上術也蓋天地鬼神原以愛人為心能愛人者則彼亦愛之以此祝夀夀必永以此祈福病必愈以此祈名利子息名利子息必得矣按二條法最簡妙能濟義倉之窮故備記之黃存齊曰畜馬乘不察于雞豚士大夫而積穀髙價以病小民可乎朝廷當為禁律凡已出仕田滿五百石者穀貴出糶止許依秋成原價每擔酌取倉耗三分于已無損于人有益若乘風髙價者治如違例放債之罪按此意只可勸諭鄉紳富民聽其自行賢士大夫身為之倡未可以法繩人也一曰設寨堡義倉之法仍當勸諭鄉落行之或一鄉自建一所或數鄉共建一所其事概聽之鄉人而官府第頒式勸成而已但鄉落中無城郭足恃或有兵寇騷擾則義穀蕩耗斷難復聚當令各鄉于附近之山有險足恃者因以為寨無寨者為堡而置義倉其中有急則并婦女牲畜衣服器用徙居之蓋寨堡之設可以固生聚可以保義倉可以行清野之法以困敵所謂一舉而三善備者也彭躬庵曰設寨堡最利鄉落更可以保護城邑而險不為賊據此從來救荒策中所無一曰酌逺糶之禁本地産穀有足支數年者以逺方糴運過多遂致産穀之地頓成餓殍然概禁逺糶則一方粟死一方金死交困之道也當于收成時出示諭民凡收穀者自計兩年口食以外每穀十石糶五石支用存五石備荒又為酌視時價貴賤以為啓閉如僅滿地方常價聽其搬糶過常價三分之一外則不得糶逺違者籍穀入官分給義倉至新穀收成已完則舊穀任糶矣一曰嚴游民之禁百姓不謀生業者宜置常罰令鄉耆鄰里時簡舉之蓋游手好閒之人如米中蠧蟲饑饉之時死亡猶甚多至為盜賊者若督令務生則自可生財有養身之具矣然欲耆里簡舉而不實心行鄉約保甲之法未易辦也一曰制穀贖罪凡有罪犯情理可原者一照買穀備賑銀數輸穀不令輸銀其穀分寄各坊義倉值事者具領狀交官俟賑糶時如數取出以施最窮苦無告之人或米或粥視米多少可也蓋義倉雖以周貧然須有糴米本錢則鰥寡孤獨一文不辦者盡餓死矣但施米仍當責成各坊值事每日清早糶米飯後施米仍效義倉領簽例令各來報名每人寫一票給之為據領票領米一如義倉但不須交錢耳蓋事歸一人則坊人姓名已熟虛實盡知自不至于混領若以事歸官府另簽胥役行之為弊不可勝言一曰豫糴凡地方遇有水旱便當實稽境內人丁核境內穀粟扣算缺少若干即多方那處遣富商豫往穀多處買之蓋有水旱則必有饑荒若臨饑方議他糴便難措手且米價亦必踊貴也一曰教别種地方遇有水旱種植必不得時即須先察地利如水多害禾則急以不忌水者種之旱久害禾則急以不畏旱者種之失彼得此尚可支持其半大抵以先時急做為勝著也當事之策一曰留請上供之米地方大饑或有本地應解糧米及他處經過米船不妨權留賑濟然後申報秋熟即行糴償在朝廷不過緩數月之糧在百姓即活數十萬人之命雖以専制賈罪又何傷哉一曰借庫銀轉糴地方大饑欲他買又苦無銀不妨那借庫中錢糧糴賑從容設處以償擇平日衆推誠實能幹百姓任其事或仍勸富民自販開以薄利使之樂趨一曰權折納之宜時當凶災擇荒熟相應處以荒處折納之價于熟處和糴則荒處不至太貴熟處不至太賤兩利之道也凡為守令權不自主者則申請上司行之他准此一曰捐俸勸賑地方大饑有司當以至誠開諭勸富民賑濟或減價出糶或竟行施豫然本官須先捐俸倡義庶幾不令而行一曰重賑穀之勸饑饉時有能大出粟以賑者或聞于朝廷加以官號或請于上司給其冠帶扁額以示酬勸一曰興作利民之務地方大饑窮民多無生業此時或修橋路或濬水利種種必不可已之務當概為修理窮民借力作以資生而我又因以興利一舉兩得之道也一曰勸富室興土木舉庶禮地方大饑宜勸富室營造土木及一切當行之禮使貧民得以資生蓋損富而富實未損益貧而貧不虛益勸諭時當以三利歆動之一則成吾欲為之事一則借此賑貧有大陰德一則貧民樂業不至為盜富室所益更多矣一曰均糴米數既貴富者得以多糴則貧者益少每日市糴當依每家丁口為準人口少者不得多糴則米穀均矣一曰嚴閉糴之法富民擁有多粟除本家口食外餘至百石以上閉糴専利者許人告發官府盡籍穀賑貧告虛者反坐蓋彼所利在多得米價今并米本失之其閉糴者鮮矣溫伯芳曰吾邑荒少而穀常踊貴弊不在富户而在鋪户鋪户閉糶而後價忽髙鋪户得髙價富户之價愈髙總之寧民家無杵臼皆糴于市鋪户遂操其重昔葉令公名向榮金華人處之極善每早巡行各街米户不出糶者杖數十於是鋪户欲髙其價不得而富户知市價如常各競出糶矣蓋公稔知此時非有水旱兵凶之災客嵗之入如常何以來嵗之供不足不過雨暘偶愆何至舊穀頓盡至于閉市乎按此須實知境內穀多乃可行不可執為定法一曰重強糴之刑時方大饑民易生亂若縱其強糴則有穀者愈不肯糶四方客粟聞風不來立饑死矣且強糴不禁勢必搶奪搶奪勢必虜殺當著為令曰有不依時價強糴一升者即行梟首蓋彼原欲少取便宜今並身命而亡之其強糴者鮮矣或謂閉糴自百石以上強糴自一升以上閉糴者止于籍穀而強糴者遂至殺身輕重不太懸乎曰閉糴之人雖不仁猶不過専自有之利強糴則是妄取他人罪自不同况閉糴者少強糴者多乎彭躬庵曰此法須不動聲色使百姓曉然知殺一人乃可以生衆人始不激變一曰不降米穀之價米方大貴有司樂于市恩動輒降減米價以博小民一時歡心不知米價減則富户不樂糶而四方客米亦不來矣惟當聽民間自消自長粟貴金賤人爭趨金米價不降自減也或謂古人有遇饑輒增米價而米賤者其法可行乎曰此非一定可行之法也萬一我增米價而客米一時不來彼貧民能當許久重價乎大抵地方富饒所缺止在于食則不妨增價以招客粟若地多貧民此法恐不可行止一不降米價尚為穩著一曰核户口時當饑荒須先詳核户口若干扣算賑糴之穀若干賑濟之穀若干每丁應得若干先有定局則無不均之患而設處之方可早謀矣一曰無失期不論賑糶賑施俱當先期四處張示的于某時舉行不可遲誤失期有辜人心且虛勞小民奔走一曰定鄉城分給之法凡賑糶賑施每日一給則太煩而小民易荒生業至鄉落尤難行矣當先定為令曰凡城市每給五日鄉落三十里內者每給十日三十里外者每給半月或謂鄉落路逺當每給兩月曰每給兩月為數太多小民不知逺計多穀在手便不撙節甚至以易酒肉者有之到甕盡杯乾時不束手待斃又邪思生亂矣或謂貧民無資必待每日生理方可得糴此條只可行于賑施不可行于賑糴當酌其無弊可也一曰多置給米之地給米須多設處所派定某關某處給某關某處給則不至捱擠失序一曰編户丁牌領米最易爭擠多至混數若倣義倉領簽又人多難行當照户編牌如考試例循次領給則諸弊俱無矣其牌每户止寫丁首一人一曰慎擇給米之人主管給米最要得人須平日實訪其人公平亷能者方可屬事每處擇一善耆主之又聽其各擇一二人為副必不可令衙役與事也一曰不時巡訪任縱得人未必一一皆當有司于給米時當不時出訪或東或西或詳或略或隨手取米以驗美惡或隨喚領米人驗剋減與否至于出訪或輕車或緩步不可盛列騶從使人得為備一曰别賞罰不時巡訪則任事者之賢否見而賞罰可行矣有公平亷能者則重賞之或優以冠帶或旌以財帛隨其功之大小可也有奸貪私剋者則重罰之或加刑或罰穀隨其罪之輕重可也至于無他罪犯止是才力不濟不能處分條理者則無賞無罰下次不復簽用而已一曰暫省衙門役期時方大饑衙役工食多不足贍此時當減其半役使之營生如舊例一月供役十日今止取五日一曰清獄饑饉時平民已難治生獄囚死者八九矣清獄宜分三等輕者竟釋之次者限親鄰保結俟穀熟時冉拘大罪重犯囚而少賑之一曰禁訟大荒之時治生不暇况治訟乎凡除人命賊情搶虜外一切財産㛰姻等訟概不准告已告者概停不行一曰弛稅禁山澤市貨等利法有禁者此時宜暫弛稅弛禁廣其營生之路至穀熟時復舊一曰修街道街道汚穢易生疾病荒疫相因尤不可不慎故當修潔街道以防其漸一曰收棄子饑民有棄置子女道路者許人收養凡收養者具呈至官云某年某月某日于某處收得子女幾人歸家撫養官為用印給之太平長大一聽收主照管本生父母不得爭執其收主願贖者聽或能收養自幾人以上者官府為立賞格勸之一曰贖重罪重罪無贖之理然能多出穀救荒則雖枉法以生一人而實救數千百人之死亦權道也當分别重罪如泛常人命事則許贖若劫殺真賊及人倫大變之犯則不可贖更舊冬以前人命可贖本年所犯則不可贖恐富人乘機報復故也一曰收買民間草薪衣服器用饑荒之時貧民多賣衣服器用以給食而富民乘人之急甚至損價十之九者此時官府宜那移錢糧設人收買使貧民不至大虧則謀生之路寬矣秋冬間仍行發賣便可補數至于草薪之類亦當于此時收買俟寒雨賣之仍可得利此古人已行之效一曰多置空所以處流民而嚴其法大荒之時有他郡流民走徙就食者若處之不得其道則流民立死且或生亂有司當擇寺觀公廨一切空所分别安插每處設一人管其事立法以繩之諸如卧所有定出入有時領米有敘若亂法者初犯三日不給糧再犯逐出境外其有休養壯健者則令執工役之事或雇募民間便不許坐食矣事後之策一曰施粥饑荒已極不能賑米當設法施粥施粥須因里設厰若勞其逺行恐半塗仆斃又須立人監理令饑民至者隨其先後來一人則坐一人後至者坐先至之下已坐者不許再起一行坐盡又坐一行以面相對以背相倚空其中路可令擔粥人行走坐至正午擊梆一通髙唱給第一次食令人次序輪散有速食先畢者不得混與一次散訖然後擊梆二通髙唱給第二次食如前法共三次即止蓋久饑之人腸胃枯細驟飽即死惟饑民中稱有父母妻子卧病在家者量行給與攜歸處分已訖方令散去散去之法令後至坐外者先行挨次出厰庶不擁擠踐踏又多人羣聚易于穢染生病須多置蒼术醋碗薰燒以逐瘟氣又不時察驗嚴禁管粥者剋米將生水攙稀食者暴死其碗箸各令饑民自備按米多亦不得施飯久饑食飯有立死者一曰施藥賑粥或不能多服藥亦可免死當多合救饑丸以周給之亦不得己之極思也諸經驗奇方另載一曰葬殍餓殍載塗穢戾之氣易生病疾當隨時收葬或為大坑叢埋亦補救之一端也魏禧曰古稱救荒無奇策要凡天下之策未有奇者因時制事世人不能行而獨行之則謂之奇耳是編多輯古人成法間以意損益之然一人耳目有盡心思有所不及又或自擬良法行之不能無弊者增美去惡以成萬世萬民之利是在後之君子矣荒政叢書卷七
