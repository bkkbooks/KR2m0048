body:
  text: 荒政叢書卷八湖廣布政司參議俞森撰常平倉考齊管仲相桓公通輕重之權曰嵗有凶穰故穀有貴賤令有緩急故物有輕重人君不理則蓄賈游于市乘民之不給百倍其本矣萬乘之國必有萬金之賈千乘之國必有千金之賈者利有所并也國多失利則臣不盡忠士不盡死矣計本量委則足矣然而民有饑餓者穀有所藏也民有餘則輕之故人君斂之以輕不足則重之故人君散之以重凡輕重斂散之以時即準平守準平使萬家之邑必有萬鍾之藏藏鏹千萬千室之邑必有千鍾之藏藏鏹百萬春以奉耕夏以奉耘耒耜器械種饟糧食必取贍焉故大賈蓄家不得豪奪吾民矣桓公問于管仲曰終身有天下而勿失為之有道乎對曰國之廣狹壤之肥磽有數終嵗食餘有數守國者守穀而已故善為天下者謹守重流而天下不吾洩矣請以令發師置屯籍農國貧而用不足以價取之則積藏囷窌之粟皆歸于君矣是故天下有兵則積藏之粟足以備其糧天下無兵則以賜貧甿若此則内守國財而外固天下矣吕祖謙曰古之荒政以三十年之通制國用則有九年之畜遇嵗有不登為人主者則貶損減省喪荒之式見于小行人之官札喪凶荒厄窮為一書當時天下各自有廩藏所遇凶荒則賑發濟民而已當時斂散輕重之式未嘗講到春秋一不登則乞糴于鄰國所謂九年之制已敗壊管子輕重一篇不過君民互相攘奪已非君道到後來斂散之權又不能操奸民幸凶年以害民至五代括民粟不出粟者死與斂散之法又殆數等矣李悝為魏文侯作盡地力之教以為地方百里提封九萬頃除山澤邑居三分去一為田六百萬畆治田勤謹則畆益三斗不勤則損亦如之地方百里之増减輒為粟百八十萬碩矣又曰糴甚貴傷人甚賤傷農人傷則離散農傷則國貧故甚貴與甚賤其傷一也善為國者使人無傷而農益勸今一夫挾五口治田百畆嵗収畆一碩半為粟百五十碩除十一之稅十五碩餘百三十五碩食人月一碩半五人終嵗為粟九十碩餘有四十五碩碩三十為錢千三百五十除社閭嘗新春秋之祠用錢三百餘千五十衣人率用錢三百五人終嵗用千五百不足四百五十不幸疾病死喪之費及上賦斂又未與此此農夫所以常困有不勸耕之心而令糴至于甚貴者也是故善平糴者必謹觀嵗有上中下熟上熟其収自四餘四百碩平嵗収百五十石大熟収四倍有六百石除食用二百石則餘四百石中熟自三餘三百碩下熟自倍餘百碩小饑則収百碩中饑七十碩大饑三十碩故大熟則上糴三而舍一中熟則糴二下熟則糴一使人適足價平則止小饑則發小熟之所斂中饑則發中熟之所斂大饑則發大熟之所斂而糶之約如其数發之非謂小熟之所斂必待小饑而發大熟之所斂必待大饑而後發也故雖遇饑饉水旱糴不貴而人不散取有餘以補不足也行之魏國國以富強馬端臨曰管仲之意兼主于富國李悝之意専主于濟民管仲言人君不理則畜賈游于市乘民之不給百倍其本此則桑孔以來所謂理財之道大率皆宗此說然山海天地之藏闗市物貨之聚而豪強擅之則取以富國可也至于農人服田力穡之贏餘上之人為制其輕重時其斂散使不以甚貴甚賤為患乃仁者之用心若諉曰國家不取必為兼并所取遂斂而不復散而資以富國誤矣董煟曰今之和糴其弊在于籍數定價且不能視上中下熟故民不樂與官為市最患者胥吏為奸交納之際必有誅求稍不滿欲量折監賠之患紛紛而起故糴買之官不得不低價滿量豪奪于民以迯曠責是其為糴也烏得謂之和哉至于巳糴之後又不能以新易陳馴致積為埃塵而民間之米愈少也漢宣帝時嵗數豐穰穀至石五錢農人少利大司農耿夀昌言故事嵗漕闗東穀四百萬斛以給京師用卒六萬人宜糴三輔𢎞農河東上黨太原郡穀足供京師可省闗中漕卒過半又令邊郡皆築倉以穀賤時增其價而糴以利農穀貴時減價而糶以利民名曰常平倉民便之董煟曰漢常平止立于北邊李唐之世亦不及江淮以南惟宋常平法徧天下丘濬曰常平法非不善然年之豐歉不常穀之種類不一或連嵗皆歉或此種熟而彼種不収茍其斂散之際非斟酌而上下之其法將有時而不平者矣惟今江北之地地可窖藏雜種五穀宜倣此法于要害處立常平司専差户部屬官往莅其事隨其熟而収其物不必専其地因其時而予之價不必定于官視年豐歉隨時糶糴立倉用夀昌之名斂散用李悝之法庶乎其可也陳龍正曰百物之值以米為主常平不惟能平米價米價平諸食貨之價概不過昻過昻則人不食之矣米不得不食而他物可以不食故常平倉者兼平百物者也𢎞羊作平準欲平百物而愈不得平惟平米穀則他物自平本末異操也利上與利下異心也人臣主于利民國之寶也主于利國國之賊也𢎞羊者李悝之罪人也蔡懋德曰或嫌官與民為市必當減價以糶不知減價之名徒致争鬨孰若稍収㣲息多儲新米米多則價自減糶平則人不争為更便乎蓋貴設法使米有餘不在減省錙銖見德也元帝初天下大水闗東諸郡尤甚二年齊地饑穀石三百餘民多餓死瑯琊郡人相食在位諸儒多言鹽鐵官及北假田官常平倉可罷毋與民争利上從之陳龍正曰常平原以平糴乃紳縮其權以利民非争民利也元帝聴諸儒議因荒嵗罷之豈嵗荒因設常平之所致乎恐此後民饑益失所賴矣唐趙贊云自軍興而常平廢垂三十年民遇荒輒斃頃兩京置常平雖遭水旱米不騰貴德宗遂令天下皆修復之觀此則常平不惟盛時宜建即荒迫中稍有隙暇餘資便應料理惟在上人節縮浮費以為糴本耳何漢儒之愚乎應撝謙曰穀石三百人至相食常平倉何在不過吏以為市龍㫁漁利耳此其所以可罷也後漢作常滿倉立粟市于城東粟斛直錢三十府廩環積旣欲置常平倉議者多以為便劉般言常平外有利民之名而内實侵刻百姓豪右因緣為奸小民不得其平置之不便馬端臨曰般所言即後世常平之弊常平起于孝宣時蓋至東漢而弊已如此矣晉武帝時穀賤而布帛貴立平糴法用布帛市穀以為糧儲泰始二年詔曰古人權量國用取贏散滯有輕重平糴之法理財鈞施惠而不費政之善者也然此事廢久天下希習其宜加以官蓄未廣言者異同未能逺通其制更令國寶散于穰嵗而上不収貧弱困于荒年而國無備豪人富商挾輕貲藴重積以筦其利故農夫苦其業而末作不可禁也北魏孝文帝時祕書丞李彪上封事曰記云國無三年之儲謂國非其國光武以一畆不實罪及牧守聖人之憂世重穀殷勤如彼明君之恤人勸農而相切若此頃年山東饑去嵗京師儉内外人庶出入就豐旣廢營産疲困乃加又于國體實有虚損若先多積穀安而給之豈有驅督老弱糊口千里之外以今况古誠可懼也臣以為宜析州郡常調九分之二京師度支嵗用之餘各立官司年豐糴積於倉時儉則減私之十二糶之於人如此人必事田以買官絹又務貯財以取官粟年登則常積嵗凶則直給又别立農官取州郡户十分之一以為屯人相水陸之宜料頃田之數以賍贖雜物餘財市牛給科令其肆力一夫之田嵗責三十斛蠲其正課並征戍雜役行此二事數年之中則穀積而人足雖災不害隋開皇間衛州置黎陽倉陜州置常平倉華州置廣通倉轉相灌注漕闗東及汾晉之粟以給京師置常平監開皇三年置常平倉粟藏九年米藏五年下濕之地粟藏五年米藏三年著為令董煟曰今之常平義倉多藏米而少藏粟故積久不發化為埃塵非但支移之弊而已唐開元中第五琦請天下常平倉皆置庫以蓄本錢代宗時劉晏為轉運使時兵火之餘百費皆倚辦于晏晏常以厚直募善走者置遞相望覘報四方物價雖逺方不數日皆達使食貨輕重之權悉在握入賤出貴國家獲利四方無甚貴甚賤之病晏𣙜鹽充軍國之用以為官多則民擾故罷鹽官立常平鹽法德宗時趙贊言自軍興以來常平倉廢今京城已置常平倉請推而廣之諸道兼儲布帛絲麻諸道津㑹置吏閲商賈錢每緡稅二十竹木茶漆十之一以贍常平本錢董煟曰常平和糴救荒實政然嘗觀憲宗即位之初有司以嵗豐請畿内和糴當時府縣配户督限迫蹙鞭撻甚于賦稅號為和糴其實害民今之和糴者可不鑒懲此弊乎元和間孟簡言天下常平義倉請準舊例減估出糶但以石數奏申有司更不収管州縣得専以利百姓太和間以天下囘殘錢置常平義倉本嵗増市之非遇水旱不増者判官罰俸以枉法論宋淳化三年京畿大穰分遣使臣于四城門置塲増價以糴景德初詔京東西河北東陜西江南淮南兩浙皆立常平倉計户多寡量留上供錢嵗夏秋視市價貴賤量増減糴糶三年以上不糶即囘充糧廩易以新粟其後荆湖川陜廣南悉置焉唯沿邊州郡不置數年常平積有餘而兵食不足乃命司農寺出常平錢百萬緡助三司給軍費久之數移用畜藏無幾自景祐慶厯中數以賑貸詔不復取常平之積不厚亦以出多入少故耳宋初常平領于司農寺景祐初詔諸路轉運使與州長吏舉所部官専主常平錢粟仁宗初即位乾興元年十二月以京城穀價翔貴出常平倉米分十四塲賤糶以濟貧民慶厯元年十一月以京師穀貴發廩一百萬石減價出糶四年正月詔陜西穀貴其令轉運司出常平倉米減價以糶皇祐三年十二月詔天下常平倉依原糴價糶以濟貧民毋得収餘利以希恩賞景祐二年御史中丞杜衍乞詳定常平制度疏畧曰國家列郡置常平倉所以利農民備饑嵗也然而有名無實者制度不立耳臣以為立制度在乎量州郡之逺邇計户口之衆寡取賤出貴差别其饑熟信賞必罰責課于官吏出納無壅増減有制本息之數勿假以供軍斂導之時禁其争利至于蜀漢狹境交廣寛鄉或通川易地之殊或邊郡巖邑之異各立條教以節盈虚限囘易之嵗時虞其損敗制立典之侵刻督以嚴科則瘠瘦可充饑饉有備也韓琦論自來常平倉遇年嵗不稔物價稍髙合減元價出糶出糶之時令諸縣取逐鄉近下等第户姓名印給闗子令収執付倉毎户糶與三石或兩石唯是坊郭則每日零細糶與浮居之人或五升或一斗故民受實惠未曽見坊郭有物業人户乃來零糴常平斛斗者慶厯二年余靖疏天下無常安之勢無常勝之兵無常足之民無常豐之嵗由是古先聖王守之有道制之有術倘有緩急不可無備伏覩真宗皇帝景德中詔天下以逐州户口多少量留上供錢起置常平倉付司農寺繫帳三司不問出入每年夏秋兩熟準市價加錢収糴其出息本利錢只委司農寺主掌三司轉運司不得支撥自後每遇災傷賑貸使國有儲蓄民免流散者用此術也前三司使姚仲孫今春以來于京東等處借支司農常平錢以給和買雖然借支官錢以充官用循常視之似無妨害若于經逺之謀深所未便臣竊惟真宗皇帝聖慮深逺臣敢梗概言之當今天下金穀之數諸路州軍年支之外悉充上供及别路經費見在倉庫更無餘羨所留常平本錢及斛㪷等若以賑濟饑荒此固常所及矣萬一不幸方隅小有緩急賞給資糧倉卒可備豈非先皇暗以數百萬之資蓄于四方者乎今若先為三司所支則天下儲蓄盡矣伏乞特降指揮三司先借支常平本錢去處並仰疾速撥還今後不得更支撥並依景德元降勅命施行熙寧初王安石新法行以常平錢穀一千四百萬貫石盡散作青苗本錢諸路各置提舉一員以朝官為之勾管一員京官為之右諫議大夫司馬光言常平倉者乃三代聖王遺法非獨李悝耿夀昌能為之也穀賤不傷農穀貴不傷民民賴其食而官収其利法之善者無過于此比來所以隳廢者由官吏不得其人非法之失也今聞條例司盡以常平倉錢為青苗錢又以其穀換轉運司錢是欲盡壊常平専行青苗也國家每遇凶年供軍倉自不能足用固無羨餘以濟饑民所賴者只有常平錢穀耳今一旦盡作青苗錢散之向去若有豐年將以何錢平糴若有凶年將以何穀賙贍乎臣竊聞先帝嘗出内藏庫錢一百萬緡助天下常平倉作糴本前日天下常平倉錢穀共約一千餘萬貫石今無故盡散之他日若思常平之法復欲収聚何時得及此數乎臣以謂散青苗錢之害猶小而壊常平倉之害尤大也元祐初詔提舉官累年積蓄錢穀財物盡樁作常平錢立給斂出息之法下諸路申嚴州縣抑配之禁司馬光言常平之法此乃三代良法也向者有州縣缺常平糴本雖遇豐年無錢収糴又有官吏怠慢厭糴糶之煩雖遇豐嵗不肯収糴又有官吏不能察知在市斛斗實價只信憑行人與蓄積之家通同作弊當収成之時農人要錢急糶故意小估價例令官中収糴不得盡入蓄積之家直至過時蓄積之家倉廩盈滿方始頓添價中糶入官是以農夫糶穀止得賤價官中糴穀常用貴價厚利皆歸蓄積之家又有官吏雖欲趂時収糴而縣申州州申提㸃刑獄提㸃刑獄申司農寺取候指揮比至囘報動涉累月已是失時穀價倍貴是故州縣常平倉斛斗有經隔多年在市價例終不及元糴之價出糶不行堆積腐爛者此乃法因人壊非法之不善也董煟曰常平錢物不許移用謂他費不許移用至于救荒正所當用若必待報則事無及矣今遇災傷去處用常平錢于豐熟處循環収糴以濟饑民俟結局日以糴本撥還常平可也蘇軾奏臣在浙江二年親行荒政只用出糶常平米一事更不施行餘策若欲抄劄饑貧不惟所費浩大有出無収而此聲一布饑民雲集盜賊疾疫客主俱斃惟有依條將常平斛斗出糶即官司簡便不勞抄劄勘㑹給納煩費但得數萬石斛斗在市自然壓下物價境内百姓人人受賜古今之法莫良于此董煟曰軾之法止及城市若使鄉村通行方為良法也况賑濟自有義倉並行不悖乎顔茂猷曰若流民已至則不可執此惟未至餓莩流離時用此最妙陳龍正曰官米多則可握市價之權固也然此僅救中饑中户之一事耳大饑之年下户無錢在手雖減價不能糴是常平之米止及中户偏遺下户也况鄉村之民逺望城市即中户得糴者亦少救荒各隨其時隨其地尤當隨其人以子瞻之慧乃欲執一已當日所為而盡廢諸法不已疎乎董煟謂止及城市又云賑濟自有義倉蓋亦善其論常平之意而譏其不能通于常平之外也李覯論平糴古人有言曰穀甚賤則傷農貴則傷末為農常糶而末常糴也此一切之論也愚以為賤則傷農貴亦傷農賤則利末貴亦利末蓋農不常糶有時而糴也末不常糴有時而糶也以一嵗之中論之大抵斂時多賤而種時多貴矣夫農勞于作劇于病也愛其穀甚于生也不得已而糶者則有由焉小則具服器大則營昬䘮公有賦役之令私有稱貸之責故一穀始熟腰鎌才解而日輸于市焉糶者旣多其價不得不賤賤則賈人乘勢而罔之輕其幣而大其量不然不售矣故曰斂時多賤賤則傷農而利末也農人倉廩旣不盈竇窖旣不實多或數月少或旬時而用度竭矣土將生而或無種也耒將執而或無食也于是乎日取于市焉糴者旣多其價不得不貴貴則賈人乘勢而閉之重其幣而小其量不然則不予矣故曰種時多貴貴亦傷農而利末也農之糶也或闔頃而収連車而出不能以足用及其糴也或倍稱賤賣毁室伐樹不能以足食而坐賈常規人之餘幸人之不足所為甚逸而所得甚饒此農所以困窮而末所以兼恣也易繫辭曰何以聚人曰財理財正辭禁民為非曰義財者君之所理也君不理則蓄賈専行而制民命矣上之澤于是不下流而民無聊矣此平糴之法有為而作也管仲行于齊李悝行于魏耿夀昌行于漢國不失實人獲其利自晉及隋時或興廢厥聞未昭唐天寶中天下平糴殆五百萬斛兹全盛之事也大宋受命將百年矣穀入之藏所在山積平糴之法行之久矣蓋平糴之法行則農人秋糶不甚賤春糴不甚貴大賈蓄家不得豪奪之矣而官之出息常什一二民旣不困國且有利兹古聖賢之用心也然其所未至則有三焉數少也道逺也吏奸也一郡之糴不數千萬其餘畢入于賈人至春出糶寡出之則不足于饑也多出之則計日而盡也于是賈人深藏而待其盡盡則權歸于賈人矣是數少之弊也倉儲之建皆在郡治縣之逺者或數百里其貧民多糴則無資少糴則非可朝行而暮歸也故終弗得而食之矣是道逺之弊也舉掌之人政或以賄概量不均行濫時有及其出也或減焉或雜焉名曰裁價實則貴矣是吏奸之弊也今若廣置本泉増其糴數則蓄賈無所専利矣倉儲之建各于其縣則逺民可以得食矣申命州部必使亷能則奸吏無以侵刻矣如此利國便人事可經久是謂通輕重之權不可不察也孝宗乾道間知長沙王師愈論和糴之弊疏曰和糴之法本欲利民而足用湖南行之乃大不然其名則美其實則重為民害始也無見錢以為糴本或給官告度牒或給三合同闗子或給乳香茶引令州縣變轉現錢不免強敷之于民甚者撥有名不可催之積欠從而追擾其為害一也次則以本錢不足或低估價值或多量升斗出納之際加以官吏欺弊其為害二也終則裝發綱運顧船水脚之費無所支破又從而取之于民若運至荆襄間泝流而上江路遼逺水淺灘多動經年嵗所費又倍之其為害三也是故民之所憂者水旱所喜者豐年今則豐年之憂乃甚于水旱以三害若此耳臣又聞每嵗諸路漕運自可足一嵗之用只陷折至百餘萬石遂和糴以補其缺誠能措置漕運不致陷折雖免和糴可也縱不能全免或不得已而為之明撥本錢及支破起綱之費庶㡬事舉而民不被害理宗時黄幹知漢陽上奏畧曰今之守令為救荒之策者不過曰勸分曰通商而已勸分通商不聽其自為低昻則客旅稅户不肯出粟若聽其自為低昻則人心無厭數倍其價小民當豐穰之嵗必父子竭作然後可易一飽迨至凶荒雖有技藝已無所售安得有數倍之錢可以糴米亦有相與枕藉死耳夫事固有若老生常談而確然不可議者廣儲蓄是也然人皆知其不可易而不為者病在因循而已本軍每嵗苗米不過二千餘石僅足以解總所給大軍而本軍官兵之請給皆旋行収糴素未嘗蓄積也自前知軍孫礿首糴萬石知軍王從繼之亦糴萬石今嵗大旱偶米價未大貴之日臣急發郡帑借貸緡錢糴客舟稅户米三萬餘石漢川縣亦糴萬石自六月以來米價頓貴藉此六萬餘石之米發以賑糶每户數石則亦可以及萬餘之衆日食賤米而無慮以是推之則積貯者信其為天下之大命也金世宗語户部曰隨處時有賑濟往往近地無糧取于他處往返旣逺人愈難之何不隨處起倉年豐則多糴以備賑濟設有緩急亦豈不易辦乎而徒使錢充府庫將安用之章宗時省臣言舊制豐年増市價十之二以糴儉嵗減市價十之一以糶所以然者恐物賤傷農物貴傷民増之減之以平粟價故謂常平非謂使天下之民専仰給于此也今天下生齒至衆如欲計口使餘一年之儲則不惟數多難辦又慮出不以時而致腐敗也况復有有司抑配之弊殊非經久之計如計諸郡縣驗户口例以月支三斗為率每口但儲三月已及千萬數亦足以平物價救荒凶矣元監察御史建言國以民為本民以食為天漢賈誼言於帝曰世之饑天之行也禹湯被之矣今不幸有方二三千里之旱胡以相恤文帝大感誼言詔開籍田親耕以率天下為蓄積預備之道西漢之末太學生劉陶亦嘗獻議民可百年無貨不可一朝有饑迨乎東晉元興之間三年大饑至于臨海永嘉富室皆衣羅紈懐金玉閉門相守而餓死以此言之金玉何用哉此古人所以蓄積糧儲以為當代之急務而斯須不可去于是義倉之所由起也常平之設始于漢耿夀昌建言創有此舉自後隋唐襲而行之事行之後以其公私富贍水旱無憂誠為萬世愛民之良法自唐宋到今所以為不易之政也且常平之舉我聖朝每形于詔㫖蓋所司奉行有所未至而未效其事豈非國用浩繁糴糧之本未暇及與且天災流行誠不可測即今中外諸路每嵗所収糧斛僅了銷用比至嵗終倉如懸罄倘如古人所言忽有堯水湯旱之災百慮千思不悟弭饑之術卑職管見國家建立臺憲糾察奸邪本以為民其追到大小官吏賍罰雖是取與不應之賍原其所自皆朘剥民之膏脂合無將三臺追到賍罰各隨所屬撥為常平倉本豐年米賤比照市直兩平収糴歉嵗穀艱價依原鈔開倉出糶立法闗防禁絶抑配詭名冒糴如此庶㡬官本不失民受大惠公私之際一舉兩成豈惟折富豪趨利遏糴之奸萌實安小民妻小流離之大患為國之大政捨此無先張光大常平倉論常平者荒歉之預備無傷于農有益于民穀賤時増價而糴穀貴時減價而糶故遇水旱霜蝗之變民無菜色不至于流離餓殍之患此古治民之良法也夫豪家巨室為富不仁惟望荒年饑嵗閉糴圖利誰肯以仁德濟人若常平一行可以遏塞富豪趨利之心而米價自然平矣旣平則諸物價直無復髙矣又常平出糶之際無抄劄户口之煩饑民凑集之擾此其所以為良也聖朝屢頒明詔而當言路者亦已嘗建言文非不明意非不善也蓋為有司奉行不至視為文具原其所自亦糴本之未立耳若以御史所言將三臺追到賍罰各隨所屬撥為常平糴本此亦返本還原仁民之良策又僧道度牒古者平時不輕出必俟緩急之際故宋淳熙嵗荒給降度牒博換米穀以濟饑民亦備荒救民之活法矧今朝廷亦降度牒發下諸郡但為僧道者每道納免丁錢至元折中納鈔五錠莫若酌古準今申明朝廷將所降度牒免丁錢改擬願為僧道者每度牒一道以免丁錢約量出米若干永著為令在城者輸之于路倉屬縣者輸之于縣廩方許簪剃如此儹積以為常平之本又復將三臺賍罰斟酌多寡均分路府州縣一依常平古法視嵗上中下熟収糴相參収貯無嵗不糴如遇凶荒發糶盡絶則又將所糶價錢于有米去處収糴依彼中糴價登答水脚盤費錢數循環糶糴以濟饑民二者兼行則常平糴本立矣而施惠之策又在當人何患乎米有限而不能遍及村落哉但當端本澄源若本源不清則弊生滋蔓民受其害謂如収糴之時若驗稅科糴増損價值則有司官吏因緣為市糶者亦不甘心如能照依鄉原市價依法収糴或每升増答分文價錢劃便支付不致尅落以誘其來則人心亦樂願糶矣又須于糶糴之際革其監臨者附厯批號之需及髙量削刻斛斗之病如有近上人户勢要公吏祇候人等詭名冒糴頓買者事發到官量擬科㫁仍將所糴米糧倍徵還官價錢㫁沒如此則奸貪有所儆畏細民均沾其惠方可為復古之良法茍或不然反為民病為政君子果能深味常平之意實能行之則可以固邦本結民心甚為萬世之長策也明𢎞治闕二字年闕三字請復常平疏臣聞古無常豐之嵗而民不患于不給無他積之有預也夫民司命者官而恃以為命者穀穀不積民有衣寶玉而死者矣故預備之計于民最急今江西所屬預備倉穀湖口縣不及六千石彭澤縣不及六百石石城縣僅二千有奇泰和大縣亦僅八千有奇其餘積蓄俱少臣竊憂之夫凶則散豐則斂官府常規散則樂斂則怨人情大致詭名冒領適長市道之奸抵斗追還竟諧里老之計公催稍急則交扇互搖巧呈哀訴只得停止以致數縮于官有出而無入約爽于民有借而無還出非原泉運非鬼神伊何能繼今欲公私兩便惟有常平可復而已查得近例一里約積穀一千五百石江西衛所姑未概論試以有司言之六十九縣總計一萬一百四十五里穀以一里千石計之尚該一千一十四萬五千石見在所積十未及一約少九百萬石每穀五石作銀一兩該銀一百八十萬兩盡括司府庫藏不盡一十萬兩糴本羞澁力難求濟是外非重罰罪囚則勒勸大户取彼與此仁者不為况今法日以弊難開勸罰之門義日以衰難求輸助之户若棄是不務則今年直小荒耳待哺嗸嗸聚羣搶穀南康起九江起饒州又起熄之而復炎痛之而無畏萬一大荒其無尤甚者乎是正謀國所當預處者也宋仁宗時嘗出内庫百萬緡以助糴本今日内庫臣未敢知若承差吏典納銀之例又妨正體彼善之法冠帶尚義猶可行耳伏望聖明軫念江西為控扼楚蜀閩廣擁䕶金陵要地人民凋瘵之餘垂仁加恤特勅該部計議奏行布政司招納義民官一千名除問革官吏外不拘本省别省客商軍民舍餘老疾監生廩増附學吏典及子孫追榮父祖各聽納銀七十兩者授正七品官五十兩者正八品四十兩者正九品各散官二十兩者冠帶榮身監生減十之三廩膳减十之二陸續填給収完銀兩分俵各縣以資糴本各該冠帶雖不免其差役亦用加之禮貌毋妄黜罰毋輕差遣使絶陵轢樂于順從其不願冠帶願立表義牌坊者出穀二百石亦容蓋樹不限不停以補官乏臣又見凡問口外為民邊逺充軍囚或逃而不去或去而即逃徒名治奸無益事實乞勅法司計議除情重外如扛幇誣告強盜人命不實誣告十人以上因事忿争執操凶器誤傷傍人勢豪不納錢糧原情稍輕不係巨惡參審得過之家願納穀一千石或七八百五六百石容其自贖免擬發遣其誣告負累平人致死律雖不摘情實猶重並窩藏強盜資引逃走抗拒官府不服拘捕本罪之外量其家道罰穀自五百石一百石以警刁豪俱由撫按參詳無容司屬専濫臣仍與巡按督併二司専責守令於囚犯紙米並應追賍罰工價逐旋存積務取數足為期不容分外科罰如縣一十里則積一萬石二十里則積二萬石糴本精選該縣行檢富户量力領買上上六百石次四百石次三百石又次二百石不許市民公役冒領侵費専厫収受名曰常平如秋成穀賤六石糴入春夏穀貴五石四斗糶出秋成五石糴入春夏四石五斗糶出每石明扣一斗以備耗存積俱令社長社正開報貧户每丁止買二斗以杜兼利前項銀兩當令前該富户領給秋成照價糴入穀貴依前糶循環如常若穀賤年分不必發糶仍引查𢎞治十四十五十六三年放過饑民稻穀量追一半如借一石者追五斗另厫収受審實極貧倍加賤糶如時一錢四斗則與六斗果甚孤獨無歸委難自糴方與賑濟不必追還若得過冒領問罪之外每穀一石罰穀十石衛所常平亦依此法衛一萬石所二千石為則各該掌印有司考滿參定殿最軍職管事酌取去留所貴上下相資人法並任同心逺大之圖用復常平之政臣再勸社民各立義倉與義學義塚例置名曰阜俗三義盡一義者書一義之門二義三義稱是義倉之畧社中富民任其出穀六百石或四百石别處一倉極貧利一分次貧利二分春借秋還轉相賙助民樂表義似亦有從若常平旣復社倉又行則饑饉有備而地方可保無虞此預備至計子民至急而江西今日尤為急者伏惟聖慈留意吕坤積貯條件曰穀積在倉第一怕地濕房漏第二怕雀入鼠穿此其防禦不在人力乎大凡建倉擇于城中最髙處所院中地基務須𨫼背院牆水道務須多留凡隣倉庾居民不許挑坑聚水違者罰修倉厫一倉屋根基須掘地實築有石者石為根脚無石者用熟透大磚磨邊對縫務極嚴匝厚須三尺丁横俱用交磚做成一家以防地震房須寛寛則積不蒸須髙髙則氣得洩仰覆瓦須用白礬水浸雖連陰彌月亦不滲漏梁棟椽柱務極粗大應費十金者費十五二十金一時無處固利茍完數年即更實貽之倍費故善事者一勞永逸一費永省究竟較多寡一費之所省為多也以室家視倉厫者當細思之一風窻本為積熱壊穀而不知雀之為害也旣耗我穀又遺之糞食之甚不宜人今擬風窻之内障以竹篾編孔僅可容指則雀不能入倉牆成後洞開風窻過秋始得乾透其地先鋪煤灰五寸加鋪麥糠五寸上墁大磚一重糯米雜信浸和石灰稠黏對合磚縫如木有餘再加木板一週缺木處所釘蓆一週可也一假如倉厫五間東西稍間各用板隔㫁與門楣齊穀止積于四間留板隔東一間如常閒空值六七月久陰氣濕或新収穀石生性未除倘不發洩必生内熱州縣官責令管倉人役將穀自東第二間起倒入東一間閑空之處一間倒一間是滿倉翻轉一遍熱氣盡洩本味自全何紅腐之有陳龍正曰米力難久積必用穀北地髙燥可窖東南必藏之秭中築基髙圍草厚十餘年後味彌佳一倉斛依洪武年間鐵様用木造成邊角以鐵葉固之以防開縫仍用印烙其四裏以防剜穵但有不係官烙自作矮身闊口及小出大入者坐賍重究一太倉禁用燈火不許積柴安竈官吏以下飯食外面喫來不得已者送飯如違重治朱健國朝貯糴論古之積貯者藏富于民而今之積貯者藏富于國古之積貯者導利于下而今之積貯者専利于上在下則民自足而君有賑恤之恩在上則君有餘而民無周匱之望是以唐虞盛時雖有九年之水而未始無倉廩府庫之充觀耕田鑿井帝力何有于我可徵也成周盛世雖有軍國之需而未始無三年九年之積觀水旱凶荒民無菜色可徵也厥後管仲之在齊也通輕重之權立聚散之法似矣而乃陰為富國之謀李悝之在魏也量豐凶之節制糴糶之政美矣而何救于地利之盡無已則賈誼晁錯耿夀昌之策乎誼欲驅民以歸農畆而抑末技此上策也誼之說行當無一夫耕而十人食之者矣錯欲使民入粟塞下以開鬻爵贖罪之路此中策也錯之說行當無千里餽糧士有饑色者矣夀昌欲立常平倉使穀賤則増價以糴穀貴則減價以糶此下策也夀昌之說行當無官常有餘民常不足之歎矣唐宋以來雖有義倉社倉之說大率皆常平遺意自熙寧以後散為青苗之本南渡以來取為軍國之需不能救民而且害民矣自今觀之蓋莫善于常平莫不善于義倉義倉之法凶年則散之豐年則斂之其初未嘗不善也然官與民償貸其弊易生方其貸也寄之于里胥而詐冒之名多迨其償也責之于里胥而徵求之弊作及其弊也里胥必詐與貧民通而訐為詭詞貧民必甘與里胥市而覬為滅跡前者獲利後者效尤將斂散之粟與存者無㡬矣其弊又有借止一石或償至十數石而不足借止一年或徵至十數年而未休下户細民有寧賣子女甘流徙而不肯窺倉廩之門見官吏之面者以故粟竭于官有出無入約爽于民有貸無還其勢必盡廢而後已此義倉之弊也常平則不然豐年穀賤則増價而糴以為備凶嵗穀貴則減價而糶以濟饑願糴者與之而無所強受糶者去之而無所追其利常周其本不仆故公私兩便今宜因義倉之舊更以常平之法量民數多寡以貯粟酌道里逺近以立倉每豐而糴委之于富民而計其數時凶而糶臨之以亷吏而主其衡糴不出一人人不過一石而又善為之處嚴為之法使所糴皆貧民而富者無所侵焉斯可矣或曰義倉之行饑者可徒手而得粟常平之設必轉貸糴本而粟始可得也其轉貸之際安知富人之不留難而徵取之時又安知富人之不侵漁乎答曰天下無不弊之法為治者但當酌其弊之輕重而審處之常平立于漢義倉立于隋而用常平者常多用義倉者常寡常平每廢而猶存義倉暫起而即廢至宋于常平特置提舉之官而義倉無聞焉亦足明其法之善矣雖然亦在行之者何如耳國朝于所在州郡立預備倉則常平之法也嘉靖間議令每鄉立社㑹以貧富出粟有差凶札則散之則義倉之意也夫兹二法者業已備之矣然或始詳而末弊或乍剏而旋隳者何哉守法者偷取一切以便上而法不信奉法者營私自便而法不行也今預備倉具在民之以貲賜爵及補胥吏者有不以金錢乎諸公田租稅有升龠入者乎城旦者必以粟贖乎即有之能十而一乎則上固未嘗貴粟矣州郡贖鍰行省餘羨貪吏以潤其槖而亷者則每藉以行其德使誠寛然少有奇餘緩急猶或可濟今且盡籠而輸之上有司庫藏自惟正外固已若洗卒遇大祲雖有愷悌之長斂手而已矣竭閭閻以實公藏竭州縣以實太倉竭太倉以實内帑流愈上而下愈耗則上固以輕民命矣且平日稱為備者旣無義輸及補吏諸入又不取之罪贖當出者徒以法外横加箕斂投一訟牒輒計有力無力耳非大較曲直也爰書已定復加以罰及所罰則非穀也所入又非倉也民當豐嵗而吏能凶之况暇言備即或有勸令富家出粟廩貧民者捐瘠滿壑啼呼滿路吏非獨無睹聽而所斂者又非粟也所廩者又非貧民也民之體在澤谷而其膏血在吏筐槖矣蓋天下有救荒之吏無救荒之法救法無常而備法有常今當俟嵗少豐之後飭廢舉墜而重督之無新議為也夫積粟如積水然非有通川大河環之即溝澮不足恃然汪洋演漾者在數里之外而桔橰浸灌取之數步之内勢不相及也則溝澮陂池擅其利矣州郡之倉通川也瀦多而漑博里社之倉陂池也利近而救速兩置則可以相灌而交濟請于預備倉所入循先朝舊制入貲贖罪悉輸粟如例春夏穀稍貴暫聽輸價所司俟秋時易米儲之有不中程者罰無赦貴出賤入舊出新入母出子入期以平價而已勿得輕以貸民懼貸而責取之擾也蓋常平者上捐金以為母而令上不費一錢母之入無盡而子之出愈無盡不過三四年所在皆滿矣而又修社㑹之制一如嘉靖中令令因餘而取之因地而藏之因人而長之其藏之里也猶藏之家也嵗不足視其不足而假之視尤者而賑之民坐而取食于里也猶取食于家也社倉以賑急縣倉以繼社居豐多糴以泄輕故農不傷遇災多散而廣惠故嵗不病為今時之計實無出于此兩者若謂出納之際吏緣為奸積儲民間侵牟易耗則奉法者事也柱後惠文彈治之孰敢不懲汪道亨分陜常平倉議一貴糴賤糶此常平法也與社倉公廩不同蓋社倉聽里社居民斂散公廩聽有司積貯備賑而常平法可以補二倉之所未備者今止責之各郡昔漢宣帝常曰庶民所以安其田里而亡嘆息愁怨之聲者政平訟理也與我共此者其惟良二千石乎以為太守吏民之本也以故此倉約法悉聽各郡守隨宜處置務在便民而銀穀之成數每年只憑府册循環查考更不另行州縣以滋煩擾一繕修倉厫較勘斗斛諸法悉照公廩議行但社倉公廩或春放秋收或分給賑濟或量行取息出陳易新悉從里社州縣隨時酌處若常平則只用糴糶一法穀賤依時價量増以利農人穀貴依時價量減以利貧民此外不必逐什一權子母致難勾稽簿書重煩収放糴則銀出穀入糶則穀去銀還兩者循環直截行之庶為省便一全陜府州収入不同價值難一當此糴穀之時宜令斗行人等每日從實報價消長穀有髙下價有低昂一憑時估而量為増之不拘穀粟各從其類収貯但要乾圓潔净能耐久儲不許攙和濕粃倉庾務須髙爽堅固脫遇年嵗屢豐不便糶賣就使一二年貯之不動或量加翻曬免致紅腐斯為得策一各府州屬収穫有豐歉不同或于豐収地方糴買運入府倉或量糴粟登簿収貯州縣倉俟明春青黄不接照時價量減以糶悉聽各府隨時酌處但吏胥弊竇多端如預備倉糧聞官府於出陳易新之時行令小民闗支而猾吏作奸輒曰小民不願久之自不得不聽吏胥積猾詭名冒領矣此䝉蔽之為害也今惟現銀出糶自無欺誑每年亦宜斟酌年嵗豐歉而調劑之如遇豐年小民不甚乏食或十石或五七石聽民間時估糴買荒年米穀騰貴其時減價出糶各府官當選委亷能務要著實稽查嚴禁只許貧民不拘升斗陸續買糴多亦不許過五斗或一石如有衙門積猾市肆牙行及富豪之家希覬價減暗行假名収買盡法懲治穀雖糶而非賑而暗減其值是亦不賑之賑也其極貧之家無銀赴市者又聽社倉公廩分賑之而此倉一糴一糶出入銀穀之數須㑹計明白凡遇出糶事畢除扣下糴本已足常平舊管原額外但有餘剩銀兩一一登之簿籍另作常平新収項下下次又為糴本以後再用以糴再糶以還悉依此例行又或大荒之年計筭米粟若干只依時估出糶若干已足原額糴本而其餘穀粟即用以分賑極貧之人亦無不可其出入升斗等秤須勘較畫一不許擅用私置或虐取鄉民或虧短糧石或冒費官銀或偽増虚數如承委各官容隠輕縱漫不稽查者聽該府從重㕘究行之得法衆口稱平者重加優異轉報各院另行薦奬庶勸懲之中寓鼓舞之意而良法不致湮廢矣一鄉民有上納錢糧缺銀者以乾潔穀粟或車輛推挽或挑負不拘多寡徑赴倉所比市増價若干委官用平斗隨到隨収不許類集致令鄉民等候以遏其再來每日辰時委官到倉不許衙役恐喝刁難量穀見數即時登簿某人穀若干該價若干註于本人名下逐名按數平準包封給散如有折耗開明官認願即領銀者登時支給不許類數總放致有豪強作弊而柔善者反不得實數以阻其出糶之意如穀多者或作數次零運登記簿册總記若干石一起領銀者亦從其便如市糴則照依時估嚴禁牙行街棍詐稱官糴愚弄鄉民此在委官用心訪察以剔其弊一每遇春二三月青黄不接之時減價出糶倉穀不必上市惟出示曉諭明寫穀每石折米若干市價若干今減若干俱要從實作數不許有名無實凡鄉民願糴者以作色銀兩自一錢起至二三兩止不分多寡于每日天明時候赴該倉委官亦于此時到倉用較定平等平準稱銀不許加重分釐委官挨次収受包封登簿某人銀若干該穀若干給以圖書印票聽其支穀収銀畢開厫放穀用準斗準斛行概不得用手抹量致有髙下之弊每日辰時委官入倉至午未時止収銀一次放穀一次倘人多穀多或委一官収銀一官支穀不許躭悞農工尤為便益如無絲銀即以成色銀折筭以免傾銷銀匠暗竊虧折之弊若鄉民糴穀出倉嚴禁宗室富家街市豪右衙役里排務主歇家人等敢有指稱欠債逋糧工食差糧截賠酒錢等項邀奪質當及市肆龍㫁每日更名換人多糴過十石以上營利者訪出或訐發拿究問罪完日枷號一月宗室家人一體從事訐禀人役賞穀一石作數開銷不得市恩姑息其中事宜開載未盡者聽該府隨時斟酌施行一重糴本以垂永久本司自受事以來清查織造工料等項實省在庫銀及本司贖羨銀共一萬五千八百有奇除量酌分發八府一州趁時糴穀入常平倉各宜置底簿二扇一註糴本銀一註糴糶穀石用府州印鈐首開某年某月奉本司發前項銀共若干今平時估米每石價若干該筭穀若干計銀若干官糴每石増價若干共出銀若干入穀若干完日務要明白填入循環報查次年春二三月青黄不接糶穀之時務要查訪時估的確每米一斗值銀若干約用穀若干該價若干官糶比市減價若干定數出示通行出穀若干入銀若干除原糴本銀若干増出時估銀若干又陸續収到詞訟銀若干収貯至秋八九十月仍將以前銀兩糴穀俱如前例載簿出銀若干入穀若干除春糶若干石増穀若干以後隨時糶糴倣此例行之每年秋冬出銀糴穀一次春夏出穀入銀一次凡舊管新収並開除實在四柱明白填報本司循環以憑轉報兩院張朝瑞建常平倉厫議伏覩大明㑹典洪武初令天下縣分各立預備四倉官為糴穀収貯以備賑濟就責本地年髙篤實人民管理蓋次災則賑糶其費小極災則賑濟其費大曰賑濟則賑糶在其中矣賑糶即常平法也奈何嵗久法湮各州縣僅存城内預備一倉其餘鄉社盡亡之矣看得天災流行國家代有則救荒之政誠當亟講顧既荒而賑救之也難未荒而預備之也易今之言荒政者不越二端曰義倉曰社倉此預備而斂散者也曰平糶曰常平此預備而糶糴者也昔李悝平糶耿夀昌常平先後所見畧同萬世理荒上策在是矣今欲為生民長久之計則常平倉㫁乎當復者兹欲令各屬縣備查四鄉有倉者因之有而廢者修之無者各于東西南北適中水陸通達人烟輳集髙阜去處官為各立寛大堅固常平倉一所倉基約四畆合用工料本道查發賍罰並該府縣查處無得銀輳合陸續備辦建造每嵗將守巡道及府縣所理罪犯紙贖實將一半糴穀入倉或查有廢寺田産及無碍官銀聽其隨宜糴買又或民願納穀者一如祖宗已行之法一千五百石請勅奬為義民三百石以上勒石題名或如近日救荒之令二百石以上給與冠帶五十石以上給與旌扁大約每鄉一倉上縣糴穀五千石中縣糴穀四千石下縣糴穀三千石各實之但不許逼抑科擾平民各擇近倉殷富篤實居民二名掌管免其雜差准其開耗每収穀一百石待後發糶之時每名準與平糶三石二名共糶六石以酬其勞糶完即換掌管勿使重役城中預備倉照常造送查盤四鄉常平倉免送查盤止于年終各倉經管居民將舊管新収開除實在總撒數目用竹紙小册開報該縣縣將四倉類册申送各院並布政司及道府查考凡収糶俱該縣掌印官或委賢能佐貳官監督不許濫委滋弊穀到用該縣原發較勘平準斛斗収量明白暫貯别所積至百石以上方許禀官一収如有臨収留難及未収虚出倉収旣収侵盜私用冒借虧欠等弊查究追足各縣徑自從輕發落其有侵冒至百石者通詳定奪每嵗秋冬之交本道或該府掌印管糧官單車間一巡視以防掌印官之治名而不治實者每除無饑小饑之年不糶外或值中饑大饑四鄉管倉人役禀官監糶另委富民數名用官較平等収銀其出糶一節當與四鄰保甲之法並行如該鄉穀多即糶穀一日保甲一週穀少則糶穀分為二三日或四五日保甲一週務使該鄉積貯之穀數可待饑民冬春之糴數方善四鄉不能盡同各宜審量行之大率賑糶與賑濟不同不必每甲尋貧民而審别之以多寡其穀數如一甲應糴五斗或一石或二石則甲甲皆同惟以穀攤人不因人増穀糴銀每甲一封亦可庶乎易簡不擾或甲中十家輪糴則每日每甲糴不過二人每人糴不過二斗此荒年賑糶之大較也每鄉除無災都保不開外先期將有災保甲派定次序分定月日某日糶某保某甲某日糶某保某甲明白出令保正副公舉貧民至期令其持價糴買如富者混買連坐保甲仍行張詠賑蜀之法一家犯罪十家皆坐不得糴中饑糶倉穀之半大饑糶倉穀之全俱照原糴價銀出糶不可加増寧減之大約減荒年市價三分之一方可壓下穀價不至騰踴或倉穀糶盡而民饑未巳則慎選員役持所糶穀本赴有収去處循環糴糶源源而來民自無饑救荒有功員役分别奬賞此蓋儲用社倉之法而糶用常平之意者也四鄉糶完即將穀價送官聽掌印官于秋成之日就近各選殷實人户領銀盡數照時價糴穀其牙脚等費晒揚等耗與造册紙張工食等項俱准開銷其穀晒揚乾潔官監上倉如法安置仍總計糴穀正銀並牙脚折耗等費每石約共銀若干報官註册以為日後出糶張本官不得將銀貯庫過冬致髙穀價難買如穀賤不糴責有所歸是倉不設于空僻去處者恐荒年盜起是齎之糧也穀不𨽻于臺使查盤者恐委盤問罪是遺之害也行平糶之法而不用稱貸取息之法者恐出納追呼蹈青苗之擾民也蓋社倉之法立則以時斂散富者不得取重息而貧民霑惠于一嵗之中常平之法立則減價糶賣富者不得騰髙價而貧民受賜于數十年後大饑之日蓋不費之惠其惠易徧弗損之益其益無方誠救荒之良策也一定倉基凡倉基俱南向以四畆為率或地不足四畆者聴其隨地建造前後左右段落務要酌量停匀毋使偏邪甚有基地不足三畆者聽其將社學及看倉住房從便另造于别地不造入倉内亦可然地基窄狹者正㕔房門可小而兩倉房間架決不可少以其每間盛穀原約四百石有餘小則難容也各倉基址必擇髙阜之處以避水濕侵穀若地有不平者須填補方正平坦方可興工四面水道必開濬歸一不得聽其二三漫流各縣先將四倉四至丈尺畆數坐落地名與應建倉厫㕔舍間數每倉畫圖一張貼說明白並應給買民基價數一一勘處停妥申送該道府㕔查覈一定倉式保民實政簿開各縣立四鄉倉每縣積穀務期萬石為率州縣大者倍之則大縣當儲二萬石中縣一萬五千石小縣萬石矣今議倉式頭門一座約髙一丈三尺八寸中闊一丈入深連簷一丈七尺六寸兩傍耳房每間闊八尺以便住看倉人役頂上用大竹箯覆之蓋瓦大門二扇每扇闊三尺東西厫房大縣共該貯穀五千石每邊應造厫房七間中縣約共四千石每邊應造厫房五間小縣約共二千五百石每邊應造厫房三間每厫房一間約貯穀四百石以上約髙一丈三尺六寸闊一丈一尺二寸入深一丈六尺厫内先用地工將厫深築堅實外簷用石板鑲砌内用厚磚砌底仍用條石墊擱楞木從宜鋪釘松杉厚板方鋪簟蓆其倉頂上方木為椽椽上用板墁板上用大猫竹打笆覆之笆上用土土上蓋瓦其瓦須宻各週圍厫牆脚闊二尺八寸先行築實方用條石砌脚三層上用地伏磚扁砌純灰抿縫中用稍碎磚瓦少以泥和填實仍用鐵牽鉡釘如地勢髙燥者四面俱用磚牆厫後及兩側牆俱包簷厫前牆上簷闊二尺四寸不拘七間五間三間中俱隔為三段七間者中三間兩傍各二間五間者中三間兩傍各一間三間者亦隔三段各開三門氣樓亦如之其厫内貼牆處用木栅釘相思縫厚板使穀不著牆以防浥爛厫口亦用相思厚板横閘如地勢卑濕者厫前一面不用磚牆厫板外用圓木栅欄一帶上面建廊闊五尺六寸㕔前及兩倉外明堂空地俱用石板鋪平以便晒穀正㕔三間中間作天花板懸聖諭六條以便朔朢講習鄉約約髙一丈九尺六寸中間闊一丈四尺八寸兩傍每間闊一丈四寸入深除簷二丈六寸中間照壁門六扇㕔前兩傍用欄杅外簷三尺頂上用便磚磚上用瓦内地用方磚砌簷下石板墁三面牆垣牆脚闊二尺先用地工築實方用大石板砌脚三層上用地伏磚扁砌亦用鐵牽鉡釘牢固後社學三間或買舊屋建造約髙一丈七尺二寸中間闊一丈一尺二寸兩傍每間闊一丈入深一丈六尺四寸頂上用墁板鋪完蓋瓦内地用方磚砌兩傍用磗砌腰牆上用窻每邊四扇中間用槅門四扇三面牆垣牆脚闊二尺先用地工築實脚用石砌二層髙二尺上用磚砌本倉外週圍牆垣牆脚闊三尺五寸約髙一丈一尺上用牆梯瓦蓋先用地工深築堅實牆脚用大石塊砌髙三尺方用土築務離倉牆一二尺内可容人行其土不可貼近本牆掘取以上各項倉房㕔舍務期堅固經久不在華美其丈量地基起造房屋並量木植磚石俱用大官鈔尺為準其木匠小尺不用須使畫一毋致參差一辦倉料倉厫每邊七間合用柱木每根徑六寸矮柱每根徑六寸桁條每根徑五寸五分抽楣每根徑四寸椽木每根徑三寸穿柵木每根徑四寸地板楞木每根徑五寸地板壁板每塊厚八分正㕔三間合用中柱木每根徑一尺一寸用實木邊柱每根徑九寸大梁每根長二丈徑一尺四寸二梁每塊長一丈徑一尺一寸步梁每塊長八尺徑一尺抽楣木每根徑四寸五分桁條每根徑六寸椽木每根徑三寸門房三間合用柱木每根徑五寸桁條每根徑四寸抽楣木每根徑三寸大門二扇每扇闊三尺後社學三間合用柱木每根徑六寸桁條每根徑五寸五分抽楣木每根徑三寸五分大梁每根徑九寸長一丈八尺二梁每塊徑八寸五分長一丈椽木每根徑二寸五分頂上用墁板鋪完蓋瓦其餘幇機連簷門窻等項開載不盡者俱要隨宜酌量採買製作務使與各項材木大小規式相稱凡磚瓦就于近倉之地立窰一二座令窰户自燒造石灰見買地伏磚每塊長一尺二寸闊七寸厚三寸秤重十八觔上燒常平二字開磚每塊長一尺一寸闊五寸厚一寸方磚每塊長闊各一尺便磚每塊長七寸闊六寸三分瓦每塊長九寸闊七寸重一觔半凡採買木植俱要選擇圓長首尾相應乾燥老黄色者毋用背山白色嫩木石板取青白堅細者其黄色疎爛者不用磚瓦擇青色者黄色者不用以上各項物料各縣掌印官親將每倉應造厫房㕔舍逐一親自從實勘估酌量定價照數給銀責令原定各役採買木石等料搬運一到即具數報掌印官并佐貳委官及總管各查驗揀選堪用者収之不堪者即時退換不得虚冒混収燒造磚瓦不如式者不許混用仍置簿送縣印鈐日逐登填収發數目明白委官不時稽查各縣仍將查估過工料價銀總撒數目逐一造册報道查核東西倉厫與正㕔一應皆用新料其門房社學等料如有現成民房願賣可以改用者一照時價見銀平買庶工省費亷建造尤速惟不虧其價而人自樂從矣徐光啟放糶倉穀法各倉所錢糧出入之地奸偽易生若不立法稽核恐民不沾平糶實惠各縣凡遇放糶先宜當官較准斗斛等秤務與時勢相合印單釘號給各倉領用仍存一副在官備照次置官單照式刋刻聴各収銀富民刷印填給交銀已完之人執憑支穀每倉置木籌三十根每根長三尺闊一寸二分以天地人三字編號自天一號厯至天十號止地人俱照編號并發委官収候給糴穀人執照出入各富民于倉外擇一近便空處専収價銀經収守倉居民在倉發穀該縣選發謹慎吏役四名赴糶穀倉聽用一名掌籌傳送一名在東邊門外查驗單票號籌放人入倉二名在西邊門内一収單驗穀一収籌放穀出門倉内用大銅鑼一面東邊門外置鼓一面凡有保甲人民持銀赴糴富民即時將銀秤収明白備將保甲人名銀數並應與穀數登記號簿及填單付糴穀人執候類有十人先將天字號籌十根散給各執單持籌從東邊聽吏查明擊鼓三聲放入如糴穀二石或一石五斗者必數人支領單上明註㡬人進倉領籌㡬根即一人止糴穀五斗亦准領籌一根蓋有一人即執一籌也量穀牙斗用盪平斛不許用手平斛致有髙下十人量完發穀之人將單即註發訖二字鳴鑼一聲十人負穀齊行然後門外擊鼓放人入庶倉内不致壅雜若散天字號籌已盡即散地字號籌地字號籌已盡即散人字號籌計散人字號籌之時而送天字號籌之吏已至矣相繼輪轉周流不窮如東無單籌執照而入者與西無單籌負穀而出者及有單無籌有籌無單並穀比單數多者許各吏一體拿送究治委官選差皂𨽻四名守門捕役四名内外巡綽以防奸弊至晚収單吏將單類送委官查銷委官將銀封貯縣庫仍聽道府並府管糧官該縣正官不時親臨倉所查驗或曰限以五斗恐貧民銀少聽其升糴恐人衆擁擠富民収銀不及宜另擇空處每晨領穀數石或以升糶或以斗糶此不論保甲不用單籌不拘銀錢聽其便宜零糶至晚交價還官此亦一法也荒政叢書卷八
