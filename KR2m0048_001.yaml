body:
  text: 荒政叢書卷一湖廣布政司參議俞森撰宋董煟救荒全法救荒之法不一而大致有五常平以賑糶義倉以賑濟不足則勸分于有力之家又遏糴有禁抑價有禁能行五者庶乎其可矣至于簡旱也減租也貸種也遣使也弛禁也鬻爵也度僧也優農也治盜也捕蝗也和糶也存恤流民勸種二麥通融有無借貸内庫之類又在隨宜而施葢有大饑有中饑有小饑饑荒不同救之亦異臨政者辨别而行之故又以預講荒政雜記條畫終焉常平常平之法専為凶荒賑糶穀賤則増價而糴使不傷農穀貴則減價而糶使不病民謂之常平者此也比年州縣率多移用差官覈實文具而已自乾道間給降㑹子一百萬道兑起諸路常平錢一百萬貫而郡縣遂多侵用義倉後雖許用㑹子措置和糴其間未免抑配當時甚患之然則平糴之法遂不可行乎曰不然但官司糴時不可籍數定價須視嵗上中下熟一依民間實直寕每升髙于時價一二文以誘其來何患人之不競售哉葢官司措置惟欲救民之病財用非所較若以私家理財規模處之則失其所以為常平之意矣常平本法無嵗不糴無嵗不糶上熟糴三而舍一中熟糴二下熟糴一此無嵗不糴也小饑則發小熟之斂中饑則發中熟之斂大饑則發大熟之斂此無嵗不糶也近來熟無所糴饑無所糶常閉為埃塵耳何謂常平常平錢物不許移用謂他費不許移用至于救荒正所當用若必待報則事無及矣今遇災傷去處用常平錢于豐熟處循環收糴以濟饑民俟結局日以糴本撥還常平可也常平賑糶其弊在于不能遍及鄉村委官監視類多文具宜倣富弼青州監散之法將米豆就鄉村分置所苦水脚搬運之費無出不知饑荒之年人患無米不患無錢較官中所定之價毎升増一文以充上件靡費何患賑糶之米不能遍及村落哉但當逐保給厯零賣以防頓買興販之弊陳龍正曰令貧民搬運因而給之以食即是賑饑一道何愁虛費脚價耶昔蘓軾奏臣在浙中二年親行荒政只用出糶常平米一事更不施行餘策若欲抄劄饑貧不惟所費浩大有出無收而此聲一布饑民雲集盜賊疾疫客主俱斃惟將常平米出糶即官司簡便不勞抄劄勘㑹給納煩費但得數萬石在市自然壓下物價境内百姓人人受賜古今之法莫良于此然蘇軾之法止及城市若使鄉村通行方為良法也况賑濟自有義倉並行不悖乎陳龍正曰官米多則可握市價之權固也然此僅救中饑中户之一事耳大饑之年下户無錢在手雖減價不能糴是常平之米止及中户偏遺下户也况鄉村之民逺望城市即中户得糴者亦少救荒各隨其時隨其地尤當隨其人以子瞻之慧乃欲執一已當日所為而盡廢諸法不已疎乎董煟謂止及城市又云賑濟自有義倉葢亦善其論常平之意而譏其不能通于常平之外也荒年常平無米則如之何曰元祐元年王巖叟言淮南旱甚本路監司殊不留意詔發運司截留上供米一十萬石比市價量減出糶與闕米人户每户不得過三石其糶到錢起發上京又何患無米也陳龍正曰此即改折之活法葢京儲有餘京中米價顧低于外故可行若六宫百官萬民倚命于上供米則此法窮矣故為天下以足食為本而足京儲必以治畿輔之田疇為本上不寄命于逺方則逺方有急更可待命于上義倉義倉者民間儲蓄以備水旱也一遇凶歉直當給以還民唐太宗曰義倉為百姓先作儲貯以備凶年亦非横斂下令王公以下墾田畆税六升天寳八年天下義倉六千萬餘石至五代漸廢宋景祐間王琪言唐税太重當酌輕法以行之于夏秋正税之外每二斗納一升取一中郡計之以正税十萬石為率則義倉嵗得五千石矣于是詔天下立義倉今之州縣因仍既乆忘其為斯民所寄之物矣義倉合于民間散貯逐都擇人掌之不當輸于州縣葢憔悴之民多在鄉村于城郭頗少諸處州軍多將義倉米隨冬苗輸納州倉一有饑饉人民豈能委棄廬舍逺赴州郡請求今應每遇凶年相度諸縣饑之大小撥還義倉原米其水脚之需亦于米内量地里逺近銷算縣之于鄉亦然如此則山谷之民皆䝉其惠義米入縣倉悉為官吏移用縣倉于民猶近自令上三等户皆輸郡倉于是轉充軍食或資煩費不復還民故遇荒年無以救民之死今若以常嵗所取義米令諸鄉各建倉貯之縣籍其數主以有年徳之輩遇饑饉還以賑民且不勞逺致豈不勝于科抑賑糶乎檢准令文州縣嵗于十月初差官抄檢内外老疾貧乏不能自存之人十一月起支每人日支一升七嵗以下減半每五日一次併支至次年三月止遇閏及本土收成早晚者官司相度給散時月但通給百五十日止今江浙水田種麥不廣冬間民未困之其因乏多在青黄未接之時為政者所宜知也賑濟之弊如麻抄劄之時里正乞覔强梁者得之善弱者不得也附近者得之逺僻者不得也胥吏里正之所厚者得之鰥寡孤獨疾病無告者未必得也帳成已是深冬官司疑之又令覆實使饑者自備裹糧數赴㸃集空手而歸困踣于風霜凛冽之時甚非古人視民如傷之意今縣令宜每鄉委請一上户平時信義為鄉里推服官員一名為提督賑濟官令其逐都擇一二有聲譽行止公幹之人為監視每月送米麥㸃心錢縣道委令監里正分團抄劄不許邀阻乞覔如有乞覔可徑于提督官司狀申縣斷治如更抑遏可自于本縣或佐官㕔陳訴當痛懲一二以勵其餘其發米賑糶亦如之若此庶乎其少革耳救饑者多以支米為便然不係沿流及産米去處搬運費力往往夫脚與米價相等更有在路減竊拌和之弊若大荒年分穀米絶無民間艱食不容不措置移運若不是十分荒歉米斛流通則以支錢為省便小民得錢可以抽贖典過斛斗或是一斗米錢可買二斗雜料以三二升拌和菜茹煮以為食則是二斗之雜料可供一家五七口數日之費然恐純支錢亦有減剋之弊或錢米兼支則為兩便陳龍正曰隋社倉唐宋義倉一事而異其名也隋唐畆賦六升民困極矣宋于正賦外二十加一庶㡬得中然其大病總在收貯于官假如遇饑饉悉以還民猶多此一納一出况未必還乎設賑給時果盡免諸弊貧民猶苦奔走候領况不及貧民乎古之王者使民各蓄其有餘而後世必欲取諸民而代為之蓄古之王者自節其餘以春補秋助而後世加取于正賦之外而强半更留以自肥如之何農不饑死朝與野不相胥以俱貧也惟朱子于崇安因嵗凶起事仍隋社倉之名而黙變其官貯之法隋唐粃政返為純王損下轉而益下矣然當時亦但令民間自添社倉未嘗革去官府義倉須令民間社倉既多官府義倉一槩不用然後全利而無害耳董煟義倉數條惟合于民間散貯一句道盡本朝監隋唐以來之失罷義倉惟立預備倉倉穀罰有罪者出之最為得中惜近年多空之饑嵗無所賴勸分民户有米得價而糶何待官勸只縁官司以户等髙下一例科配且不時到塲檢㸃故人户憂恐深藏貧人反無告糴之所是假勸分之美名欺罔上司以圖觀美不知實以病民也即謂上户固所當勸顧今之鄉落上户不多中下之户凶荒之餘所入未能供所出安能有餘以賑糶哉人之常情勸之出米則愈不肻出惟以不勸勸之莫若令上户及富商巨賈俾之出錢官差牙吏于豐熟處販米各歸鄉里轉糶結局日以本錢還之村落無巨賈處許十餘家率錢共販或不願以錢輸官而願自糴販者聽官不抑價利之所在自然樂趨富室亦恐後時爭先發廩則米不期而自出矣山路不通舟楫處又有抄劄賑給就食散錢之法呉遵路知通州時淮甸災傷民多流轉遵路勸誘富家得錢萬貫遣牙吏二十六次和賃海船往蘇秀收糴米豆歸本處依元價出糶使通州災荒之地常與蘇秀米價不殊時范仲淹乞宣付史館天下有有田而富之民每嵗輸官固藉苗利一遇饑饉自能出其餘以濟佃客有無田而富之民平時射利緩急之際可不出力斡旋以救饑民為異時根本之地哉勸誘此曹使出錢糶販初非重困又况救荒乃暫時之役耶勸分者以富室儲積既多勸之賑發以濟鄉里近來州縣乃有不問有無只以户等髙下科定數目俾出備賑糶于是吏乗為奸至有人户名係上等家實貧窘至鬻田糴米以應期限而豪民得以計免者反乗中户之急濟其奸利宜下諸路漕臣嚴戒所部如仍前用等則科糴即許按劾仍聽人户越訴重治凶年糶粟以活鄉里可以結恩惠可以消盜賊亦于大姓有補倘使小民轉死流移大姓占田何暇自耕所損不少况又有甚于此者乎止縁小民有謂官司抑配我所當得不知感謝以致大姓不甘為令者宜以此意曉諭禁遏糴嘉祐四年諫官呉及言春秋之時諸侯相傾竊地専封固不以天下生靈為憂然同盟之國有救患分災之義秦饑晉閉之糴而春秋誅之聖朝恩施動植視民如傷然州郡之間官司各専其民擅造閉糴之令夫二千石以上所宜同國休戚宣布主恩乃坐視流離甚于春秋之世豈聖朝所以子育兆民之意耶詔諸路轉運司凡鄰郡災傷而輒閉糴者以違制坐之或謂聽他處搬運恐致本處艱糴曰此見狹之論也天下一家饑荒亦有路分宜物色上流豐熟去處勸誘大姓或本州發錢差人轉糴循環糶販非惟活鄰郡鄰路之民實活吾境内之民不然使此間之米不許出吾界他處之米亦不許入吾界一有饑饉環視壁立非速禍之尤者哉淳熙八年勅旱傷州縣全藉旁近豐熟去處通放客販米斛已降指揮不得遏糴訪聞上流得熟州郡尚不能體認朝廷均一愛民之意輒將客販米斛邀阻禁遏聖㫖劄付諸路帥漕司各檢坐條法徧下所部州軍恪意奉行如敢違戾仰逐司覺察按劾倘或容蔽仰御史臺弹奏條法興販斛斗及以柴炭草木博糴糧食者並免納力勝税錢災傷地分雖有收税舊例亦免小民聞官司有榜禁遏每遇外人糴米則數十為羣脅持取錢毆人傷損村人亦不敢擔米入市民間遂致闕食其令下詐起類如此不抑價常平令文諸糶糴不得抑勒謂之不得抑勒則米價隨時低昻官司不當禁抑可知也比年為政者不明立法之意謂民間無錢須當籍定其價不知官抑其價則客米不來若他處騰踴而此間之價獨低則誰肻興販興販不至則境内乏食上户之粗有蓄積者愈不敢出矣饑民皇皇無所告糴肻甘心就死乎必起而為亂可不思所以救之哉惟不抑價則不惟舟車輻輳而上户亦恐後時爭先發廪米價自低范仲淹知杭州二浙阻饑穀價方踴斗計錢百二十文仲淹增至百八十衆不知所為仍多出榜文具述杭饑及米價所增之數于是商賈輻輳價亦隨減包拯知廬州亦不限米價而賈至益多不日米賤蓄積之家不肻糶米與土居百姓而外縣牙人在鄉村收糴其數頗多既是鄰邑救荒官司自不敢禁遏止縁上司不許妄增米價本欲少抑兼并存恤細民不知四境之外米價差髙細民欲增錢糴于上户輒為旁人脅持獨牙儈乃平立文字私加錢于糶主謂之暗㸃是以牙儈可糴而土民闕食今若不抑其價彼又何必専糶于外邑人哉紹興五年行在斗米千錢時留守叅政孟庾户部尚書章誼不抑價大出陳廪毎升糶二十五文僅得時價四之一民賴以濟次年米賤令諸路以上供錢收糴復多贏餘葢村落騰踴極不過三兩月民若食新則價自定矣俞森曰無論官米民米俱當隨時價低昻不可故為增减葢價髙則逺販自多米多則價值自平此理勢之必然者也即使時價果髙官米果得厚利何妨益為多糴使民自然得平價之樂乎元祐之詔比市價量減常平法之只算糴本呉遵路之依元價出糶章誼之僅得時價四分之一皆未盡善葢一時姑息之愛而非與民通局打算者也簡旱災傷水旱而告之官豈民間之得已今守令諱聞此事不受災傷之狀責令里正伏熟里正亦慮委官經過所費不一故妄行供認以免目前賠費不慮他日流離餓殍刼奪之禍陳訴旱傷限八月終止限外不得受理然晚禾成熟乃在八月之後旱有深淺得雨之處早晚不同近得㫖展限半月仍以指揮到縣日為始元祐元年諫議大夫孫覺言諸路災傷各以實言不實者坐之災傷雖小而言涉過當者不問今民間訴災官府不及時簡踏比至秋成田間所有雖曰無㡬其服田之家只得隨多少收割以就耕墾官司見收割已畢便指作十分豐熟舉催全苗貧民欲訴則田無可驗之禾欲納則家無見儲之粟于是始伐桑柘鬻田産棄墳墓而之四方矣朱熹延和奏劄云救荒之務檢放為先行之及早則民知有所恃賴未便逃移放之稍寛則民間留得禾米未便缺乏然而州郡多是吝惜財計不以愛民為念故所差官承望風㫖已是不敢從實檢定分數及至申到帳狀州郡又加裁減不肻依數除放又早田收割日乆檢踏後時致有無根查者乃是州郡差官遲緩之罪而檢官反謂人户違法不為檢定其有檢定申到者州縣亦不為蠲放就中下户所放不多尤被其害又曰田稻既是乾損及其未穫便行檢踏即荒熟之狀明白易知非惟官司不得病民亦使奸民無由僥倖所以著令訴旱自有三限夏田四月秋田七月水田八月葢欲公私兩便近來官吏不曾考究令文但據傳聞云訴旱至八月二十日斷限遂至九月方檢早田非惟田中無稼之可觀即根查亦不復可見于是將旱損早田一切不復檢踏蠲放窮民受苦無所告訴而其狡猾有錢賂吏者則乗此暗昧以熟為荒又奏劄臣昨任南康軍日適值旱傷深慮檢放騷擾下户偶有士人陳説乞將五斗以下苗米人户免檢全放當時即與施行人以為便近日諸郡行之其利甚溥除上三等户隨分減放外下二等户盡行蠲免通計一縣所放亦不過共成五分問之居民莫不稱其平允此法最善乞詔有司定著為令自今水旱約及三分以上第五等户并免檢踏具帳先與全户蠲放如及五分以上即併第四等户依此施行其州縣差官後時致旱損田苗不存根查亦乞立法坐罪減租唐人水旱損四則免租損六則免調損七則租庸調俱免今之夏税則唐人之調絹也役錢則庸直也今州縣水旱十分去處夏税役錢未有減免之文簡放止及田租耳猶切切焉勺合之是計全未識古人用一緩二之意貸種貸種固所以惠民然人情易于貸而難于償必有勾追鞭撻之患青苗之法可見矣仁宗朝江南嵗饑貸民種糧十萬斛屢經倚閣而官司督責不已上憐而蠲之周世宗亦謂淮南饑當以米貸民或曰民貧恐不能償世宗曰安有子倒懸而父不為之解者安在責其必償也今之議貸種者當識此意名之曰貸葢防其濫請之弊耳優農耕而食者農民也不耕而食者游手浮食之民也自來官司賑給常先市井之游手與鄉落之浮食而緩于農家農家寒耕熱耘以供衆人之食及其饑也不耕者得食而耕者反不得焉今行抄劄之時宜五家為甲遞相保委某人為游手某為工某為商某為農官之賑給以農為先浮食者次之此誘民務本之一術也遣使古人救荒或遣使開倉遣使賑恤遣使詢民間疾苦然法令尚簡故所過無擾比來諸道置使民間利害悉以聞安有水旱之不知其所闕者在于賑濟無術類多虛文耳今但責監司郡縣推行救荒之實政則民受其惠不然民方饑餓官方窘匱而王人之來所至煩擾神宗時司馬光曰今朝廷每有一事不委之將帥監司守宰使自為方畧責以成效而常好遣使者銜命奔走旁午于道徒擾而于事無益不若勿遣之為愈也弛禁古人澤梁無禁闗市譏而不征今山林河泊各有所主又民心不醇一聞榜示因而砍伐墳林大起爭競雖富弼令樵采打魚之類一時未免侵擾若官司出錢租賃民間蘆塲或柴篠山縱民樵採庶為善法否則難行鬻爵名器固不可濫然饑荒之年假此以活百姓權以濟事又何患乎乾道七年八月勅湖南江南旱傷委州縣守令勸諭有米斛富室上户如有賑濟饑民今來立定格目補授名次無官人一千五百石補進義校尉願補不理選限將仕郎聽二千石進武校尉如係進士與免文解一次不係進士候到部與免短使一次四千石補承信郎如係進士與補上州千石承節郎如進士補廸功郎文臣一千石減二年磨勘係選人循一資二千石減三年磨勘係選人循一資仍與占射差遣一次三千石轉一官係選人循兩資仍占射差遣一次五千石以上取㫖優與推恩武臣一千石減二年磨勘陞一年名次二千石減三年磨勘占射差遣一次三千石補轉一官占射差遣一次五千石以上取㫖優與推恩勘㑹旱傷州縣勸誘積粟之家賑濟係崇尚風誼即與進納事體不同帥臣監司將勸誘到米斛依數開具出米人姓名申奏朝廷指揮依格出給付身云云夫民間納米而即得官誰不樂為只縁入米之後所費倍多未能遽得故多疑畏若能懲革此弊先給空名告身付之則救荒不患無米胡其重曰朝廷名器所以褒有徳而勸有功者也外此何可濫及惟是凶年賑濟則一舉而功徳兼備錫之以爵允為當也按朱熹奏雖降度牒換米而米數太多度牒一道計當錢千五百緡以此至今尚未有應募者後雖乞減去五十石其數尚多僧道富者有㡬仍當多裁其數以便通行胡其重曰僧道度牒古者平時不輕出必俟緩急之際故宋淳熈嵗荒勅降度牒博換米石以濟饑民凡願為僧道者每名備米三百石換與度牒一道元時亦降度牒下諸郡但為僧道者毎道納免丁錢始折中納鈔五錠似為可行亦備荒活民之一事也治盜凶年民之不肻就死者必起而為盜不戢則其患滋大乾道間饒郡大饑刼奪者紛然時太守柴瑾封劍付諸縣曰敢為渠魁者斬之羣盜望風遁匿淳熙十五年徳興饑民有剽掠道路者縣令曾棐亷得二人鎻項號令于地頭日給米一升俟來年麥熟日放盜賊由是衰止紹興四年樂平饑村民攜錢市米山路遇亡命縛而取之邑宰楊簡曰此曹斷刺則復為盜配去則復逃歸斷一足筋傳都示衆一境肅然此雖操切之政然甚合周禮荒政除盜賊之意胡其重曰弭荒年之盜不在乎使之畏威而不敢為當使之懐徳而不願為此釜底抽薪之法也周禮救荒以散利薄征居首繼以弛力舍禁而以除盜賊居其末葢散利則散財發粟靡不賑矣薄征則免催科之擾矣弛力舍禁則得諸般採取以供食用矣如是而猶為盜賊王法所不宥者矣然後除之母使滋蔓此周禮之深意經世者所宜體究也和糴和糴之弊在于籍數定價不能視嵗上中下熟須一依民間實值寕每升髙于時價一二文以誘其來或謂民間正苦無錢若官司和糴增價則為小民目下之患曰不然和糴本穀賤傷農增價以稱提之耳若此處不熟米價騰踴又何于此而糴哉古人和糴皆行于豐熟去處止縁官司見淺以得小利為己功糴買之官低價滿量以備交納之折交量之所飛斛㺯斗以為乞索之端上下誅求遂至失時艱于及數將來計無所出必有配抑之患今誠及時收之盡革諸弊又何患焉然所深慮者在于官司知糴而不知糶夫積而不散非惟化為塵埃虧折常平糴本而民間之米由是愈少矣然饑荒之年非獨收糴粳米凡粟豆蕎麥之類茍可濟饑亦何所擇存恤流民流民如水之流治其源則易為力遏其末則難為功若本處賦斂稍寛自然安土重遷誰肻移徙凡所以離鄉井去親戚棄墳墓皆非其所得已也嘗見浙人流移過淮甸者始焉扶老攜幼接踵于道及其既乆行嚢告竭棄其老幼或慟哭于道或轉死于溝壑者多矣然本處不可存活而抑之使不得動于理固逆至于一動之後中途官司禁遏抑勒使之復回此又非所宜也愚謂今未流者固宜賑濟已流者莫若令所過州縣多方存恤推行富弼之法以濟之勸種二麥春秋于他不書惟無麥即書仲舒建議令民廣種宿麥無令後時葢二麥于新陳未接之時最為得力四時纂要及諸家種藝書八月三卯日種麥十倍全收今民非不知種但貧而無力故後時耳古人春秋補助為政者于荒年能行補助之法非徒救荒亦隂寓務農重本之意通融有無通融有無真救荒活法其法有公有私如撥官廩借内庫假軍儲等公也勸人𤼵廩勸人糴販勸誘商賈率錢販米等私也淳熈九年無錫饑令提舉司于平江府朝廷樁管米内支二千石接續賑濟乾道元年浙西被水令臨安府于常平米内取撥五萬石平江府常州三萬石湖秀各二萬石鎮江府一萬石仰逐州即差官押發人船前去搬取専充賑糶不得他用其糶到錢樁管秋成收糴撥還此誠通融之術所宜舉行借貸内庫天子不當有私財私財充羨則侈心生李廸在翰林仍嵗旱蝗國用不足一日歸沐忽召對内東門上出三司所上嵗出入財用數問何以濟廸曰祖宗初置内藏庫復西北故土及以支凶荒今邊無他費陛下用此佐國用財賦寛則民不勞矣上曰今當出金帛數百萬借三司廸曰天子于財無内外願陛下詔賜三司以顯示徳澤何必曰借上悦從之然則今之州郡有仍嵗凶歉而匱乏無䇿者可不斟酌撥賜以為糴本耶紹興二十八年平江紹興湖秀諸處被水欲除下户積欠宰執擬令户部度有無損嵗計上曰只令具數便于内庫撥還朕平時無妄費所積本欲備水旱耳本是民間錢却為民間用復何所惜煟按王者以天下為家不以私藏為意也髙宗此言真王者之度歟預講荒政救荒無定法風土不一山川異宜惟在預先講究而已應令諸州守臣到任一月以後詢究本州管下諸縣鎮可以備救荒及其他措置之䇿斷然可行者條奏取㫖各令自守其説任内設遇旱澇即簡舉施行不得自有違戾外委監司内委臺諫常切覺察又救荒有賑糶賑濟賑貸三者名既不同其用亦各有體能識其體則實惠及民矣賑糶者用常平米其法在于平準市價黙消閉糴之風如市價三十文一升常平只算糴時本錢或十五六至二十文一升出糶須遍及鄉村若度所蓄米不足支用當以常平錢委官四出循環糶糴務在救民不得計較所費規圖小利施行之際須令上下官吏咸識此意賑濟者用義倉米其法當及老幼殘疾孤貧不能自存之人米不足則即用義倉錢糴豆麥菽粟之類共給或散錢與之施行全在委選得人村落各委本土公正有望素為鄉閭信服者以禮延見委諭激勸使樂為效命察不職者畧責一二以警其餘賑貸者截留上供米或借省倉米或為朝廷乞封樁米或于諸色倉厫權時那用一面申奏朝廷借内庫乞度牒糴米補還其法専及中等之户與夫耕農之無力者既不取息其勢必償此以陳易新之術家不許過二石嚴戒出納諸弊死亡或不能償者姑已之譬之賑濟一散無收豈在責其必償哉大約救荒縱有賠費失陷居上者亦當以社稷根本為念是乃利國家之大者也嘗謂救荒之政有人主所當行者有宰執所當行者有監司守令所當行者今各條列于後人主所當行恐懼修省減膳撤樂降詔求言遣使發廩省奏章而従諫諍散積藏以厚黎元宰執所當行以調燮為己責以饑溺為己任啟人主敬畏之心慮社稷顛危之漸進寛征固本之言建散財發粟之䇿擇監司以察守令開言路以通下情監司所當行察鄰路豐熟上下以為告糴之備視部内旱傷大小而行賑救之䇿通融有無糾察官吏寛州縣之財賦發常平之滯積毋議遏糴毋啟抑價毋厭奏請毋拘文法守所當行稽攷常平以賑糶准備義倉以賑濟視州縣三等之饑而為之計小饑則勸分發廩中饑則賑濟賑糶大饑則告朝廷截上供乞鬻爵借内庫為糴本視鄰郡三等之熟而為之備纔覺旱澇先發常平錢遣牙吏于鄰郡豐熟處告糴以備賑糶米豆雜糧皆可申明遏糴之禁寛弛抑價之令計州用之虚盈存下一嵗官吏支遣餘皆以救荒不給則告糴他邦察縣吏之能否縣吏不職劾罷則有迎送之費姑委佐官以輔之不然對移他邑之賢者委諸縣各條賑濟之方因民情各施賑濟之術差官祈禱存恤流民早檢放以安人情預措備以寛州用因所利以濟民饑興修水利整理城垣之類散藥餌以救民疾令所當行方旱則誠心祈禱已旱則一面申州告縣不可邀阻檢旱不可後時申上司乞常平以賑糶申上司發義倉以賑濟勸富室之發廩誘富民之興販防滲漏之奸戢虛文之弊聽客人之糶糴任米價之低昻請提督擇監視叅攷是非激勸功勞旌賞孝弟以勵俗饑荒之年有骨肉不能相保者今有婦能讓食于姑孫能養其祖父母者當物色之散施藥餌以救民饑荒之際必有疾癘寛征𣙜除盜賊雜記條畫往時賑濟每抄丁口用好紙裝寫數本供報上司徒擾百姓今宜革之只用幅紙申述施行之方賑法有三城市則減價出糶常平米村落則一頓支散義倉錢其不係賑濟之人則有逐都上户領錢興販循環糶糴之法陳龍正曰村落亦不可専主散錢尚須隨宜消息近臣僚劄子官司平日預先抄劄五家為甲有死亡遷徙當月里正申縣改正此意亦善今用四等之法每知縣到任責令用心抄劄存縣庶免臨期里正賣㺯之弊嘗見州縣抄劄既畢未見施行村民扶攜入郡請米官司未即支散裹糧既竭餒死紛然是以賑濟之名誤其來而殺之也亦有詐作流民經過請乞官吏多厭之然此皆饑窮實非得已官司正當矜憐今凡賑恤須預印手榜曉諭以見行措置發錢米下鄉未可輕動恐紊亂名籍反無所得庶革前弊江東運判俞亨宗賑濟踏殺婦人一百六十二人乞待罪是未知分塲分隊逐隊用旗引之法徐寕孫蘓次叅皆有成式似可通變而行大抵百人以上便慮冗雜此皆平日無紀律者况饑羸之軀易蹂踐乎發米下鄉弊倖非一令税户等第認米謂之勸分非惟抑配適啟閉糴莫若責隅官支領常平錢逐都量給所保上户數千緡令于豐熟處循環收糴米豆歸鄉隨時價出糶麥熟日以本錢還官其領錢不興販及興販而不歸本鄉糶者處以重罪利之所在人自樂為富室亦恐後時爭先發廩矣荒政叢書卷一
