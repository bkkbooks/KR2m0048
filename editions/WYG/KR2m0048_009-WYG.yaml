body:
  text: 荒政叢書卷九湖廣布政司參議俞森撰義倉考隋開皇三年朝廷以京師倉廩尚虚議水旱備度支尚書長孫平言古者三年耕餘一年之積九年作有三年之儲雖水旱為災而人無菜色皆由勸導有方蓄積先備故也請令諸州百姓及軍人勸課當社共立義倉収穫之日隨其所得勸課出粟及麥于當社造倉窖貯之即委社司執帳簡校每年収積勿使損敗若時或不熟當社有饑饉者即以此穀賑給自是諸州儲峙委積十五年詔本置義倉止防水旱百姓之徒不思久計輕爾費損于後乏絶觀此詔則知當時義倉亦屬虚文耳十六年又詔社倉准上中下三等稅上户不過一石中户不過七斗下户不過四斗其後山東頻年霖雨皆困水災所在沈溺天子遣使開倉賑給前後用穀五百餘萬石胡寅曰賑饑莫要于近其人隋義倉取之于民不厚而置倉于當社饑民庶乎有濟後世義倉之名固在而置于州郡一有凶饑無狀有司固不以上聞也良有司敢以上聞矣比及報可委吏屬出而施之文移反覆給散艱阻監臨胥吏相與侵没其受惠者大抵城郭之近力能自達之人耳居之逺者安能扶老攜幼數百里以就龠合之廩哉必欲有備無患當以隋氏為法而擇長民之官行勸農之法輔以救荒之政本末具舉民之饑也庶有瘳乎丘濬曰義倉之法其名雖美其實于民無益儲之于當社亦與儲之州郡無以異也何也年之豐歉無常地之燥濕各異官吏之任用不久人品之邪正不同由是觀之所謂義者乃所以為不義本以利民反有以害之也但見其事煩擾長吏奸而已其于賑恤之實誠無益焉然則如之何而可愚竊謂必將義倉見儲之米歸併于有司之倉俾將所儲者與在倉之米挨陳以支遇有荒年照數量支以出計其道里之費運之當社之間以給散之就量用其中米以為脚費任其事者不必以見任之官散之民者不必以在官之屬所司擇官以委必責以大義委官擇人以用必加以殊禮不必拘拘于所轄専専于所屬如此庶㡬民受其惠乎唐貞觀初戴胄議自王公以下計墾田秋熟所在為義倉嵗凶以給民太宗善之詔畆稅二升粟米秔稻隨土地所宜寛鄉斂以所種狹鄉據青苗簿而督之田耗十四者免其半耗十七者皆免商賈無田者以其户為九等出粟自五石至五斗為差下下户及蠻獠不取粟藏九年米藏五年下濕之地粟藏五年米藏三年嵗不登則以賑民或貸為種子至秋而償著為令髙宗以後稍假以給他費至神龍中畧盡𤣥宗復置之天寶八年天下義倉米六千餘萬石陸贄奏議臣聞仁君在上則海内無餒殍之人豈必耕而餉之爨而食之哉蓋以慮得其宜制得其道致人于歉乏之外設備于災沴之前是以年雖大殺衆不恇懼夫水旱為敗堯湯被之矣陰陽相寇聖何禦哉所貴堯湯之盛者在于遭患能濟耳凡厥哲后皆謹循之故王制記虞夏殷周四代之法乃云國無九年之蓄曰不足無六年之蓄曰急無三年之蓄曰國非其國也周官司徒之屬亦云掌鄉里之委積以恤艱阨縣都之委積以待凶荒王制旣衰雜以權術魏用平糴之法漢置常平之倉利兼公私頗亦為便隋氏立制始創社倉終于開皇人不饑饉貞觀初戴胄建積穀備災之議太宗恱焉因命有司詳立條制所在貯粟號為義倉豐則斂藏歉則散給厯髙宗之代五六十載人賴其資國步中艱斯制亦弛開元之際漸復修崇是知儲積備災聖王之急務也語曰百姓足君孰與不足百姓不足君孰與足言君養人以成國人戴君以成生上下相成事如一體然則古稱九年六年之蓄者蓋率土臣庶通為之計耳固非獨豐公庾不及編甿記所謂雖有凶旱水溢人無菜色良以此也後代失典籍備慮之㫖忘先王子愛之心所蓄糧儲惟計廩庾犬彘厭人之食而不知檢溝壑委人之骨而不能恤亂興于下禍延于上雖有公粟豈得而食諸故立國而不先養人國固不立矣養人而不先足食人固不養矣足食而不先備災食固不足矣為官而備者人必不贍為人而備者官必不窮是故論德昬明在乎所務本末務本則其末自遂務末則其本兼亡國本于人安得不務頃以寇戎為梗師旅亟興惠恤之方多所未暇每遇陰陽愆候年不順成官司所儲祇給軍食支計茍有所闕猶須更取于人人之凶荒豈遑賑救人小乏則求取息利人大乏則賣鬻田廬幸逢有年纔償逋債斂穫始畢餱糧已空執契擔囊行復貸假重重計息食每不充倘遇薦饑遂至顛沛室家相棄骨肉分離乞為奴僕猶莫之售或行丐􅆵里或縊死道塗天災流行四方代有率計被其害者每嵗常不下一二十州以陛下為人父母之心若􅂷省憂固足傷惻幸有可救乏之道焉可捨而不念哉今賦役已繁人力已竭窮嵗汲汲永無贏餘課之聚斂終不能致將樹儲蓄根本必藉官司助成陛下誠能為人備災過聽愚計不害經費可􅂷永圖近者有司奏請稅茶嵗約得五十萬貫元勅令貯户部用救百姓凶饑今以蓄糧適副前㫖望令轉運使摠計諸道户口多少每年所得稅茶錢使均融分配各令當道巡院主掌每至穀麥熟時即與觀察使計㑹散就管内州縣和糴便于當處置倉収納每州令録事參軍専知仍定觀察判官一人與和糴巡院官同勾當亦以義倉為名除賑給百姓以外一切不得貸便支用如時當大稔事至傷農則優與價錢廣其糴數穀若稍貴糴亦便停所糴少多與年上下准平穀價恒使得中每遇災荒即以賑給小歉則隨事借貸大饑則録奏分頒許從便宜務使周濟循環斂散遂以為常如此則蓄財息債者不能耗吾人聚穀幸災者無以牟大利富不至侈貧不至饑農不至傷糴不至貴一舉事而衆美具可不務乎俟人小休漸勸私積平糴之法斯在社倉之制兼行不出十年之中必盈三嵗之蓄𢎞長不已升平可期使一代黎人永無餒乏此堯湯所以見稱于千古也願陛下遵之慕之繼之齊之茍能存誠蔑有不至開成元年户部奏諸州縣所置常平義倉請通公私田畝别納粟一升逐年添貯義倉斂之至輕事必通濟嵗月稍久自至盈充宋乾徳中詔諸州于各縣置義倉嵗輸二稅石别収一斗民饑欲貸充種食者縣具籍申州州長吏即計口貸訖然後奏聞董煟曰今之義倉誠得遺人委積之遺意然必散貯于鄉里郊野之間則所及者均蓋憔悴之民多在鄉村于城郭頗少比年義米轉輸州倉一有凶歉村落不能遍及今應每遇凶歉相度諸縣饑之大小撥還義倉元米其水脚之需亦于米内量地里逺近消筭縣之于鄉亦然如此則山谷之民皆䝉其惠矣仁宗明道二年詔議復義倉不果景祐中集賢校理王琪請復置令五等已上户隨夏秋二稅二斗别輸一升水旱減稅則免輸州縣擇便地置倉貯之領于轉運使計以一中郡正稅嵗入十萬石則義倉可得五千石推而廣之則利博矣明道中饑歉國家欲盡貸饑民則軍食不足故民有流轉之患是時兼并之家出粟數千石即補吏是豈以官爵為輕歟特愛民濟物不獲已為之爾且兼并之家占田常廣則義倉所入常多中下之家占田常狹則義倉所入常少及水旱賑濟則兼并之家未必待此而濟中下之民實先受其賜矣事下有司㑹議議者異同而止皇祐五年右司諫賈黯乞立民社義倉疏旣上上下其說司農寺且命李充與黯合議以聞乃下諸路度可否而以為可行者纔四路餘或謂稅賦之外兩重供輸或謂恐招盜賊或謂已有常平以贍給或謂置倉煩擾于是黯復上奏曰臣嘗判尚書刑部見天下嵗㫁死刑多至四千餘人其間盜賊率十六七蓋愚民迫于饑寒因之水旱枉陷重辟故臣請復民社義倉以備凶嵗今諸路所陳類皆妄議若謂賦稅之外兩重供輸則義倉之意乃教民儲積以備水旱官為立法非以自利行之旣久民必樂輸若謂恐招盜賊盜賊利在輕貨不在粟麥今鄉村富室有貯粟數萬石者不聞有刼掠之虞且盜賊之起本由貧困臣建此議欲使民有貯積雖遇水旱不憂乏食則人人自愛而重犯法此正消除盜賊之原也若謂有常平足以賑給則常平之設蓋以準平穀價使無甚貴甚賤之傷或遇凶饑發以賑救旣已失其本意而費又出公帑今國用頗乏所蓄不厚近嵗非無常平小有水旱輒流離餓莩起為盜賊則是常平果不足仰以賑給也若謂置倉廩斂材木恐為煩擾則今州縣修治郵傳驛舍皆斂于民豈于義倉獨畏煩擾人情可與樂成不可與謀始願自朝廷㫁而行之然當時牽于衆論終不果行仁宗時張方平上倉廩論畧曰比者勅書有諭州縣使立義倉之言徒有空文而無畫一之制于兹三年天下皆無立者凡今之俗茍且因循嚴令堅約猶復違慢為民興利豈易其人有位者無心有心者無位在上可行者務暇逸而從茍且在下樂行者或牽束而不得専以故民間利不克時興害不得時去積成弊蠧以及喪敗又凡事體興立實艱隳壊孔易或謀以為利而轉以為害彼義租社倉者齊隋唐氏旣嘗為之矣始為百姓儲備之道終為僻君淫侈之費是于籍外更生一調也國家誠規前代之善策為濟人之大計明立條式權其斂出令天下之縣各于逐鄉築為囷廩於中户已上為之等級課入穀麥其輸入之數視嵗薄厚為之三品縣掌其籍鄉吏守之遇嵗之饑發以賑給小饑則約小熟之所斂中饑則約中熟之所斂大饑則約大熟之所斂専自縣鄉檢校之無使州郡計司侵取雜用焉此則収自優户穰嵗之有餘散于貧人凶年之不足不使兼并賈人挾輕資藴重積筦其利以豪奪于吾人此其協于大易裒多益寡稱物平施之義符于周官黨使相救州使相賙之法契詩人京坻之頌應時令賑乏之理使民足而知順讓益歸于本業誠為國之大事也元祐間上官均疏臣聞賊盜之多常起于凶嵗凶嵗不足常生于無備備災恤患常平義倉之設最為良法熙寧十年始講隋唐之舊興置義倉令人户于正稅斛㪷一石别納五升準備災傷賑濟不得移用法頗周宻蓋所斂至少所聚至多蓄之郡縣而散之于民斂之少則民易以輸聚之多則上足以施予蓄之郡縣則凶嵗有備散之于民則人情無怨此隋文皇唐太宗嘗行于治平之世已試之效也元豐八年指揮諸路義倉一切廢罷議者至今惜之若以為擾民則所出才二十分之一若患他用則當時已有著令又况水旱不常饑饉間有發倉廩則每苦不足行勸誘則不免強取與其施之于倉卒不若備之于無事今平糴之法旣以修復惟義倉之制尚未興舉臣以為義倉貯積在近民居則饑嵗賑濟無道路奔馳之勞費而人受實惠隋開皇中就社置倉蓋以此也臣欲乞興復義倉之法令于村鎮有巡檢廨舍處建立倉廩以便斂散其餘條例令有司更加修整以備饑嵗誠非小補紹興中趙令詪請糶州縣義倉米之陳腐者沈該等言義倉米不應糶恐失預備上曰逐郡自有米數若量糶十之三樁其價次年復糴亦何所損董煟曰義倉本民間所寄在法不當糶錢但太陳腐則不可食髙宗言樁其價次年復糴與今之糶米移用者有間矣二十八年詔祖宗義倉以待水旱最為良法州縣奉行不䖍寖失本意或遇水旱何以賑救其令監司檢視實數補還侵失董煟曰義倉本民物寄之于官凶荒水旱直以還民不宜認為己物也劉行簡轉對奏狀畧曰義倉之法論始于隋増廣于唐國朝因焉隋開皇間長孫平請令諸州百姓勸課同社共立義倉収穫之日各出粟麥藏焉社司執帳檢校多少嵗或不登則發以賑之然立法有未備也至唐貞觀間戴胄請自王公以下爰及衆庶計所墾田稼穡畆頃每至秋熟以理勸課盡令出粟各于所在為立義倉國朝乾德間天子哀嵗之不登而倉吏不以時出與民於是著發粟之制使不待詔令其後病吏之煩擾而民罹轉輸之困又罷之至神宗始復舊制民到于今賴焉然而推行之意有未盡合于古者豈得不論且所謂義倉者取粟于民還以賑之固不可以不均今也置倉入粟止在州郡嵗饑散給而山澤僻逺之民往往不霑其利其力能赴州就食者蓋亦鮮少况所得不足償勞流離顛沛有不可勝言者此豈社倉之本意哉臣愚謂義倉之粟當于本縣鄉村多置倉窖自始入粟以及散給悉在其間大縣七八處小縣三四處逺近分布俾適厥中若未有倉窖則寄寺觀或大姓之家縣令總其凡以時檢校遇饑饉時丞簿尉等分行鄉村計口給厯次第支散旬一周之庶㡬僻逺之民均受其賜不復棄家流轉道路此利害之較然者也乾道間楊倓奏義倉在法夏秋正稅每斗别納五合即正稅不及一斗免納應豐熟一縣九分以上即納一升惟充賑給不許他用今諸路州縣常平義倉米斛不少年來雖間有災傷去處支給不多訪聞皆是擅行侵用從來未曽稽考乞下諸路稽考施行趙汝愚疏臣伏見州縣之間每遇水旱合行賑濟賑糶去處往往施惠止及城郭不及鄉村鄉村之人為生最苦有終日役役而不能致一錢者使幸而得錢則又一鄉之中富室無㡬近者數里逺者一二十里奔走告糴則已居後于是老稚愁嘆始有避荒就熟輕去鄉井之意其間強有力者又不肯坐受其斃寇攘摽竊無所不至以陷于非辜城郭之人率不致此故臣嘗謂城郭之患輕而易見鄉村之害重而難知然而求所以施行之策則亦不過勸諭上户廣行出糶轉移常平義倉之米以賑之而已夫勸諭上户殆成虚文轉移米斛復多欺弊臣愚欲望聖慈逺悉隋唐社倉之制而去其損耗乏絶之弊明詔有司將逐州每年合納義倉米斛除五分依見行條法隨正稅就州縣送納外將五分于逐鄉置厫每嵗輪差上户兩名充社司掌管受納委本縣丞檢察其欺弊不如法者正治之使幸得連嵗豐稔所在稍有儲蓄則鄉里晏然若有所恃雖遇歉嵗姦宄之心無自生矣慶元初詔户部右曹専領義倉十一年以臺臣請通一縣之數截留下户苗米輸之于縣别儲以備賑濟使窮民不至于艱食惟負郭義倉令就州輸送至于屬縣之義倉則令丞同主之每嵗終令丞合諸鄉所入之數上之守貳守貳合諸縣所入之數上之提舉常平提舉常平合一道之數上之朝廷考其盈虚以議最殿林絅常平義倉論曰常平之法何始乎自李悝已有平糴之法自夀昌始定常平之策此其始也厥後罷于元帝復于顯宗隨罷隨復無有定制至于我朝置塲置倉熙寧以來而提舉常平之官始定然常平之始置也出内庫之儲以為糴本頒三司之錢以濟常平狼戾之時農艱于錢官則増價以入之菜色之日民乏于食官則減價以出之夫何舉糴本而為青苗之錢鬻廣倉以求二分之息伐桑易鏹官帑厚矣如民貧何鬻田輸官公家利矣如私害何此常平救荒之實政壊矣義倉之法何始乎自隋始置于鄉社至唐改置于州縣此其始矣厥後弛于永徽壊于神龍隨罷隨復亦無定制至于我朝罷復不常至于今日而義倉輸官之法始定然義倉之由設也自民而入自民而出豐凶有濟緩急有權名之以義則寓至公之用置之于社則有自便之利夫何社倉轉而縣倉民始不與而為官吏之移用縣倉轉而郡倉民益相逺而為軍國之資官知其斂未知其散民見其入未見其出此義倉之實政壊矣中興以來講明荒政常平義倉之儲雖有美名本無實惠惟州縣有侵借之患而支撥致有淹延之憂城邑近郭尚可少濟村落之民又安能扶持百里取糴于塲以活其已饑之殍哉是有之與無其理一也嗚呼孰知有甚焉者常平出于官義倉出于民出于官者官自斂之其弊雖不足以利民亦不致于病民出于民者民實出之官實斂之其弊不但民無給而官且病之文移星火指為常賦籮頭斛面重斂取盈噫可歎也予謂民不必甚與特無取之足矣民不必甚利特無害之足矣平時奪其衣食之資一旦徒抹以濡沫之利樂嵗不為善藏之地凶年始思啼饑之民何益哉寧願為不取繭絲之尹鐸毋願為矯制擅發之汲黯寧願為催科政拙之陽城不願為發粟賑饑之韓韶則裕民實政𨼆于常平義倉之外邵雍有言諸賢能寛一分則民受一分之賜有官守者朂諸元世祖時趙天麟上策曰隋立義倉公私廩積可供五十年至元六年有㫖每社立一義倉社長主之每遇年熟每親丁納粟五斗驅丁二斗無粟聽納雜色官司並不得拘檢借貸勒支後遇歉嵗就給社民食用社長明置収支文厯無致損耗自是以來二十餘年于今矣然而社倉多有空乏之處頃來水旱相仍螟蝗蔽天饑饉薦臻四方迭苦轉互就食老弱不能逺移而殍者衆矣彼隋立義倉而富今立義倉而貧豈今民之不及隋民哉臣試陳之今條欵使義倉計丁納粟意以饑饉之時計丁出之以取均也又條欵使驅丁半之彼驅丁亦人也尊卑雖異口腹無殊至儉之日驅丁豈可獨半食哉又計丁出納則婦人不納豈不食哉又同社村居無田者豈可坐視而獨不獲哉樂嵗粒米狼戾乞丐者踵門猶且與之况一社之人而至儉豈宜分彼此哉是蓋當時議法大臣有乖陛下之本心也伏望普頒明詔詳諭農民凡一社立社長社司各一人社下諸家共穿築倉窖一所為義倉凡子粒成熟之時納則計田産頃畆之多寡而聚之凡納例常年每畆粟率一升稻率二升凡大有年聽自相勸督而増數納之凡水旱螟蝗聽自相免凡同社豐歉不均宜免其歉者所當納之數凡饑饉不得已之時出則計口數之多寡而散之凡出例每口日一升儲多每口日二升勒為定體凡社長社司掌管義倉不得私用凡官司不得拘檢借貸及許納雜色皆有前詔在焉如是則非惟共相賑救而義風亦行至正間立大司農司條畫内一欵每社立義倉社長主之如遇豐年収成去處各家驗口數每口留粟一斗若無粟抵斗存留襍色物料以備歉嵗就給各人自行食用官司並不拘檢借貸支動經過軍馬不得強行取要社長明立文厯如欲聚集収頓或各家頓放聴從民便社長與社户從長商議如法収貯須要不致損壊如遇天災不収去處或本社内有不収之家不在存留之限明洪武初命户部運鈔二百萬貫往各府州縣預備糧貯每縣于境内定為四所于居民叢集處置倉民家有餘粟願易鈔者許運赴倉交納依時價償其值官儲粟而扃鑰之令富民守視凶嵗賑給已又令未備處皆舉行而召天下老人至京隨朝命擇其可用者使齎鈔往各處協同所在官司糴穀正統七年令各府州縣一應賍罰入官之物俱于年終變賣在官候秋成糴糧預備賑濟天順初詔預備倉有司常加修理蓄積糧儲遇有民饑驗口賑濟待豐年仍將収貯在庫賍罰炤依時價収糴収支之際並令掌印官員専理不許作弊軍民人等有願納粟穀者照例収管見數奏聞以憑旌異合干上司及風憲官按臨㸃閘但有侵欺盜用者便行拏問成化中敕藩憲言異時州縣設預備四倉所以廣貯蓄備旱澇為民賴也比久廢弛宜覈實見在貯蓄有無多寡之數仍儘各處在官賍贖糴為備有不敷聽于存留糧内借撥或于各里上中户勸助以充其看守倉者于附近里分僉殷實有行止者主之至通同官吏實収虚放為侵盜者論如律衛所地亦如之𢎞治三年户部議預備倉糧係救荒至計合炤州縣大小里分多寡積糧難易斟酌舉行其有司預備倉十里以下積糧一萬五千石二十里以下二萬石三十里以下二萬五千石五十里以下三萬石一百里以下五萬石二百里以下七萬石三百里以下九萬石四百里以下一十一萬石五百里以下一十三萬石六百里以下一十五萬石七百里以下一十七萬石八百里以下一十九萬石如其數斯為稱職過其數者果有卓異政績聽撫按具奏旌異給與本等誥命過其數而多増一倍者再有卓異政績具題旌擢仍給本等誥敕行移吏部遇缺不次擢用不及數者以十分為率少三分者罰俸半年少五分者罰俸一年少六分以上是為不職候九年考滿送吏部降用至于知府視所屬州縣以積糧多寡為勸懲如所屬州縣倉糧俱如數者知府亦為稱職州縣倉糧過其數而多増一倍兩倍者知府知州一體旌異陞擢不及數三分及六分以上者知府知州一體罰俸降用至于六年亦照此查筭積糧多寡以憑黜陟其軍衛比之有司不同必須量減庶可責成三年之内每百户所各要積糧三百石數外有能積糧百石以上者軍政掌印指揮千百户俱給羊酒花紅激勸不及三百之數一體住俸以後年分不拘石數務要年年有積無積者比較責罰侵欺者㕘奏拏問前項倉糧係有司者著落有司府縣正官整理係軍衛者著落都司衛所軍政掌印正官整理巡撫巡按分巡分守管糧管屯等官往來提督時常稽考以後仍三年一次查盤詔從之胡世寧曰𢎞治初年州縣親民之官責其備荒積穀多少以為殿最所以民受實惠固得邦本正德以來此官不重輕選驟陞下焉者惟圖覔錢以防速退上焉者惟事奉承取名以求早陞皆不肯盡心民事民窮財盡一遇凶荒多致饑死此先朝舊規宜遵復也陳龍正曰此時司計秉國者誰耶徒講積聚而不講更換新陳之法必致化為埃塵且查盤數缺必勒賠填官民之累俱無窮矣困天下之粟苦天下之官民使粟陰消耗于世間而百姓曽不得其用不亦左乎至于今日天下皆無復有預備倉寔斯議蠱之也使楊文貞主持周文襄行事肯若是哉今存其計里積糧之數以備稽考嘉靖中王廷相言備荒之政莫善于義倉宜貯之里社定為規式一村之間約二三百家為一㑹每月一舉第上中下户捐粟多寡各貯于倉而推有德者為社長善處事能㑹計者副之若遭凶嵗則計户給散先中下者後及上户上户責之償中下者免之凡給貸悉隨于民第令登記冊籍以備有司稽考則既無官府編審之煩亦無奔走道路之苦户部尚書梁材言天下郡縣各置預備倉豐年則斂歉年則散本以為民而行者率失初意設立斗户收守支放文移往返交盤旁午斗户負累民不沾仁凡以屬之于官故也今兵部侍郎王廷相欲倣古義倉之法出之于民而藏之于社社立正副每月朔為㑹社正率屬讀髙皇帝教民榜申以同盟之約舉衆中善惡奬戒之記其社米户口上者出什之四中什之二下什之一荒歉散及中下大䘲上尸亦次及之蓋以有餘補不足也昔人謂救荒無善政臣謂義倉之法可以備荒從之隆慶初王君賞請寛積穀之例言近時有司積穀之數雖已半減然州縣大者數萬石小者數千石即日入民于罪不可得盈宜再減其額時知州尹際可等積穀不如數例當降調吏部言有司積穀備荒雖亦急務然校之正賦輕重自是不同况皆出賍罰紙贖及他設處所入之數視地方貧富獄訟繁簡為差不可以預定也若必欲所在取盈是徒開有司作威生事之端反失濟民初意上是之沈朝宣曰倉號預備為凶荒設也其積穀取諸罪贖要在照時直征銀選委一二殷實誠篤大户掌管俟至銀多諭令傾成足色每十兩為一錠官給批文加以路費立限差往多穀地面擇買嘉穀差官監収其斗級祇令収貯看䕶如此則穀雖年深自堪食用若令罪犯備穀上倉則官吏斗給留難以營分例遂使附近積奸包納其穀未免偽雜一經查盤簸揚勢必虧耗其經手人員定遭問罪賠補若值凶荒窮民嗷嗷望食徒以不堪者發賑其何濟乎潘潢覆積穀疏查得先該户部奏行天下府州縣官各照里社積穀備荒立格勸懲不為不宻但如每一小縣十里之地三年之間不問貧富豐凶概令積穀萬五千石限數旣多責效太速以致中材剥削取盈貪夫因緣為利往往嵗未及饑民已坐弊及遇凶荒公私俱竭為困愈甚臣聞田野縣鄙者財之本也垣窌倉廩者財之末也與其聚民脂膏以實倉儲孰與盡力溝洫以興水利若宋儒朱子賑濟浙東所至原野極目蕭條惟見有陂塘處田苗蔚茂無以異于豐嵗于是益歎水利不可不修謂使逐村逐保各治陂塘民間可以永無流離餓莩之患國家可以永無蠲減糶濟之費此則救荒不如講水利明效大驗之可見者合無本部備行都察院轉行各處御史申明憲綱嚴督所屬凡境内應有圩岸壩堰坍缺陂塘溝渠壅塞務要趂時修築堅完疏濬流通以備旱澇毋致失時有傷禾稼及因而擾害于民每季終預將疏築完壊備細緣由開報御史及總督水利官員不時巡厯勘驗如有申報不實及壊久不修修不完固或因而害民者並為不職從實按勘施行遇該考滿務查水利無壊方許起送有能為民興利如史起漑鄴鄭國開渠之利者具奏不次擢用該管官員亦照所轄完壊多寡分數定註賢否一體旌别其八分紙價贖罪賍罰銀錢香錢引契魚鹽茶酒等稅不係解部者悉如御史王重賢等所言盡數糴穀入倉備賑不許分外分毫科罰侵尅庶㡬藏富于民因地之利雖有旱乾水溢民無菜色管子所謂積于不涸之倉藏于不竭之府者用此道矣靳學顔請積穀論疏臣聞之邊鄙強固則逺人怵服中原乂安則邊鄙傾嚮故中原者邊鄙之根本也百姓者中原之根本也衣食者百姓之根本也閭閻之細民有終身無銀而不能終嵗無衣寧終嵗無衣而不能終日無食今百司宰卿夙夜不遑者乃在銀而不在穀臣竊慮之夫以國家建都于燕東極齊西極秦南阻江淮神鼎之重金甌之固此萬世不拔之業也而臣竊有慮焉何哉誠以京師北據幽都更無郡縣而守在強敵雖有東齊西秦其形勢皆足以外中原而自固京師以南絶無名山大澤之限強藩與國之資皇上南面而臨之所恃以為腹心股肱之重者惟河南山東江北裏八府之人心耳此數處之人率鷙悍而輕生易動而難戢游食而寡積者也一不如意則輕去其鄉一有所激則視死如歸臣固視之熟矣八府遭歉則走山東山東遭歉則走江北又未巳也匹夫作難而千人嚮應往事蓋屢驗之然其弭之之計無他不過曰恤農以繫其家足食以繫其身聚其骨肉以繫其心而已今試移文于此數處者而覈其官舍之所藏每郡得穀十萬焉則司計者可安枕而無慮矣得五萬焉猶可以塞轉徙者之望設不滿萬焉真寒心哉臣竊意其不滿萬者多也即有水旱何所賴焉即有師旅之興何所給焉臣觀自古中原空虚未有如今日者也漢以前有敖倉隋以前有洛口倉唐有義倉宋有常平倉皆隨在而貯不専京師今徐臨德州皆有官倉本為寄囤至于存積㡬何哉臣近日有疏為山西積穀荷䝉皇上通行各省臣非不知以用言為榮而所慮者人意向不同或行之不力或施之無序輒以為無益有損焉臣且不堪其任咎也臣前疏謂一曰官倉蓋發官銀以糴者此必甚豐乃可以舉一曰社倉蓋収民穀以充者此雖中嵗皆可以行臣知中原空虚不但穀少而銀亦甚少其官倉一節今嵗已不能舉又聞有災變則社倉一節今嵗亦不能行但能以今嵗始講求其條件加意于積儲即明嵗舉而後嵗效未晚也此二倉者社倉舉之甚易而效甚捷然非官府主持于上則其事終不能成矣夫社倉即義倉也蓋始于漢耿夀昌而盛于隋長孫平唐戴胄之徒唐又最盛計天下積至數千萬以上及推其故唐義倉之開每嵗自王公以下皆有入是以其積獨多臣所謂法令之行自貴近始也宋則准各民正稅之數于二十分而取其一以為社蓋富者必田多田多則稅多稅多則社入多亦唐意也要之其出也則中歉賑極貧大歉賑中户又大歉焉乃沾及于富室所謂恩澤之加自無告始也今之言官倉者今年曰庫無銀焉明年曰庫無銀焉如是除八分紙贖之外無㡬耳言社倉者此曰官户當優免我也彼曰占役何科擾我也又田多者曰我不願賑于後亦不願出于今也如是不過貧民下户之輸無㡬耳是二法終不可行而中原之空虚如故也夫民之饑也必至于轉徙轉徙不已必至于為盜盜必先諸官户與夫役占有力之家而此輩多不悟非官府主持而鼓舞之終空言耳臣請下之各省以唐宋斂穀之法為則而就土俗合人情占嵗候以通其變限明春以裏盡報各府已前見貯之數以品其虚盈于明年冬末通計一嵗二倉新収之穀驗其功能著而為令嵗嵗修之在官倉者時其豐歉而斂散之利歸于官民有大饑則以賑之在民倉者時其豐歉而斂散之利歸于民雖官有大役亦不許借此藏富于民即藏富于官皇上所為南面而恃以無恐者其根本在此今之言計者不憂穀之不足而憂銀之不足夫銀實生亂穀實弭亂銀之不足而泉貨代之五穀不足則孰可以代者哉故曰明君不寶金玊而寶五穀伏惟聖明埀意疏入部議請以防秋客兵銀並鹽課六萬發各府縣糴穀又修復社倉令所在有餘積無為文具竟不果行陳龍正曰隋社倉唐宋義倉一事而異其名者也隋唐畞賦六升民困極矣宋于正賦外二十加一庶㡬得中然其大病摠在収貯于官假如遇饑饉悉以還民猶多此一納一出况未必還乎設賑給時果盡免諸弊貧民猶苦奔走候領况不及貧民乎古之王者使民各蓄其有餘而後世必欲取諸民而代為之蓄古之王者自節其餘以春補秋助而後世加取于正賦之外而強半更留以自肥如之何農不饑死朝與野不相胥以俱貧也朱子仍社倉之名而黙變其官貯之法隋唐粃政返為純王損下轉而益下矣然當時亦但令民間自添社倉未嘗革去官府義倉須令民間社倉旣多官府義倉一概不用然後全利而無害也明預備倉考㑹典祖宗設倉貯穀以備饑荒其法甚詳凡民願納穀者或賜奬勅為義民或充吏或給冠帶散官令有司以官田地租稅契引錢及無礙官銀糴穀収貯近時多取于罪犯紙贖以所貯多少為考績殿最云例具于後洪武初令天下縣分各立預備四倉官為糴穀収貯以備賑濟就擇本地年髙篤實民人管理正統五年奏准各處預備倉凡侵盜私用冒借虧欠等項糧儲查追完足免治其罪其侵盜證佐明白不服賠償者准土豪及盜用官糧論罪又議准凡民人納穀一千五百石請勅奬為義民仍免本户雜泛差役三百石以上立石題名免本户雜泛差役二年又勅廣西布按二司并巡按等官查勘預備倉糧内有借用未還并虧折等項著落經手人户供報追賠其犯在赦前者定限完日悉宥其罪赦後犯者追完照例納米贖罪若限外不完者不論赦前後連當房妻小發遼東邊衛充軍又令六部都察院推選屬官領勅分投總督各布按二司并府州縣官處置預備倉糧仍令巡撫侍郎并都御史等官兼總其事又令軍民人等各驗丁田自願出粟備荒者聽從其便官府不許逼抑科擾又令各處預備倉或為豪民占據責令還官或年深損壊量加修葺其倒塌不存者官為照舊起蓋又令各處預備倉凡民人自願納米麥細糧一千石之上雜糧二千石之上請勅奬諭七年令福建布政司凡預備倉糧給借饑民每米一石候有収之年折納稻穀二石五斗還官成化六年奏准預備救荒凡一應聽考吏典納米五十石免其考試給與冠帶辦事在外兩考起送到部未撥辦事吏典納米一百石在京各衙門見辦事吏典一年以下納米八十石二年以下納米六十石三年以下納米五十石免其考試就便實撥當該滿日俱冠帶辦事各照資格挨次選用又令在外軍民子弟願充吏者納米六十石定撥原告衙門遇缺収叅又令鳯陽淮安揚州三府軍民舍餘人等納米預備賑濟者二百石給與正九品散官二百五十石正八品三百石正七品又令各處預備倉州縣掌印官親管放支不許轉委作弊又令順天府河西務山東臨清直𨽻淮揚等闗鈔貫暫且折収粳粟糧米俱以十分為率各存留三分其餘七分河西務運至天津衛滄州等處臨清運至東昌府徳州等處淮安運至濟寧州徐州等處揚州運至邳州桃源縣等處俱各収貯預備官倉賑濟待明年豐稔仍各収鈔九年令直𨽻保定等府州縣兩考役滿吏典納米一百石起送吏部免其辦事考試就撥京考二百五十石免其京考冠帶辦事一百七十石就于本府撥補三考滿日送部免考冠帶辦事俱挨次選用其一考三箇月以裏無缺者納米八十石許於在外輳厯兩考𢎞治三年定有司每十里以下務要積糧一萬五千石軍衛每一千户所積糧一萬五千石每一百户所三百石每三年一次查盤有司少三分者罰俸半年少五分者罰俸一年少六分以上者九年考滿降用軍衛不及三百之數者一體住俸𢎞治十年奏准凡三年一次查盤預備倉糧除義民情願納粟囚犯贖罪納米外但有空閒官地佃収租米及贓罰紙價引錢不係起解支剩無礙官錢盡數糴米三年之内不足原數别無設法者俱免住俸叅究十七年議准遼東預備倉米穀陳腐查勘堪用者抵石放支各該衛所官軍月糧其米色頗陳尚堪食用者酌量折添斗頭與新糧間月支給浥爛不堪者著令經収人員領出照依律例追賠耗糧照例遞減支放盡絶將厫座修理照例召買上納十八年議准在外司府州縣問刑應該贖罪等項贓罰等物盡行折納糴買稻穀上倉以備賑濟並不許折収銀兩及指稱别項花銷正德二年令雲南撫按同三司掌印等官查勘各庫藏所積除軍前支用銀物外其餘堪以變賣及官地湖地等項可以召人佃種収租者儘數設法糴買米穀上倉専備賑濟又議准各司府州縣衛所問刑衙門凡有例該納米者每石折穀一石五斗収貯各預備倉四年議准湖廣原留賑濟支剩銀兩著糴買米穀上倉以備荒年五年奏准司府州縣衛所預備倉分添設土倉官盡行革退照舊令州縣正官或管糧佐貳官収放七年令在外問刑衙門凡問擬囚犯該納紙劄者二分納紙八分折米穀上倉不許折収銀兩又議准陜西所屬問刑衙門將一應該収人犯贖罪紙價准其収納粟米穀麥等項上倉八年議准遼東遇有本鎮犯該立功官員免其立功納穀一百石収貯預備倉其别處發來立功照舊行十四年令遼東比照宣大事例將巡按並大小衙門問過一應贖罪銀兩存留本處以備買糧賑濟嘉靖三年令各處撫按官督各該司府州縣於嵗収之時多方處置預備倉糧其一應問完罪犯納贖納紙俱令折収穀米每季具數開報撫按衙門以積糧多少為考績殿最如各官任内三年六年全無蓄積者考滿到京户部叅送法司問罪四年令各處撫按官通查積穀備荒前後議處過事宜翻刋成冊分發所屬著落掌印等官時常檢閲永逺遵守撫按清軍官每年春季各將所屬上年収過穀石實數奏報户部時常稽考以憑賞罰六年令撫按二司督責有司設法多積米穀以備救荒仍倣古人平糴常平之法春間放賑貧民秋成抵斗還官不取其息如見在米穀數少將貯庫官錢並問過贖罪折紙銀兩趂秋成時委賢能官一員糴買比時估量添二三文府以一萬石州以四五千石縣以二三千石為率明立簿籍查考嵗荒減價糶與窮民仍禁姦豪不許隠情捏名多買罔利事發重治八年題准各處撫按官設立義倉令本土人民每二三十家約為一㑹每㑹共推家道殷實素有德行一人為社首處事公平一人為社正㑹書筭一人為社副每朔朢一㑹分别等第上等之家出米四斗中等二斗下等一斗每斗加耗五合入倉上等之家主之但遇荒年上户不足者量貸豐年照數還倉中下户酌量賑給不復還倉各府州縣造冊送撫按查考一年查筭倉米一次若虚即罰倉首出一年之米又令各處撫按官督所屬官將贓罰稅契引錢一應無礙官錢糴買稻穀或從宜収受雜糧以備荒歉各該官員果能積穀及數聽撫按官覈實旌異若不用心舉行照例住俸又奏准州縣積糧之法如十里以下積糧一萬五千石二十里以下二萬石三十里以下二萬五千石五十里以下三萬石百里以下五萬石二百里以下七萬石三百里以下九萬石四百里以下一十一萬石五百里以下一十三萬石六百里以下一十五萬石七百里以下一十七萬石八百里以下一十九萬石三年之内務彀一年之用如數為稱職過數或倍増聽撫按奏旌不次陞用不及數者以十分為率少三分者罰俸半年少五分者罰俸一年少六分以上者為不職送部降用知府視所屬州縣積糧多寡以為勸懲其軍衛三年之内每一百户所各積穀三百數外多積百石以上者軍政等官俱給花紅羊酒激勸不及數者住俸九年令天下各府州縣有積久米粟盡數平糶以濟貧窮候収成買貯新穀務足前數二十四年議准徒杖笞罪審有力者俱令照例納米入預備倉不許以稻黍雜糧准折上納萬厯五年議准行各撫按詳查地方難易酌定上中下三等為積穀等差如上州縣每嵗以千石為準多或至三二千石下州縣以數百石為準少或至百石務求官民兩便經久可行自本年為始著為定額每年終分别蓄積多寡為賞罰其不及數者查照近例以十分為率少三分者罰俸三箇月少五分者半年六分者八箇月八分以上者一年仍咨吏部劣處全無者降俸二級亦咨部停止行取推陞待有成效撫按酌議題請復俸若仍前怠玩叅究革職七年題准各省直撫按督各州縣掌印官將庫貯自理紙贖並撫按等衙門所留二分贓罰盡數糴穀其追贖事例春夏折銀秋冬納米如年久穀多酌量出陳易新以免浥爛又議准各省直撫按酌量所屬知府地方繁簡貧富定擬積穀分數其積不及數者與州縣一體查叅其陞遷離任者照在任一體叅究八年題准各撫按官查盤積穀實數分别府州縣總撒填注主守職名每年終奏報其更代官候交盤明白方准離任又題准各有司積穀除遵照原議外不許妄行科罰剥民利已果有水旱災傷具奏減免其賑濟穀數即申報開銷不必復令饑民抵還十一年題准各省直撫按官㑹同司道各查所屬除富庶州縣仍照原額積穀其疲敝災傷及里分雖多詞訟原少者酌量裁減以後照例查叅俱以三年為期通融計筭分别蓄積實在之數照例旌奬叅罰如三年之内偶遇陞遷事故撫按官行該司道按年考覈積穀如數方許離任果有災荒事故委不能及原數者明白具奏方免叅罰其考滿朝覲俱照例行荒政叢書卷九
