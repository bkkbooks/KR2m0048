body:
  text: 荒政叢書卷三湖廣布政司參議俞森撰屠隆荒政考夫歲胡以災也非五事不修時有闕政皇天示譴降此大眚則或小民淫侈崇慝積釁醖釀沴氣仰干天和雨暘恆若水旱為災歲以不登四境蕭條百室枵餒子婦行乞老稚哀號甚而拾橡子采鳬茈以為食掩螺蚌捕鼠雀以充糧餒甚而斸草根剝樹皮析骸易子人互相食積骨若陵漂尸填河百姓之災傷困厄至此為民父母奈何束手坐視而不為之所哉余退居海上貧無負郭值海國歲祲百姓艱食流離之狀所不忍言余不暇自為八口憂惶而重傷鄉父老子弟飢饉乃參古人之成法順南北之土風察民病之緩急酌時勢之變通作荒政考以告當世貽後來惟司牧者留意焉一曰蠲歲租之額以蘇民困歲荒民飢救死不贍奚暇完租不惟飢荒之恤而迫日而征之民力必不支不填溝中則起而為盜周禮大司徒以荒政十有二聚萬民首曰薄征緩刑舍禁弛力西漢昭帝秋八月詔曰往年災害多今年蠶麥傷所賑貸種食勿收責毋令民出今年田租唐憲宗元和七年上謂宰相曰卿輩屢言淮南去歲水旱國以民為本民間有災當急救之即命速蠲其租按唐人水旱損四則免租損六則免調損七則租庸調俱免恤民如此其厚宋仁宗曰頃者江南歲飢貸民種糧數十萬斛轉運督責不己民貧不能償其悉蠲之神宗熙寧間上以久旱憂見容色於是中書省奏請蠲減賑恤建炎二年七月十九日上御批大水飛蝗為害最重之處仰百姓自陳州縣監司次第保明奏聞量輕重與免租稅淳熙令課利場務經災傷者各隨夏秋限依所放分數于租額除豁元大德二年正月詔曰比年水旱疾疫百姓多被其殃已嘗蠲復賑貸尚慮恩澤未周其大德三年腹裏諸路合納包銀俸錢盡行除免江南等處夏稅以十分為率量免三分大德五年詔曰各路風水災重去處今歲差發稅糧並行除免大德六年詔曰比歲旱溢為災民不聊生民間應欠差稅盡行免徵大德七年詔曰比歲不登百姓困乏其大德七年差發稅糧盡行蠲免大德八年詔免災傷去處差發稅糧自大德八年為始與免三年或與免二年或並行蠲免至大二年詔曰被災曾經賑濟百姓至大三年腹裏江淮夏稅並行蠲免至大二年正月以來民間逋欠差稅課程照勘並行蠲免至大三年詔曰各處人民飢荒轉徙疾疫死亡一切逋欠盡行蠲免仍除差稅三年延祐改元詔曰被災去處皇慶二年曾經賑濟人民延祐元年差發稅糧盡行蠲免國朝洪武元年詔曰今歲水旱去處所在官司不拘時限踏勘實災稅租即當蠲免宣德二年詔曰各處鹽糧稅糧除宣德二年以前未完者依例徵納其宣德三年鹽糧稅糧以十分為率蠲免三分宣德五年敕諭各處有經水旱蝗蝻去處從實體勘災傷田土明白具奏開豁稅糧坐視不理者罪之宣德八年詔曰凡災傷去處人户自宣德七年十二月以前拖欠夏秋稅糧人户鹽糧及官軍屯糧子粒悉皆停徵其拖欠各色課程鹽課并各衙門見坐派買辦采辦諸色物料顏料等及虧欠孳牧馬驢牛羊牲口悉皆蠲免仍免其今年夏稅宣德九年敕諭南京直𨽻應天蘇松府州縣今水旱蝗蝻災傷之處但是工部派辦物料即皆停止其不係災傷之處所派辦物料亦令陸續辦納不許逼迫正統六年詔曰今年被災去處踏勘是實其該徵稅糧馬草子粒即與停徵備開户部除豁正統十四年詔曰各處有被水旱災傷之處踏勘得實該徵糧草所司即與除豁景泰元年詔曰各處但遇水旱重傷之處所司從實取勘申達覆實具奏户部量與蠲免稅糧天順元年詔曰山東順天河間地方為因上年積水未消不曾布種勘實具奏該徵今年夏麥農桑絲絹悉與蠲免天順七年詔曰各處被災府州縣所種田禾無收已經具奏著巡按御史即與踏勘分豁以蘇民困其有具奏曾經宥免者該部即與準理不許重徵天順八年詔曰各處奏報水旱災傷曾經巡撫官踏勘明白具奏即與除豁成化七年詔曰各處拖欠稅糧馬草子粒農桑絹布等户口食鹽鈔錠商稅河泊門攤課程差撥銀兩自成化五年十二月以前盡行蠲免今歲奏報災傷去處曾經勘實者糧草子粒悉與除豁成化九年詔曰被災之處成化九年夏稅小麥絲綿絹匹户口食鹽盡行蠲免成化二十年詔曰各處該納糧稅馬草子粒農桑人丁絲綿户口食鹽門攤商稅魚課棗株諸色課程錢貫拖欠未徵者自成化九年十二月以前悉與蠲免今歲奏報災傷去處即行勘實糧草子粒悉與除豁𢎞治五年詔曰各處先年為因災傷小民拖欠稅糧草束馬匹物料等項有司畏罪揑作已徵及虛文起解後雖遇赦例以在官之數仍前追徵不與分豁者詔書到日撫按官務要用心查勘是實悉免追徵正德五年詔曰應天并直𨽻蘇松浙江杭嘉湖等府近遭水患民不聊生該年一應稅糧各該撫按官從公查勘量加蠲免以蘇民困余考之前代蠲租免稅何代無之而我祖宗蠲免之詔更無歲不下聖衷𢎞慈皇恩湛濊至今上照臨萬國子惠黔黎尤肫切焉惟我良有司遇災即聞聞速且詳毋緩毋隱奉行恩詔務殫厥心使上覃至仁下霑實惠帝鑒欣嘉神理孚祐可不勉旃二曰發積蓄之粟以救飢傷損有餘補不足天之道也王者玉食萬方四海為家元元枵腹殆濵死亡為民上者坐擁囷廩之饒而不急救下民旦夕之命如為民父母何民飢死且盡天下土崩而上能晏然飽食髙枕無是理也按月令季春之月天子布德行惠命有司發倉廩賜貧窮賑乏絶漢文帝後元六年大旱蝗弛山澤發倉庾以濟民漢昭帝始元元年三月遣使者賑貸貧民無種食者魏黃初二年冀州大蝗歲飢使尚書杜畿持節開倉廩以賑之吳孫權赤烏三年民飢詔遣使開倉廩賑貧者晉武帝泰始三年青徐兖州水遣使賑恤唐憲宗元和間南方旱飢遣使賑恤將行憲宗戒之曰朕宫中用帛一匹皆計其數惟賑恤百姓則不計所費卿輩當體此意宋太祖臨御之初遣使諸州賑貸分詣城南賜飢民粥曹州飢運京師米以賑之建隆元年遣户部郎中沈倫使吳越歸奏揚泗飢民多死軍儲尚百餘萬斛可貸于民至秋復收新粟帝即命發廩貸民至道二年詔官倉發粟數十萬石貸京畿及內郡民為種熙寧七年河陽災傷詔賜常平穀萬石興修水利以賑濟飢民六月詔發衛州常平倉粟四萬九千餘石貸共城獲嘉等三縣中等闕食户熙寧八年沂州淮揚災傷特甚詔發常平錢省倉米等給散孤貧户元大德四年詔曰被災去處有貧乏闕食者所在官司量與賑給大德五年詔曰聞夏秋以來霖雨風水為災南北數路民罹其害朕甚憫焉其議遣官分道濟恤大德九年詔曰諸處百姓有貧乏不能自存者中書省其議賑濟毋致失所我朝永樂十九年詔曰有被水旱闕食貧民有司勘實賑濟洪熙元年詔曰有被水旱災傷去處闕食貧民有司即便取勘賑濟毋得坐視民艱宣德九年敕諭被災之處人民乏食委官前去於所在官倉量給米糧賑濟正統四年詔曰各處有被水旱災傷闕食貧民有司即為取勘賑濟勿令失所天順元年詔曰預備倉有司常加修理蓄積糧儲遇有民飢驗口賑濟朝廷德意往往如此其在有司之良如畢仲遊之賑濟耀州滕達道之賑濟京師張詠之賑濟成都富弼之賑濟青州皆擘畫得宜調停有法全活甚多號稱良牧夫賑濟者聚濟不如散濟零濟不如頓濟何為聚濟不如散濟聚數千萬人於一處而為之給散上之給散難周有守候之苦下之喧溷日積有蹂踏之患夏秋熱氣薰蒸疾疢易作羣居露宿栖泊無廬為害不淺必也委賢能僚屬及鄉宦之良富民之有德行者分頭給散而正官為之總管稽查可也何為零濟不如頓濟即如一人日給糧一升一月應得三斗令飢民僕僕焉奔走而日領一日之糧既費且勞得不償失不如計一月三斗之糧頓而與之令得家居安食一月一月糧盡後復赴領官不煩瑣而民得安逸不亦可乎三曰行官糴之法以資轉運夫境內災傷野無青草將議賑濟則恐官府之囷廩有限議勸借則恐地方之富户無多最妙之策須發官帑銀兩若干委用忠厚吏農富户轉糴於各省外郡豐熟之處歸而減價平糶於民委用員役分頭往糴如發官銀一千兩先糴五百兩至而糶與飢民即發後五百兩往糴先五百兩糶完而後五百兩繼至後五百兩將盡而先五百兩復來如此轉運無窮循環不已則百姓雖丁凶年之苦而常食豐年之糧積穀之家雖欲踊貴其價而官府平糶之糧日日在市彼即欲獨髙其價勢必不能漸近有秋閉藏無用則彼亦不得不平價而出糶矣如他處米穀不足則雜買豆粟蜀黍麥蕎蕨粉芝麻之類並足充飢民恃無恐况豐熟而還帑官銀不虧那移以逸民民飢獲濟若委用得人必無他虞即勸富民自以己資往來糴糶民亦必從此最妙之策也若附近州郡無豐熟之處不妨稍逺所以貴見災而懼先事預圖也考宋慶厯四年遣內侍齎奉宸庫銀三萬兩下陜西博糴穀麥以濟飢民吳遵路知通州時淮甸災傷民多流轉遵路勸誘富豪之家得錢萬貫遣牙吏二十次和賃海船往蘇秀收糴米豆歸本處依元價出糶使通州災傷之地常與蘇秀米價不殊董煟曰借內庫錢於豐熟去處循環糴糶以濟飢民古人髙見卓識已如此故此非余一人之臆説也惟出糶之時須設法禁約糴者必係真正飢民人不許過三石嚴查重罰毋為商牙揭販者所夾混頓糶展轉射利尤當嚴戢胥吏誅求役人抑勒此不能禁事瓦解矣四曰勸富户之賑以廣相生夫富者珍寶豐盈一身而外長物耳倉箱充溢一飽而外何加焉即令百姓垂斃而吾安享饒腴萬一民窮盜起戈矛相向雖有粟吾得而食諸而富者雖有所積未關軀命飢者稍得所濟實延餘生以吾未關軀命之糧而為彼實延餘生之助官府敬之百姓感之而又有陰德何苦不為以此相勸有良心者必動昔眉州蘇杲遇歲凶賣田以賑其鄰里鄉黨逮熟人將償之君辭不受以至數敗其業危於飢寒而不悔其後生子洵孫軾轍為世大儒光起門祚漢州李長者遇歲不登輒為食以食飢者自春徂冬日以數千乾道戊子民飢就食李家者日至三四萬人始自紹興之丙辰三十餘年歲以為常所損不資所全活亦無算其後孫寅仲登上第至禮部侍郎敷文閣直學士豈無尚義好施如二公者乎惟在上之人激勸而感發之耳而其本尤在司民牧者精誠以幹國豈弟以恤民如向經知河陽大旱蝗民乏食經度官廩歲支無餘乃先以己圭田所入租賑救之已而富人皆爭效慕出粟所全活甚衆扈稱為梓州路轉運使歲飢道殣相望稱先出祿米賑民故富家大族皆願以米輸入官而全活者數萬人夫上躬行仁義而其下有不望風響應者否也又須懸賞格以勸民頒科條以鼓衆或量其所捐而優以禮貌風以折節奬以旌匾榮以冠帶富民之所最欲得者給以印信一帖除重情而外預免其罪責一次令得執以為信彼見吾之中心欵誠調停詳妥好義者必爭先貪吝者亦勉應矣但惟宜行勸誘聽其自願不宜妄行科派強其不堪其最要者在有司先自捐俸以感竦士民夫有司之俸幾何詎謂其便足以賑恤百姓而假以鼓舞倡率使士民無辭者在此也五曰籍飢民之口以革冒濫夫上之賑濟以活飢殍也非以助姦民也余見里役之報飢民也家有需索人有納賄市猾之得過者欲為他日規避差徭之地則賄里役以報飢民民之實飢而流離者以貧無能行賄而反不得與則雖有賑濟之名無救小民之死必也罪濫冒罰遺漏嚴勘結密體訪如蘇次參將飢民人口數合請米數實貼於各人門首壁上如有虛名偽數告首斷罪或拘集各役出其不意令各書報隔别互查或真正飢民被遺許詣官自陳重治報役如此則濫冒之弊必革而待哺之民罔遺矣六曰躬賑糧之役以防吏姦夫官府之行賑濟當其吏胥之發糧也則既偷竊於吏胥及其委役之散糧也則又尅減於委役竊與尅者十恆得其七八而飢且死者十不能得其二三故事枝梧虛文搪塞如朝廷之德意何必也四境之內照東西南北分日擇地諭集該境飢民躬親查給勿委人誤事萬一地廣人稠一身不能遍厯委用廉能員役分頭管散親給糧食簿籍分明計給散糧食每一處共飢民户口若干糧食若干每名口給與糧食若干逐一明白榜示使飢民曉然各知數目如有管散人役剋減短少許飢民即時首告以憑坐贓究問如律正官出其不意時一親到彼處驗查則後人斷不敢作弊而窮民沾恩矣七曰詳村落之賑以遍窮簷夫顚連無告之民城市尚少村落為多有司之行賑濟往往彌縫於城市而疏脫於鄉村城市之中飢户稍有賑濟以為觀美而不知窮鄉僻野之間橫於道路填於坑谷者不知其幾宋紹興中議賑濟事高宗曰賑濟本為貧民近世賑濟止及城郭市井之內而鄉村之逺者未嘗及之須令措置州下縣縣下鄉雖幽僻去處亦分委官屬必躬必親則貧民沾實惠矣乾道中孝宗御筆批云今春閩中艱食朕甚念之向聞諸處賑濟多止及於城市而不及鄉野甚為未均卿等一一奏來大哉王言如陽春之遍幽谷大明之照窮簷為有司者顧可不體此意耶必也多方撫循加意周遍無逺無近皆吾赤子近處則正官親臨遼逺則委用廉幹而詳於防範嚴於稽查使無不均之歎可也八曰行食粥之法以濟權宜食粥之法為極貧者而設極貧者雖得升合之糧不便炊㸑日煮粥以飼之賴以全活顧所最忌者羣百千人而聚食一處逺涉者不及食粥而或以道斃羣聚則穢熱蒸染而易以生災甚而管粥者剋米而多攙以水給食而不惟其時欲以救民之生反以速民之死須慎選員役必躬親考核峻加罰治斯役人不敢作姦悉遵法令逐鄉而煮分圖而食煮必以潔食必以時如古者按時刻照人數執旗引隊羣而不亂此法可行也要之愚意煮粥終不如給糧零散終不如頓散也九曰設多方之策以𢎞仁恩夫四方之地土風懸殊災變之來時勢不一刻舟不可以求劒膠柱不可以調瑟必也順風俗相時宜酌人情權事勢凡可以佐百姓之急者術亦多端矣如漢鼂錯建言令募天下入粟縣官得以拜爵除罪武帝詔山林池澤之饒與民共之後漢永平年間詔五穀不登其令郡國種蕪菁以助人食董煟曰飢年食蕨根煮野菜拾橡子采聖米凡可以度命者隨所在而為之西晉武帝時螟傷稼度支尚書杜預上疏留漢氏舊陂繕以蓄水令飢者盡得魚菜螺蚌之饒此目下日給之益水去之後填淤之田畝收數鍾此又明年之益以典牧種牛四萬五千餘頭分以給民使及春耕種穀登之後責其租稅此又數年以後之益程珦知徐州久雨珦謂俟可耕而種時已過矣乃募富家得豆數千石以貸民使布之水中水未盡涸而豆甲巳露矣是年遂不艱食范純仁為襄邑宰因歲大旱度來年必歉於是盡籍境內客舟誘之運粟賴以無飢又古者行鬻爵令人輸粟照所入之數以次補吏給度牒度僧每名入米三百石易度牒一道以活飢民遇飢行權及熟即止乃若范仲淹遇災荒募民大修營造而令飢者就工就食世人不達以為災歲興作擾民也而不知飢民反賴以獲濟古人救荒多方哉乃若出官帑銀而循環轉運及勸富民之興販誘客商之糶糴此於荒政更為喫緊當事者不可不知也十曰厲揭販之禁以祛市姦歲侵穀貴小民已不堪命而市井之猾牙儈之徒罔念民艱乘時射利凡遇有穀之家入市出糶結黨成羣邀截兜攬稍高其價而收糴之以圖抑勒零糶取利倍增穀價之所以日長飢民之所以日困皆此曹為之也有司須嚴查密訪重責枷鎖號令都市此風戢而穀價平矣十一曰戒抑價之令以來商糶夫民情之趨如水之流順而導之則通壅而遏之則決荒年榖貴民誠不堪有司不忍穀價日髙以病小民乃令抑減時價定為平糶此令一出則他處之興販者畏沮而不來本境之有穀者閉糴而不出民食愈乏人情悚懼強則有劫掠弱則有飢死而已故良有司惟貴設法調停令穀價聽時低昻不強抑減而出官銀以行運糴恤商賈以來興販請皇恩以開賑濟懸賞格以勸富民悉力調停漸近食新則榖價不減而自減不平而自平矣范仲淹知杭州包文拯知廬州皆不限米價而賈至日多米價遂賤此前賢已行之明鑒也十二曰豫民間之利以充贍養民間之利如近山林者則有樵採之利近江海湖蕩河泊陂池者則有梁罟之利近竈場者則有煎煮之利近關津厰務者則有商稅之利須力請於上暫弛一二月之禁令飢民得依以活命一遇豐熟即便停止而又為之嚴示約束不得乘機急行非法搶虜犯者無赦是亦救荒之一策也十三曰留上供之粟以需賑濟夫王者為民父母四海蒼生皆其赤子也寧有父母之廩食有餘坐視赤子之飢餓而死而漠不為之拯救乎損太倉之稊米滄海之一粟而可以活萬姓之命王人者所當急圖也余考宋大中祥符詔江淮發運司歲留上供米五千石以備飢年賑濟紹興間户部尚書韓仲通乞以上供之米所餘之數歲樁一百萬石别廩貯之以備水旱乾道七年饒州旱傷截留在州樁管上供米三萬石以賑飢民熙寧中浙西數郡水旱災傷詔撥本路上供斛斗二十萬石賑濟宋時人主憂民如此今朝廷不聞詔留某項解京糧餉賑濟飢民所司亦絶不敢以此為請而徒取境內藏積糧儲量行給散能有幾何譬如霡霂小雨灑久旱龜坼之田其何能濟虛文故事良亦可哀也已今遇大祲願有司力請於監司監司力請於朝廷留粟發粟如前代舉行者不然所司噤不敢出聲即民間之疾苦何由而上聞上人之德意何由而觸發乎而乃令明時賑恤之仁逺遜前代是所司之過也誠有能將小民飢餓流離乞丐轉徙死亡僵籍傷心酸鼻諸苦狀悉描寫以上聞於當寧而懇其留粟發粟則上之人必惻然而感動即不然而言者未必便獲罪即獲罪吾亦欣欣甘之耳嗟嗟今南北水旱災傷殆遍而杳不聞鄭俠流民之圖蘇軾腰領之札慷慨激切為下民請命者何也十四曰犯專擅之禁以救然眉嗚呼民命懸乎旦夕君門逺乎萬里閭閻之窘急星火矣吾不惟閭閻之急是顧而惟私念其身家妻孥必請命而後行得報而後發道途往返未及施行而百姓必轉於溝壑矣萬一請而不得則小民雖纍纍而就斃且盡亦付無可奈何而已故余以為賑濟之事若猶可稍緩則當以請命為恭若勢在然眉朝不及夕則先發後聞以身當之可也漢汲黯奉命往視河內失火遇河南貧人傷水旱萬餘家或父子相食以便宜持節發河南倉粟以賑貧民請歸節伏矯制之罪上賢而釋之唐蕭復為同州刺史歲歉京畿觀察使儲粟復發之以貸百姓有司劾治詔削停刺史或弔之復曰茍利於人胡責之辭其後拜兵部尚書宋慶厯年間江東大飢運使楊紘發義倉以賑之吏欲取旨紘曰國家置義倉本慮凶歲今須旨而後發人將殍死上聞而褒之楊逸為光州刺史荒歉連歲以倉粟賑給有司難之逸曰國以人為本人以食為命以此獲戾乃所甘心莊宗聞而賢之韓韶為嬴長賊聞其賢相戒不入嬴境餘縣多被寇盜廢耕桑其流入縣界求索衣食者甚衆韶憫之乃開倉賑拯主藏者爭之韶曰長活溝壑之民以此獲罪又何歉太守素知韶名竟無所坐夫捐一軀以活萬姓之命仁人志士猶為之况此舉不過奪官重則問罪而已奈何顧惜而坐視百姓危亡况古人專之往往反蒙朝廷褒美然臣子甘黜罰以犯矯制褒美固非其所覬覬褒美而嘗試為之難哉十五曰假便宜之權以倡民牧夫大夫專境外將軍制分閫戎事則爾荒政亦宜然小民之危亡展轉在呼吸之間而朝廷之決斷制命在萬里之外有司之觀望顧惜者多捐身為民者少君相不長慮遙燭而稍假有司以事權小民之倉卒奚告焉隋煬帝幸江都郡縣競刻剝以充貢獻生計無遺加之飢饉無食始采樹皮木葉或搗藁為末或煮土而食之官廩充牣吏皆畏法莫敢賑救百姓安得而不餓死天下安得而不敗壞乎宋乾德元年夏四月詔諸州長吏視民田旱甚者則蠲其租不俟報余讀此詔每為感泣而頌聖明有司非除吏之職無封拜之權而古惟救荒則給空名告身空名度牒與之而令得拜爵度僧專而行之豐熟乃罷古之良有司有不俟請命徑自截留上供者有專制發粟歸而伏罪者朝廷非但赦其罪狀又從而褒嘉旌異之無非優假有司全活黔首此在荒歲權宜不嫌於下移旁落惟君相深計而熟察之耳十六曰節國家之費以業貧民夫天子燕饗賞賜每一舉動輒費巨萬小民曾不得顆粒入口枵腹而終亦可悲矣漢桓靈隋煬帝唐德宗俱享四海之饒擁紅腐之積穀粟如糞土珍寶如泥沙而黎民阻飢罔知收恤奔亡破敗詎云不幸周禮荒政眚禮蕃樂曲禮歲凶年穀不登君膳不祭肺馬不食穀馳道不除祭事不縣大夫不食粱士飲酒不樂玉藻曰年不順成君衣布搢本關梁不租山澤列而不賦土工不興大夫不得造車馬穀梁曰大侵之禮君食不兼味臺榭不塗鬼神禱而不祀漢景帝以歲不登令馬不食粟徒𨽻衣七緵布東晉烈宗以疆場多虞年穀不登供御所須事從儉約九親供給衆官廩俸權可減半凡諸役費自非軍國要事皆從停省唐憲宗宫中用帛皆計其數而惟賑恤百姓無所吝惜在朝廷稍事減損不過省一飯一賞之費便足延閭閻萬姓之生亦何苦而不為乎十七曰立常平之倉以善備賑按漢耿夀昌建言令邊郡皆築厫倉穀賤時增價而糴以利農榖貴時減價而糶以利民名曰常平倉原取惠利百姓以防水旱災傷初非較計出入利息以足公帑故增價以糴須照歲熟之大小減價以糶亦須照歲飢之上下無歲不糴無歲不糴斯新陳互易出入常平唐宋力行此法甚利小民我朝亦倣而行之奈有司不肯著實舉行一切文移虛應故事當穀賤之時不設法增價買糴以致倉中空虛稍有所積一遇飢荒則又受文法之牽制畏上司之稽查而不敢輕發以減價平糶積於無用閉為灰埃僅僅以一紙教令勸民間之出粟以為吾救荒之事畢矣為民上者事須師古計在利民設法買糴令其常盈絶别項之那移計吏斗之侵剋常糴常糶出陳易新不可不講也十八曰兼義社之倉以待凶荒按朱熹社倉議淳熙八年建寧府崇安縣開耀鄉有社倉一所本府給常平米六百石夏間給與人户冬間納還每石量收息米二斗自後逐年依此斂散或遇小歉即蠲其息之半大飢則盡蠲之至十有四年量支息米將原米六百石納還本府其見管三千一百石並是纍年人户納到息米已申本府照會將來依前斂散更不收息每石只收耗米三升行之諸路其有富家情願出米本者亦從其便息米及數亦與撥還有不願置立去處官司不得抑勒則亦不至騷擾公私儲蓄實預備久逺之意但夏貸冬收每石收息米二斗愚以為利息頗重每石息米改作一斗足矣義倉古與社倉通行但古行義倉法於田畝正稅外别徴升合以入義倉在廉吏行之則可貪吏將借以濟其多取之私擾民不便愚意謂之義倉乃尚義樂施之名官吏尚義則捐俸以買糧富户尚義則出資以入粟上以好義倡之而風巨室大家起而樂助必如是而後可耳常平以賑糶義倉以賑濟在官既有減價平糶則不必出令抑勒而可以潛壓下穀價復有賑濟則與平糶參用並行何荒不救在糶則止許飢民之零糴而不許販户之頓買在濟則務自城郭之百姓以遍鄉村之極貧如是庶乎水旱有備流亡可免矣然而漏落偽冒重疊等弊不可不嚴查而釐革也十九曰豫救荒之計以省後憂夫當事變未來而豫為之所則意思整暇易於擘畫及其事變既至而後為之圖則手足冗迫難以支分蘇軾曰救荒恤患尤當在蚤若災傷之民救之於未飢則用物約而所及廣救之於已飢則用物博而所及微熙寧之災傷沈起張靚之流不先事奏聞但立賞閉糴富民皆事藏穀小民無所得食流殍既作然後朝廷知之始敕運江西及截本路上供米一百二十三萬石濟之巡門俵米攔街散粥終不能救繼以疾疫本路死者五十餘萬人此無他不先事處置之過也去年浙西數郡水旱二聖仁智聰明於去年十一月終首發德音截撥本路上供斛斗二十萬石賑濟又於十二月終寬減轉運司元祐四年上供斗斛三分之一為米五十餘萬斛盡用其錢買銀絹上供了無一毫虧損縣官而命下之日所在歡呼官既往糴米價自落又自正月開倉糶常平米仍免數路稅場所收五穀力勝錢且賜度牒三百道以助賑濟本路帖然絶無一人餓殍者此無他先事處置之力也趙抃知越州先民之未飢為書問屬縣被災有幾鄉民能自食者幾家當廩於官者有幾人溝防興築可僦民使治之者有幾所庫錢倉粟可發者有幾何富人出粟之家有幾户使各書數目以對得飢民若干粟若干豫為設法賑濟男女分日而給使衆無相蹂又為給粟之所於城市郊野若干處又告富人無得閉糴又出官粟平價自糶又僦民修城領工價就食又民取息錢者告富人縱豫之而待熟官許為責償又男女有棄者收養之又為病坊處疾疫之無歸者募僧二人屬以視醫藥飲食令無失時凡死者使在處收瘞之抃經營綏輯纎悉畢備皆先事為計越民賴以不災古人早見如此如見目今大水大旱大蝗知將來必飢輒豫為之計或豫檢踏災荒之田豫查報被災之户早申災傷之文早借備賑之粟或豆麥蹲鴟薷薥蕪菁芝麻之類可種則躬勸率百姓廣種各鄉或豫發官帑銀給委忠實齒德富户往鄰郡豐熟去處糴米穀雜糧以待平糶或勸誘商賈客舟運粟以來而許為存恤護視主糶焉或豫查境內巨家富室而結以恩信優以禮貌勸以隂德悚以利害令其各有顧惜桑梓之情凡此皆豫之道勝也余城中一貧寡婦見去歲大風水知來歲必荒手織巾布鞋襪及出室中什物令其兒日日入市雜易大小豆麥松花蕨粉芝麻之屬磨碎炒乾雜作為細粉而積數巨桶至今歲果大飢日取滚湯攪而啖之終飢荒之月食尚有餘他人多餒死而獨此婦無恙令官民之智皆如此婦也則何飢荒之足憂哉奈何有司日惟優遊堂上捱歲月而望遷小民亦惟茍度目前臨飢荒而失措故豫備之道不可不亟留神也二十曰先檢踏之政以免壅閼水旱蝗蝻之後田禾被災矣若非正官親臨逐鄉履畝檢踏災傷而令首領及吏農里老人等往而虛應故事或反需索滋擾則在先之核災不實而後日之救荒何據乎此隱漏重冒之弊所以紛紛也二十一曰時奏荒之疏以急上聞夫天子端居九重安能坐照萬國而無遺即如境內災傷矣百姓急須告災於有司有司急須申災於撫按撫按急須奏災於朝廷朝廷以萬國為一體必不坐視而不為之拯救萬一報遲則上人易以起疑而救災又恐無及此伊誰之咎乎二十二曰嚴蔽災之罰以警欺玩吏好談時和年豐以釣聲譽而諱言飢荒水旱以損功名故恆有匿災異以不聞甚或飾飢荒為豐穰唐憲宗謂宰相曰卿輩屢言淮南去歲水旱近有御史自彼還言不至為災李絳對曰御史欲為姦諛以説上意耳夫已則竊豐穰之虛名而使百姓受仳離之實禍有人心者忍為之乎大厯二年秋霖損稼渭南令劉澡稱縣境苗獨不損上曰霖雨溥博豈渭南獨無更命御史朱毅視之損三千餘頃上歎曰縣令字民之官不損猶應言損乃不仁如此乎貶澡南浦尉代宗此一事稱聖矣往年吳郡大水吳中一令悉力祈禱冒雨遍厯各鄉督率修築墟岸堤塘他郡邑潦侵而此邑頗不為災及御史入其境見田禾芃芃秀實謂令曰人言汝邑獨不災果然不謬令曰以使君所見乃傍官河田易行戽救故得不災其四鄉腹裏低窪去處壞不能救者多矣令安敢冒不災之美名而貽百姓以大患為令若此一令可哉二十三曰修水旱之備以貴豫防夫救災於有事之後不如防災於無事之先田地之髙燥者宜有以蓄水以備旱則池塘河蕩不可不濬也田地之低窪者宜有以泄水以備潦則墟岸隄防不可不築也我國家設有水利之官正所以專管講求邇年以來有司皆視為故事漫不經心水旱無備非一旦矣願朝廷特發明詔申飭諸道監司督有司有司督糧塘里役著實修舉修舉者有賞廢墮者有罰分别勤惰以示勸懲有備無患此之謂也二十四曰躬祈禱之事以回天意成湯六事自責自為犧牲而甘霖立應唐文皇願移災朕身以存萬國不忍蝗蟲食穀而吞之寧食吾肝肺是歲蝗不為災古帝王尚爾何况有司乎夫天高聽卑英靈肹蠁靡敢不孚但天體尊而神理赫其非凡夫假意虛文可以一呼而應亦明矣有司之祈禱者或佯禁屠沽而私飲酒食肉冠帶騶從而不肯習勞僅發一牒躬一拜了事而已多岐其心二三其德悠悠忽忽念罔在民以此為禱而輒欲回神譴召天和吾知其必不能也持齋素斷嗜欲畏天怒哀民窮首宿罪悔已愆內辦精誠外厲勤苦易錦繡而素服屏車從而徒跣蒲伏而終朝長跪而百拜暴日而焦枯沐雨而腫濕涉逺道而不辭觸蛟龍而不畏上天加災下民且死吾何惜一身以謝萬姓必感格而後已如是而天心未有不回者也古蝗不入境霖雨隨車豈偶然之故哉二十五曰勵勤苦之行以感人心人雖嚚頑者亦有良心可感而動吾平日為吏廉仁而祈禱勤苦士民業已見而心憐之即如欲勸士夫之賑濟發大家之蓋藏則不遣𨽻卒不行符票方巾野服芒履徒步而遍詣士民之家為之降其顔色溫其言辭優以禮貌風以德義憂戚之意發於面目誠懇之念見於舉動以吾平日之居官兼以此時之誠切士民必感而泣良心既動何物不捨何民不從如是而有恝然漠然絶不愍念官司慷慨舉發者此則豺狼之民良心盡滅不妨痛懲一二以警衆庶捐縻身家我亦何求為百姓耳能令百姓人人願為我死則何事不濟余叨潁上青浦令身嘗試而知其必然願良有司之聼之也二十六曰廣道途之賑以集流亡有如旁郡縣皆飢聞吾救荒有法或流移而來雖非吾部中之赤子然仁者一視之情寧得恝焉而聽其枕籍而死乎熙寧詔曰流民所在州縣每程人給米豆一升余觀宋人擘畫屋舍安集流民曉示流民許令在流寓地方諸般採取營運支散流民斛斗米豆數目安泊存恤救濟最為周悉今郡縣有司遇有他處飢民流亡入境亦必委曲而為之給廬舍散糧食設醫藥惟力是視以免其道斃此不惟為天子收集流移而已之積纍功行亦不少矣二十七曰申保甲之令以遏盜賊飢荒之時盜賊易起喘息餘命斷不能大譟橫行不過為鼠狗之計以茍旦夕蜉蝣之生姑息而不為之撲滅則燎原可憂輒用重典而悉置之法則飢寒可憫防戢而底定之烏可無術哉但獲飢盜為之大張其威聲稍寬其捶楚待以不死號令於市以令喧傳當自解散二十八曰省荒後之耕以給將來大飢之後不惟民食艱乏即耕種亦苦無其具吾為省視耕種無食者量濟之無農具者量為處而給之或勸富户借食借具於貧民而令貧者為之出力耕種以補之或待收成而以糧食償之有司須於耕種之時暫輟政事親厯各鄉補助勸率百姓見上人留意農務有如此自然勤奮境無惰農農無荒業矣省耕省斂古人所行今何可廢也二十九曰申閉糴之禁以廣通融左傳僖公十三年冬晉薦飢使乞糴於秦百里奚曰天災流行國家代有救災恤鄰道也行道有福晉飢秦輸之粟秦飢晉閉之糴故秦伯伐晉以本境而言則他郡如吳越然以天下而言則一體若手足自多豐熟坐視鄰災蓋恐為外處搬運致本處亦荒不知吾不恤鄰萬一他日吾荒彼亦不救恤我非惟示人以不廣其於王者一統之義何如也考淳熙降旨諸路監司不許遏糴今朝廷宜敕監司憲臣出榜曉喻不許諸路有司遏糴違制者覺察申奏夫唇齒相倚首尾相應災變流行緩急有賴也三十曰墾拋荒之田以擴民産分東西南北區圖設勸農官數員選有身家德行良民為之正官親督履畝查勘荒田若干於拋荒户下即與豁糧募佃人承領開墾或許原户歸而復業量其人之丁力領墾若干給與工本糧食若富民願自備工食領墾者亦聽三年免其起科三年之後然後起科蓋既免稅糧復給工食招來有法勸諭有條人誰無恆産之思荒田盡墾國課漸增百姓殷富此在淮揚蘇松之間多有之向設屯田官員為此也而拋荒開墾今尚未盡則亦舉行者之不肯實心任事也如境內無拋荒田地則督率勸農官一意每歲省耕無分荒熟力本重農自有司事如近日建議北方新開水田於北人甚利蓋北方地勢高燥故宜種二麥而其間豈無可開種水稻者兼而行之始議為難數年以後為利溥矣奈人情駭於驟興難於慮始巨室沮撓持議不決殆可深惜凡此三十條者皆救荒之要策經效之良方余考證古今間參已見不略不迂頗得肯綮夫余藿食者睹記時事有慨於中蒿目而視焦吻而談余則過矣當事者采而行之天下之福也荒政叢書卷三
