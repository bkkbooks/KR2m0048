  text: 欽定四庫全書史部十三
  hash: sha256:37715509aef7f3494164bc585a87d8624d4b4517ea757749fe3b4d88b8516ad7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0048_WYG_000-1a, image: WYG0663/WYG0663-0013a.png}
body:
  text: 荒政業書目録政書類三邦計之屬卷一董煟救荒全法卷二林希元荒政叢言卷三屠隆荒政考卷四周孔教荒政議卷五鍾忠惠公賑豫紀略卷六劉世教荒箸略卷七魏禧救荒策卷八俞森常平考卷九俞森義倉考卷十上下俞森社倉考臣等謹案荒政叢書十卷國朝俞森撰森號存齋錢塘人由貢生厯官至湖廣布政司參議是書成於康熙庚午輯古人救荒之法於宋取董煟於明以來取林希元屠隆周孔教鍾化民劉世教魏禧凡七家之言又自作常平義倉社倉三考溯其源使知所法復究其弊使知所戒蓋其官河南僉事時所撰也末附鄖襄賑濟事宜及捕蝗集要則其官分守荆南道時所撰也救荒之策古人言之已詳至積儲尤為救荒之本森既取昔人良規班班具列而於三考尤極詳晰登之梨棗俾司牧者便於簡閲亦可云念切民瘼者矣乾隆四十三年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀荒政叢書原序古稱救荒無竒䇿非無竒䇿也預為之雖尋常行事自有神明莫測之妙臨時倉卒為之雖古人已見之效亦祗具文而已于生民曽何與焉所以荒政不可不詳欲求其詳不得不預為之備森嘗觀古今救荒事宜若干卷無不綱舉目張施行井井久矣會萃成帙藏之篋中兹當皇上憂民之切中外諸巨公無不亟亟焉惟荒政是問森雖承乏河員敢謂賑濟之事非職所宜盡乎爰取向所藏本登之棗梨期與各屬相為講究而亟圖之或可措置一二庶足以仰承宵旰之深衷亦不負子惠元元之素志蓋深有望于斯世云康熙庚午上元節巡理河南通省河道提刑按察使司僉事加四級錢塘俞森謹序
