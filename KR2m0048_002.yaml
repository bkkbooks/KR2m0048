body:
  text: 荒政叢書卷二湖廣布政司參議俞森撰林希元荒政叢言疏恭惟陛下堯仁舜孝出濳御天敬徳日躋文章虎變臣民作極萬國歡心比聞四川陜西湖廣山西等處民厄災傷惻然動念大沛蠲恩期於𢎞濟博延羣䇿用廣聰明葢自三王以降漢唐宋之君少有子育元元窮神知化如斯者也自大號渙頒臣民聳動凡有寸長咸思自獻况臣乆甘淪棄更荷生成大徳莫酬赤心徒抱茲承明詔敢不對揚夫救荒無善政古今所病古以賑濟垂芳史册者代不數人然法多醇疵事難盡述往時官司賑濟動費不稽毫分無補今皇上不愛太府百萬之銀以濟蒼生發自宸衷誠曠典也使不精求良法期濟斯人竊恐故弊仍存聖心良負然臣疎淺豈有髙論能禆神謨顧業尚専門事諳素練臣昔待罪泗州適江北大饑民父子相食盜賊蠭起之際臣之官適當其任葢嘗精意講求於民情吏弊救荒事宜頗聞詳悉今欲有陳于陛下者亦負日之暄以獻吾君之意也臣聞救荒有二難曰得人難曰審户難救荒有三便曰極貧之民便賑米曰次貧之民便賑錢曰稍貧之民便轉貸救荒有六急曰垂死貧民急饘粥曰疾病貧民急醫藥曰病起貧民急湯米曰既死貧民急募瘞曰遺棄小兒急收養曰輕重繫囚急寛恤救荒有三權曰借官錢以糴糶曰興工役以助賑曰借牛種以通變救荒有六禁曰禁侵漁曰禁攘盜曰禁遏糴曰禁抑價曰禁宰牛曰禁度僧救荒有三戒曰戒遲緩曰戒拘文曰戒遣使其綱有六其目二十有三備開于後編次以進總曰荒政叢言是皆往哲成規昔賢遺論臣嘗斟酌損益或已行而有效或欲行而未得或得行而未及謂可施于今日者也若夫恐懼修省降詔求言蠲租税以舒民困散居積以厚黎元皆人主救荒所當行則陛下已先得之不容臣言也至于賣軍職賣監生賣吏典乃不得已救急之弊事非盛世所當行則大臣已先言之不待臣言也陛下倘不以臣言為愚拙為迂疎乞勅部院詳議可否即賜施行一二難曰得人難者葢為政在人况救荒無善政使得人猶有不濟况不得人乎如常平義倉之法在耿夀昌長孫平行之則為良後世踵之則有弊其故何也正以不得其人耳今各處災傷民罹凶危陛下隠念至痛府庫百萬之財盡不愛以濟蒼生此真愛民如子之心也使不得人以行之臣恐措置無方姦弊四出饑者不必食食者不必饑府庫之財徒為奸雄之資百萬之費不救數人之命此臣所以深憂過慮也然所謂得人者非特府縣官凡分委賑濟官耆皆所當擇而不可茍者昔富弼青州賑濟其所用之人則除著州縣正官外就前資及文學等府佐領官擇有亷能者用之夫有歐陽修以主賑濟則府縣正官不用擇所當擇者分委賑濟之官今不得如歐陽修者主賑濟則主賑濟者府縣正官之責所當精擇而擇委官又其責也臣愚欲令撫按監司精擇府州縣正官亷能者使主賑濟正官如不堪用可别揀亷能府佐或無災州縣亷能正官用之葢荒事處變難以常拘也至于分賑官員可令主賑官各就所屬學職等官及待選舉人監生等人員擇素有行義者每厰一員為主賑又擇民間有行義者一人為耆正數人為耆副使監司廵行督察各厰所至考其職業書其殿最並開具掲帖事完官上之吏部府縣學職等官視此為黜陟舉人監生等人員視此為除授耆民上之撫按有功者以禮奬勞仍免徭役有過者分别輕重懲治不恕如此則人人有所激勸而荒政之行或庶㡬矣曰審户難者葢賑濟本以活窮民夫何人情狡詐姦欺百出乃有温飽之家濫支米食而窮餓之夫反待斃茅簷寄耳目于人則忠清無㡬樹衡鑑于上則明照有遺此審户所以難也古云救荒無善政正坐此耳昔宋富弼青州賑濟流民古今所稱臣謂此殆不難何也民至于流即當賑濟無事審户何難之有惟夫土著之民饑飽雜進真偽莫分此其所以難也邇時官司審户有委之里正者矣有親自抄劄者矣有行賑粥之䇿者矣然皆不能釐革㚥弊何者以臣所見言之臣昔待罪泗州適江北大饑臣始至稽其簿籍本州已賑濟兩月倉庫錢糧已竭矣而民父子相食者不能救盜兵潢池者日益熾臣深求未得其故既而見民有投子于淮河者問其賑濟則曰無錢與里書不得報名也又審賊犯于獄問其賑濟則曰未也而稽其簿籍已支兩月糧葢里書之冒支也又收餓莩于野問其賑濟則曰無問何以不濟曰户有四口二口支糧月支三斗道途􅉨復已費其半一口支糧四口分之每口止得六七升是以不濟也此按籍之弊也此里正之不足任也臣既灼知其弊乃親自抄劄則纔入其鄉而告饑者塞途真與偽莫之辨也既已沿門審驗則一日不能十數家千萬饑民已不能遍而分委之人其弊與里正要亦不甚相逺此親自抄劄之難也至於廷臣建議賑粥其説以為窮餓不得已者始來食不須審户可得饑民臣始是其議用意推行不知嵗既大饑民多鮮恥饑飽並進真偽莫分甚至富豪伴僕報名食粥窮鄉富人遣人闗支臣因痛加沙汰追罰還官者無數是賑粥之法亦難任也故曰三者皆不能釐革奸弊者此也昔宋蘓次叅澧州賑濟患抄劄不公令民用紙半副上書某家口數若干合請米豆若干實貼各人門首壁上如有虛偽許人告首甘伏斷罪以備委官撿㸃古今以為良法但以臣觀之門壁之貼未必從實檢㸃之官未必得人安能保其可以革弊而絶無欺偽于其間也然則終無䇿歟臣愚欲分民為六等富民之等三極富次富稍富貧民之等三極貧次貧稍貧稍富不勸分稍貧不賑濟極富之民使自檢其鄉之稍貧者而貸之銀次富之民使自撿其鄉之次貧者而貸之種非特欲借其銀種也欲于勸分之中而寓審户之法也何者葢使極富之民出銀以貸稍貧彼必度其能償者方借而不借者即次貧也使次富之民出種以貸次貧彼必度其能償者方借而不借者即極貧也不用耳目而民為吾耳目不費吾心而民為吾盡心法之簡要似莫有過於此者責委官耆逐都推勘隨户品題既皆的實然後隨等處分賑濟則府庫之財不為奸雄之資而民䝉實惠矣或曰貧民三等流民何居臣曰流移之民雖有健弱不一然皆生計窮盡不得已棄鄉土而仰食于外與鰥寡孤獨窮乏不能自存者何以異雖謂之極貧可也臣故曰不須審户即當賑濟者此也二三便曰極貧之民便賑米者臣按宋富弼青州賑濟流民所支米豆十五嵗以上每口日支一升十五嵗以下每口日支五合仍厯子頭上分明算定一家口數一官如管十耆即每日支兩耆逐耆併支五日口食河北流民賴以存活五十餘萬人此荒政之最善古今所稱近時官司賑濟多有用之而専賑米者然以臣觀之若次貧稍貧人户家道未乏不幸而際凶歉之年生理雖艱猶未至懸命朝夕且其力能營運不至束手待斃使其終日敝敝而守升合之米彼固有所不屑者且欲食之民畧無涯限倉廩之積豈能盡濟惟夫極貧之民室如懸磬命在朝夕給之以米則免彼此交易之艱抑勒虧折之患可濟目前死亡之急此其所以便也其法大口日支一升小口半之八口之家四口給米四口之家二口給米非不欲盡給之也民無窮而米有限窮餓之民日得米半升亦可以存活矣隨饑口多寡不分流移土著合就鄉集立厰每厰賑濟官給與長條小印上刻某厰極貧饑民以油和墨印誌于臉每人給與花闌小票上書年貌住址如係一家即同一票五日一次赴厰騐票支米十人為甲甲有長五甲為羣羣有老每甲一小旗旗上掛牌牌書十人姓名甲長報之每羣一大旗旗上挂牌牌書五甲姓名羣老執之各以千字文給號當給之日俱限巳時羣老甲長各執旗牌領率所屬饑民挨次唱名給散每口一支五升每甲五斗每羣二石五斗羣甲之糧只給長老使之給散必印臉騐票者防其偽也必羣分旗引者防其亂也必一時支給者防其重疊也必總領細分者省其繁且遲也每厰給與印信文簿將饑口支糧數目逐一造報以慿稽考仍給升一五升斗一五斗斛一當官印烙發付應用其發米下船如不係沿流及産米去處難于搬運則散銀各厰官耆令就本鄉富户照依時價糴買或本鄉富民粟盡可令饑民逺就有粟去處一頓闗支亦移民就粟之意也曰次貧之民便賑錢者臣按董煟救荒活民書謂支米最不便弊病又多不係沿流及産米去處搬運脚費甚大不如支錢最省便更無偽濫之弊小民將錢可以抽贖典過斛斗或一斗米錢可買二三斗雜料以二三升拌和野菜煮食則是三斗雜料可供一家五七口數日之費其説是矣近時官司賑濟多有用之而専賑銀錢者然以臣觀之極貧之民室如懸磬命在朝夕若與之錢銀未免求糴於富家抑勒虧折皆所必有又交易􅉨還動稽時日將有不得食而立斃者矣可謂便乎惟次貧之民自身既有可賴而不甚急得錢復可營運以繼將來此其所以便也其法八口之家四口支錢四口之家二口支錢每口所支折銀二錢編羣給票亦准極貧印誌旗引則不必用支錢於穿錢繩索係以錢舖散者姓名支銀于包銀紙面印誌銀匠散者姓名如有低偽消折聽其赴官陳告坐以侵漁之罪如是則法不生奸而民䝉實惠矣然塊銀細分必有虧折如銀十兩散五十人毎人二錢必虧五六七釐此臣所經騐也要不若散錢為尤便且貧民以銀易錢又有抑勒虧折之患也曰稍貧之民便轉貸者臣按出官粟以貸貧民者古之義倉是也勸民粟以濟貧民者今之例納是也今臣所謂轉貸者借民財以益貧民而不費官財酌二者之間而叅用之也夫稍貧之民較之次貧生理已覺優裕似不待賑濟然時當荒歉資用不無少欠不可全不加念是故不之濟而之貸也然欲官自借之則二貧之給錢穀亦或不敷若使富民借之則民度其能償必無不可故使極富之民出財以借官為立券豐嵗使償只收其本不責其息貧民得財而有濟富民捐財而有歸官府無施而有惠一舉而三得備焉此其所以便也其法八口之家四口借銀毎口二錢自正月至四月總四月之銀一次盡給之待其展轉營運亦可以資其不足而免于匱乏矣一人所借多至二百口少不下一百口若本鄉無富民則借之外鄉並官立文册事完之日以禮奬勵量免㡬年徭役作之有道則民自樂于供輸矣三六急曰垂死貧民急饘粥者臣按作粥以飼饑民昔漢獻帝葢常行之後世多有用之而専賑粥者但以臣觀之次貧之民生計未急日授之米已有不屑而况粥乎極貧之民生計雖急而給之粥亦有所不願者何則粥之稀稠冷煖不一食之多寡緩急又殊早闗晚放人弗自便氣蒸疫作死亡相繼始也不得已扶攜强健而入厰終也不得已空拳匐匍而出門此所以不願也臣昔在泗州親見之審矣若夫垂死之民生計狼狽命懸頃刻若與極貧一般給米則有舉火之艱將有不得食而立斃者矣惟與之粥則不待舉火而可得食涓勺之施遂濟須臾之命此粥所以當急也必于通都大衢量搭小厰亦設官耆令其領米作粥流莩所過並聽就食但人餓既乆腸胃噎塞乍飽多死粥要極稀毋令至飽當以漸與之待氣完體壯然後與極貧一體賑米然作粥之法又慮生熟不齊叅和灰水之弊要在委任得人則民䝉實惠矣或曰賑粥之法昔大臣嘗行于江北今子三貧之賑不之取獨取而用于垂死貧民何也臣曰昔江北之大饑也民餓死與為盜正在十一十二月之間臣至多方賑濟稍健能行者隨口給米弱憊不能行者為湯粥飼之及正月初廷臣建議賑粥民多不願臣乃試為二厰一賑粥一賑米民皆舍粥而趨米臣因與面論可否其説鑿鑿可聽臣不能奪乃一意推行而更得法然行之未乆而弊作何也饑飽混進而糜費浩繁疫癘盛行而死亡枕籍當日上司目擊其弊故行之不兩月羽書星馳令停粥而給米則上司已知其法之不可行而自改之矣臣目擊其弊乃多方澄汰亦只查革得一二續因饑民病愈乞歸遂給米散遣之雖以賑粥造報實則賑米者半月則臣已知其法之不可行而隂改之矣然臣始至泗州也親見饑民立死乃亟行賑濟城郭餓莩既仆者欲仆者亟取米飲灌之旋以稀粥接續與食既仆者十救五六欲仆者全救因思垂死饑民非粥決不能救又不可緩若夫三貧之賑決不可用乃知昔人此法實為垂死饑民而設擇羸弱給粥日二次候平復然後一給則宋儒程頥之論實有見矣今臣三貧之賑去粥不用而獨用之垂死貧民者豈空言無據哉或曰賑濟民既不願又有濫食者何也臣曰不願食者貧民其濫食者非貧也曰疾病貧民急醫藥者葢時際凶荒民作疫癘極貧之民一食尚艱求藥問醫于何取給昔宋趙抃知越州為病坊以處病民給以醫藥者正為此也往時江北賑濟官府亦發銀買藥以濟病民然斂散無法督察無方醫人領銀不盡買藥而多造花銷窮民得藥初不對病而全無實效今各處災傷重大貧民疾病所不能免臣愚欲令郡縣博選名醫多領藥物隨鄉開局臨證裁方郡縣印刷花䦨小票發各厰賑濟官令多出榜文播告逺近但是饑民疾病並聽就厰領票赴局支藥仍開活過人數並立文案事完連册繳報以慿稽考濟人多寡量行賞罰侵尅錢糧照例問遣如是則病者有藥而民免于夭札矣曰病起貧民急湯米者葢疾病饑民或不能與賑濟或與賑濟而中罹疾病逮疾病新起元氣初復正當將息之時也而筋力頽憊不能赴厰支米若非官為之所則呻吟牀簀之上有枵腹待斃者矣臣昔泗州賑濟四月疾作見饑民多病不能赴厰食粥因遣人訪問其家則有患病新瘥欲食而無所仰者乃遣人沿門搜訪但是疾病新起貧民每人給米一升五合三日内外散米一十一石七斗而濟病民八百二十二名口所費不多全活甚衆今各處災傷重大民病有所不免臣愚欲令各厰賑濟官遣人沿門搜訪但是患病新起貧民俱日給米五合一支五日使其旦夕燒湯不時飡飲待元氣既復膚體既壯方發饑民厰照舊支米則病起有養而民免于横死矣曰既死貧民急募瘞者葢大荒之嵗必有疾疫流移之民多死道路不為埋瘞則形骸暴露腐臭薫蒸仁者所不忍也故先王有掩骼埋胔之令宋仁宗有官為埋瘞之詔良有以也然死者人所畏惡責人以所惡其從則難誘人以所利其趨甚易臣昔在泗州見郡縣差官給銀買席瘞死督責雖嚴而暴露如舊臣知其故乃擇地勢髙廣去處為大塚榜示四方軍民但有能埋屍一軀者官給銀四分或三分每鄉擇有物力行義者一人領銀開局専司給散各厰賑濟官給與花䦨小票凡埋屍之人每日將埋過屍數呈報該厰領票赴局騐票支銀事完造報以便查考埋過屍骸逐日表誌以待官府差人看騐此令一出逺近軍民趨者如市數日之間野無遺骸官不費力而死者有歸至簡至便今各處災傷疫癘不無饑餓轉死所不能免如臣之法似可行也曰遺棄小兒急收養者葢大饑之年民父子不相保􅉨􅉨棄子而不顧臣昔在泗州見民有投子于淮河者有棄子于道路者為之惻然因思宋劉彛知䖍州嘗給米令民收棄子乃倣而行之置局委官専司收養令曰凡收養遺棄小兒者日給米一升一支五日每月抱赴局官看騐饑民支米之外又得小兒一口之糧逺近聞風爭趨收養甚至親生之子亦詐稱收抱以希米食旬月之間無復有棄子于河于道者矣今各處災傷去處若有遺棄小兒如臣之法似可行也曰輕重繫囚急寛恤者臣按周禮荒政十有二三曰緩刑葢民廹于饑寒不幸有過失緩其刑罰所以哀矜之也况年當荒歉疫癘盛行獄囚聚蒸厥害尤甚若不量為寛恤則輕重罪囚未免罹災横死故充軍徒罪追賦不完乆幽囹圄者必量情輕重暫為釋放絞斬重罪有礙釋放者必疎其枷杻給以湯藥如此則輕重罪囚各獲其生無夭札之患矣然囚繫既急寛宥則凡户婚諸不急詞訟當且停止恐負累饑民及妨誤賑濟此又不可不知也四三權曰借官錢以糴糶者葢年嵗凶歉則米榖湧貴富民因之射利貧民益以艱食昔宋呉遵路知通州適災傷民多流轉遵路勸富家得錢萬貫遣牙吏散出收糴米豆歸本處依原價出糶民謂之便今既勸富民出貸貧民又借其財以糴糶則民不堪矣臣愚欲借官帑銀錢令商賈散往各處糴買米穀歸本處依原價量增一分為搬運脚力一分給商賈工食糶盡復糴事完之日糴本還官官無失財之費民有足食之利非特他方之粟畢集于我而富民亦恐後時失利爭出粟以糶矣然糴糶之法専為濟貧商賈轉販所當禁革又當徧及鄉村不得只及坊郭則貧民方沾實惠或曰宋蘇軾浙中賑濟謂只將常平斛斗出糶則官司不勞抄劄勘㑹給納煩費但得數萬石斛斗在市自然壓下物價境内百姓人人受賜董煟以為良法遂建救荒三策而以是為首今三貧之賑而不之取何也臣曰大饑之嵗三貧俱困安得許多銀可糴米豆而糴買者多商販或富民也故其策不可用蘇軾之行于浙中者或未至于大饑也曰興工役以助賑者葢凶年饑嵗人民缺食而城池水利之當修在在有之窮餓垂死之夫固難責以力役之事次貧稍貧人户力任興作者雖官府量品賑貸安能滿其仰事俯育之需故凡圮壊之當修湮塞之當濬者召民為之日受其直則民出力以趨事而因可以賑饑官出財以興事而因可以賑民是謂一舉而兩得于工役之中而有賑濟之助者昔宋熙寕七年河陽災傷常平倉賑濟斛斗不足詔賜常平穀萬石興修水利以賑濟饑民董煟謂此以工役賑濟者今之大臣葢常用之于宰縣之日臣昔師其意而行之于泗州既有成效今各處災傷似可用也或曰荒年財力方詘凡百工力皆當停止故周禮荒政有弛力之令今子乃欲興工役何也臣曰荒年工役之停止者葢謂宫室臺榭之類之可己者若夫城池之禦侮水利之資農皆荒政之所不可己者府庫之財自有應該支用而不干賑濟之數若里甲之類者臣在泗州葢嘗支用而不碍于賑濟者矣臣興工役之策復何疑哉曰借牛種以通變者葢饑饉之後賑濟之餘官府左支右吾府庫之財亦竭矣民方艱食之際只茍給目前固不暇為後圖幸而殘冬得度東作方興若不預為之所將來嵗計復何所望故牛種一事尤當處置若燕慕容皝以牛假貧民宋仁宗發粟十萬貸民為種為是故也今府庫之財既殚于賑濟如欲人人而與之牛則都里之民甚多一牛之費甚大欲人人而與之種則缺種之户不少府庫之財莫續是難乎其為圖臣昔在泗州承上司文移毎里與牛六具種若干臣召父老計之其法難行乃自立法逐都逐圖差人查勘有牛有種者㡬家有牛無種者㡬家有種無牛者㡬家牛種俱無者㡬家有牛者要見有㡬具有種者要見有多寡通行造報乃為處分除有牛無種有種無牛人户聽自為計外無牛人户令有牛一具帶耕二家用牛則與之共養失牛則與之均賠無種人户令次富人户一人借與十人或二十人毎人所借雜種三斗或二斗耕種之時令債主監其下種不許因而食用收成之時許債主就田扣取不許因而拖負官為立契付債主收執此法一立有牛種者皆樂于借而不患其無償缺牛種者皆利于借而不患其乏用臣半月之間凡處過牛千九百六十五具種八百四十七石銀一百七十五兩處給一州缺牛種人户計四千八百五十六家此于財匱之時得通變之術時江北州縣多有倣行者今各處災傷重大如臣之法似可行也然臣昔在泗州不曾定六等人户故須臨時查勘今既定民為六等則稍貧者不待給次貧者令次富給之不待臨時查勘矣或曰次貧之民既有次富之民出種借之極貧之民則何所借臣曰極富之民既借之銀次富之民既借之種不可復借矣要之極貧中無田者多若有田者再處一月之糧而一給之則其事盡濟矣五六禁曰禁侵漁者葢人心有欲見利則動朝廷發百萬之銀以濟蒼生而財經人手不才官吏不免垂涎官耆正副類多染指是故銀或換以低假錢或換以新破米或插和沙土或大入小出或詭名盜支或冒名闗領情弊多端弗可盡舉朝廷有實費而民無實惠者皆侵漁之患也昔王莽時南方枯旱流民入闗者數十萬人置養贍院廩之吏盜其廩餓死十七八夫盜廩之弊豈特莽時為然自古及今莫不然也不重為禁可乎臣按大明律凡監臨主守盜倉庫錢糧者問罪刺字至四十貫者斬問刑條例宣大榆林等處及沿海去處監臨主守盜糧二十石銀一十兩以上者問罪發邊衛永逺充軍臣愚以為賑濟錢糧人民生死所係若有侵盜其罪較之盜宣大沿邊等處錢糧者為尤大其情尤為可惡合無分别等第嚴立條禁凡侵盜賑濟錢糧至一兩以上者問罪刺字發附近充軍十兩以上者刺字發邊衛永逺充軍至二十兩以上者處絞按律殺人者死侵盜賑濟錢糧至二十兩以上致死饑民不知其數處之以死豈為過乎重禁如此庶侵漁知警饑民庶乎有濟矣曰禁攘盜者葢人有恒言饑寒起盜心荒年盜賊難保必無縱非為盜之人當其缺食之時借于富民而不得相率而肆刼奪者往往有之于此不禁禍亂或繇以起周禮荒政十二有除盜之條辛棄疾湖南賑濟嚴刼禾之令正為是也然處之無方則禁之不止民廹于死亡方且僥倖以延旦夕之命豈能禁之使不攘盜乎臣昔至泗州適江北大饑盜賊蠭起臣先賑濟次招撫次斬捕凡賑過饑民三千四百口撫過饑民四百五十口捕過撫而復叛饑民六十口而盜始大靖今各處災傷重大盜賊攘奪難保必無若官府賑濟未及必作急區處賑濟俾不至攘奪若賑濟已及而猶犯是真亂法之民也決要懲治然不預先禁革待其既犯遂從而治之是不教而殺謂之虐也必也嚴加禁革攘盜者問罪枷號為盗者依律科斷如有過犯不得輕宥如此則人知警懼而不敢犯禍亂因可以弭矣曰禁閉糴者嘗見往時州縣官司各専其民擅造閉糴之令一郡饑則鄰郡為之閉糴一縣饑則鄰縣為之閉糴臣按春秋之時諸侯竊地専封固不以天下生靈為念然同盟之國尚有恤患分災之義秦饑晉閉之糴春秋誅之况今天下一家民無爾我均朝廷赤子乃各私其民遇災而不相恤豈吾君子民之意萬一吾境亦饑又將糴之誰乎是欲濟吾民而反病吾民也謂宜重為之禁今後災傷去處鄰界州縣不得輒便閉糴敢有違者以違制論如此則爾我一體有無相濟非惟彼之缺食可資于我而已之缺食亦可資於人矣曰禁抑價者葢年嵗凶荒則米穀湧貴嘗見為政者每嚴為禁革使富民米穀皆平價出糶不知富民慳吝見其無價必閉穀深藏他方商賈見其無利亦必憚入吾境是欲利小民而適病小民也昔范仲淹知杭州兩浙阻饑穀價方湧斗計百二十文仲淹增至百八十衆不知所為仍多出榜文具述杭饑及米價所增之數于是商賈聞之晨夕爭先恐後且虞後者繼至于是米石輻集價直遂平今各處災傷若抑價有禁叅用仲淹之法則穀價不患于騰湧小民不患于艱食矣曰禁宰牛者葢年嵗凶荒則人民艱食多變鬻耕牛以茍給目前不知方春失耕將來嵗計亦旋無望臣按問刑條例私宰耕牛再犯累犯者俱發邊衛充軍𢎞治十二年九月初一日又節該欽奉聖㫖私宰耕牛今後違犯的照例治罪毎宰牛一隻罰牛五隻欽此夫耕牛私宰在平時尚有厲禁况荒年宰殺必多所闗尤大不為之禁可乎然徒為之禁而不為之處彼民廹于死亡有不顧死而茍延旦夕之命者况充軍乎有同類之人父子相食而不顧者况牛乎謂宜預為禁處凡民間耕牛不許鬻賣宰殺賣者價銀入官殺者充軍發遣如果貧民不能存活欲變賣易穀聽其赴官陳告官令富民為之收買仍付牛主收養待豐年販買或牛主取贖如此則牛可不殺而春耕有賴民獲全濟而官本不虧臣昔在泗州葢嘗行之而已後期今各處災傷宜勅所在官司早為禁處斯可以有濟矣曰禁度僧者葢見􅉨時嵗饑多議度僧賑濟不知一僧之度只得十金之入一僧之利遂免一丁之差十年免差已勾其本終身游手利不可言况又坐享田租動以千百富僧淫逸多玷清規汙人妻女大傷王化是謂害多于利得不償失事不可行理宜深戒昔宋孝宗淳熈九年勅令廣東福建帥臣曉諭願為僧道者毎名備米三百石請換度牒一道續恐米數稍多特減五十石臣按宋人全失中原財賦之入已窘又苦于嵗幣之需一遇饑荒故不得已而出度僧之策然猶一僧換米三百石其不輕易如此今國家財賦既倍于宋蠻夷輸貢無復嵗幣其財用既不若宋人之窘廹乃因荒年給度又一僧只易其十金所獲不多而受此不美之名何也故宋人之策不可復用度僧之事決不可行今各處災傷重大恐有偶因費廣復建此議者所當禁也六三戒曰戒遲緩者臣聞救荒如救焚惟速乃濟民廹饑餒其命已在旦夕官司乃遲緩而不速為之計彼待哺之民豈有及乎此遲緩所當戒也昔宋蘇軾與林希書云朝廷原設儲備熈寕中本路截發及别路搬來錢米并因大荒放税及虧却課利葢累百鉅萬然于救荒初無分毫之益者救之遲故也然遲之一言豈但熈寕之時為然自古及今莫不然也臣昔至泗州適江北大饑府縣九月十月賑濟皆是虛文而民饑死正在十一十二兩月及至正月而差官發銀始至葢亦坐遲之病也今宜以此為戒嚴立約束申戒撫按及司府州縣各該大小賑濟官員凡申報災傷務在急速給散錢糧務要及時申報災傷與走報軍機同限失誤饑民與失誤軍機同罰如此則人人知警待哺之民庶乎有濟矣曰戒拘文者嘗見往時州縣賑濟動以文法為拘後患為慮部院之命未下則撫按不敢行監司之命一行則府縣不敢拂不知救荒如救焚隨便有功惟速乃濟民命懸于旦夕顧乃文法之拘欲民之無死亡不可得也朝廷雖捐百萬之財有何補哉昔漢河内失火延燒千家汲黯奉使往視以便宜持節發倉廩以賑濟貧民宋洪皓秀州賑濟寕以一身易十萬人命截留浙東綱常平米斛以賑濟仰哺之民此皆能便宜處事不為文法所拘者也今各災傷去處宜告戒撫按司府州縣官凡事有便于民或上司隔逺未便得請事有妨碍者並聽便宜處置先發後聞惟以濟事為功不得拘牽文法致誤饑民有孤朝廷優恤元元之意則大小官員得以自遂而饑民庶乎有濟矣曰戒遣使者臣嘗見􅉨時各處災傷重大朝廷必差遣使臣分往賑濟此固軫念元元之意然民方饑餓財方匱乏而王人之來迎送供億不勝勞費賑濟反妨實惠未必及民而受其病者多矣臣愚以為各處撫按監司未必無可用之人顧委任之何如耳莫若専勅撫按官員令其照依朝廷議擬成法仍隨所在民情土俗叅酌得中督責各道守廵等官分督州縣著實舉行事完之日年稍豐稔分遣科道各處查勘王命所在誰敢不盡心黜陟所闗誰敢不用命較之凶歉之際差官􅉨還徒為紛擾者萬不侔矣徐光啟曰戒遣使可也亦顧其人何如耳萬厯己丑之役使者如中州之鍾何可不遣如江南之楊何可遣也按鍾化民于萬厯甲午河南賑荒有賑豫紀畧救荒圖説詳其事萬厯戊子己丑浙江水旱大饑守臣以聞上發帑遣科臣楊文舉往賑文舉入境顧左右曰如此花錦城奈何報荒以欺妄挾制有司有司惴惴盛供張伎樂文舉遨遊湖山作長夜飲每席費數十金有司疲于奔命諸紳士進見日已午宿酲未解惛惛不能一語趨揖欲仆兩豎掖之堂上糟丘狼籍歌童環伺門外置賑事不問惟令藩司留帑金十一賄當路藩臬至守令悉括庫羨賂之東南繹騷咸比趙文華之征倭云及報命申時行當軸以賑功晉都給事南太常博士湯顯祖抗疏列其罪旋報罷癸巳京察以不謹削籍士論快之臣案古之救荒有先時預備者有臨時處置者先時預備常平義倉社倉等法是也臨時處置如臣所陳是也臨時處置之方如臣所陳畧盡矣先時預備之法則未之及也凡救荒不先時預備而待臨時處置亦緩不及事矣古之聖王三年耕必有一年之食九年耕必有三年之食以三十年之通制國用雖有凶旱水溢民無菜色者先時預備也以荒政十二聚萬民則臨時處置也必二者竝行然後為聖王之政若宋董煟救荒全法一書可謂兼備矣元張光大取而續增之本朝朱熊又補其遺世稱為完書版刻見在南京國子監然以臣觀之編次無倫觀閲不便其間缺畧不備窒礙難行葢亦有之茲遇聖明博求荒政臣愚竊欲重加編集以進然待哺饑民方懸命旦夕若待編完不無遲誤姑以㣲臣所見臨時賑濟之宜先行具奏俟臣從容編集完日另行奏進荒政叢書卷二
