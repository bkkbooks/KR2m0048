body:
  text: 荒政叢書卷四湖廣布政司參議俞森撰周孔教荒政議陳龍正曰荒政議者萬厯間周中丞孔教撫蘇時所頒行也其條欵甚備其文告甚繁古今救荒之事無弗撮載於此矣遍觀古方者此卷不過其類摘也未遍觀古方者則此卷乃其大通也然提綱皆本於林希元而其間損益則亦因乎時地希元嘉靖八年為僉事上荒政叢言其綱云救荒有二難難得人難審户此即六先中所云擇人查貧户矣有三便六急此槩之以八宜而所謂遺棄小兒急收養一條則附見於禁溺女之下有三權六禁今以四權五禁易之所增溺女一條因風土之惡習而去度僧一禁或亦以叢林為大養濟院之意耶三戒易遣使以忘備想當日乘軺之使偶希而雈苻之萌蘖可慮法貴因時故特以寓兵於農之意諄諄於二十六條之終也希元既發其綱自號曰叢言意當時規條亦復詳具顧今不得見而孔教所設之規條見存原文冗甚業刪其半讀之尚須移時亦特為一卷荒政議總綱救荒有六先曰先示諭先請蠲先處費先擇人先編保甲先查貧户有八宜曰次貧之民宜賑糶極貧之民宜賑濟逺地之民宜賑銀垂死之民宜賑粥疾病之民宜救藥罪繫之民宜哀矜既死之民宜募瘞務農之民宜貸種有四權曰奬尚義之人綏四境之內興聚貧之工除入粟之罪有五禁曰禁侵欺禁寇盜禁抑價禁溺女禁宰牛有三戒曰戒後時戒拘文戒忘備其綱有五其目二十有六初一曰六先一曰先示諭時值饑荒民情洶洶宜當民之未饑多揭榜示曰將散財將發粟將請蠲稅糧將平糶粟米吾民毋過憂毋出境毋棄父子毋為寇盜則民志定矣二曰先請蠲散財發粟其恩有限民奸吏蠧其弊無窮惟蠲租一節最為公溥唐學士李絳言欲令實惠及人無如減其租稅為今之計來歲之賦宜請蠲今歲之賦宜報緩或蠲存留或蠲起運在隨郡邑緩急而施之至於佃户承種諸人田土宜倣元制普減十分之二豐年照舊庶乎蠲緩各得其宜貧富僉受其益矣然又有富豪乘人之急准折田地短少價值所當併禁三曰先處費饑有三等小饑多取足於民中饑多取足於官大饑多取足於上取足於民如通融有無勸民轉貸之類是也取足於官如處糴本以賑糶處銀穀以賑濟是也取足於上如截上供米借內庫錢乞贖罪乞鬻爵之類是也四曰先擇人宋富弼青州賑濟除逐縣正官外就前資及文學等官擇其廉能者用之徐寧孫賑濟饑民逐處勸請鄉官或士人或稅户主管今宜精擇州縣正官廉能者使主賑濟正官如不堪别揀廉能府佐或無災州縣廉能正官用之至於分賑官員可令主賑官各就所屬選擇佐領佐領乏人選擇學職學職乏人選擇待選舉人監生等人員務得有治行者俾充城市鄉村分賑之任又擇民間有行義家資者為耆正副佐之其吏書止供抄劄而賑濟之事不與焉事完官書其殿最士旌賢異民優其奬勞亦勸懲之大義也五曰先編保甲弭盜安民莫良於保甲之法然有在城行保甲而在鄉不行者有在鄉僅報保甲長而花户不報者有僅報花户數名而十室九漏者夫是法也為弭盜而設是以治之之道編之也民情莫不偷安故其成也難為賑饑而設是以養之之道編之也民情莫不好利故其成也易今遇災賑正編行保甲之一機矣合令各府州縣擇廉能佐二一員專董其事大槩先將城內以治所為中央餘分東南西北四方如東方以東一保東二保東三保等為號每保統十甲設保正副各一人每甲統十户設甲長一人南西北方亦如之東方自北編起南方自東編起西方自南編起北方自西編起編至東北而合方不可易而序不可亂次將境內以城郭為中央餘外鄉村亦分東西南北四方其編保甲如在城法大村分為數保中村自為一保小村合鄰近數村共為一保一保十甲聽其增減甲數因民居也一甲十户不可增減户數便官查也或餘剩二三户總附一保之後名曰畸零此皆不分土著流寓而一體編之者也其在鄉四方保正副又以在城保正副分方統之如在城東一保統東鄉幾保在城東二保統東鄉幾保以至南與西北莫不皆然是保甲者舊法也分東南西北四方而以在城統在鄉者新設之權也蓋計方分統內外相維久之周知其地里熟察其人民凡在鄉户口真僞盜賊有無饑饉輕重在城皆得與聞或有在鄉保長抗令者即添差人役助在城保長拏治之此法行則不煩青衣下鄉而公事自辦矣有司惟就近隨事覺察之使不為鄉村害耳或言近歲賑饑皆領於里甲何獨編保甲以代之曰保甲猶里甲也往昔以相鄰相近故編為一里今年逺人散不若見編保甲之民萃聚一處其查審易集其貧富易知昔熙寧就村賑濟張詠照保糶米徐寧孫逐鎮分散朱文公分都支給皆用此法六曰先查貧户救荒之法凡以為貧民下户也官司非不欲一一清審之奈寄之人則難分任之已則難遍昔人謂救荒無竒策正以貧户之難審也所以然者亦不豫故耳合令被災各府州縣豫乘秋月以主賑官督在城保長以在城保長催在鄉保長以保長催甲長以甲長報花户每甲分為不貧次貧極貧三等除不貧外將次貧極貧各口數大小若干貼其門首壁上一面令每保開一土紙手本送主賑官不許指稱造册科斂貧民待鄉黨日久論定委官乘便覆查此即宋時蘇次參澧州賑濟之法但彼猶臨時為之不若先時查審貧富明民志定尤為無弊次二曰八宜一曰次貧之民宜賑糶其法有二有坊郭之糶宜多擇諸城門相近寺院及寬厰民居儲穀於中不限時日零細糶與糶米計升多不過一斗糶穀不過二斗如奸牙市虎有借倩粧扮之弊當行徐寧孫立賞錢一百貫之法斷罪追賞不得姑息則弊不期革而自革矣有鄉村之糶宜行見編保甲之法間月而糶之每先一月出示將有災鄉保限次月某日某方某保排定日期每隔日一糶以防雨雪壅滯之患每甲不論貧户多寡大約許糴三石多或五石其通水去處則移舟就民間水次糶之或有富人强奪貧人之糴當行張詠賑蜀連坐之法一家犯罪十家皆坐不得糴如此推廣則在在有保甲亦在在有糶糴而窮鄉僻壤無不到之處矣所糴穀價俱比時價減三之一或曰各甲貧户多寡不同而槩以三石糶之何也曰此非賑濟也賑糶也賑濟宜精賑糶宜溥一甲之中惟以穀均人不因人計穀穀數同銀數同聽其通融來糴則官不煩民不擾而惠利均霑穀價自不騰踴矣官之糴本則或出官糧或借官銀或勸令富家出錢收糴照價出糶而量增其船腳工食之費皆成法也二曰極貧之民宜賑濟賑濟之弊多端抄劄之時里保乞覔强悍者得之良弱者不得附近者得之逺僻者不得吏胥里保之親厚者得之鰥寡孤獨疾病無告者未必得屢報屢勘數往數來賑濟未到手而所費已居其半矣今貧户預定門壁大書日久無爭已屬平允合於賑濟之前一月出示如有遺者誤者許令改正即將門壁改書但一保之中貧户雖許更換而銀數不許加增官給花欄小票户各一張由城而鄉由保而甲務下諸貧户之手仍出榜排定日期分保支散至期保長帶領各甲貧户正身依序領賑繳票每賑極貧約穀一石次貧約穀五斗其或不公賞罰一如賑糶之法語云好要則詳好詳則荒此則暇豫公平不勞而濟而巡門俵米攔街散粥無所用之矣三曰逺地之民宜賑銀往昔義倉社倉散貯民間今皆輸之州縣是古之粟藏於民故及民也易今之粟藏於官故及民也難近且難之况於逺乎移粟就民則減竊拌和滋弊檄民支粟則腳費米價相當故凡百里以外地不産米水不係沿流者惟當以銀賑之極貧約四錢次貧約二錢支銀於包銀紙面印志銀匠散者姓名支錢於穿錢繩索係以錢鋪散者姓名如有消折低僞聽其赴官陳告四曰垂死之民宜賑粥按漢獻帝作粥以飼饑民後世多用之賑糶則彼無糴本賑濟則不能遍及即以米給之彼亦艱於舉火將有不得食而就斃者惟食之以粥則不待舉火而可得食涓勺之施遂活須臾之命此賑粥所以不容緩也大約米一升每飱可食四人男女異處日每二飱辰申二時鳴鐘而入入則分班坐地令人傳粥食之可無參差搶擠之患自冬十一月初一日起至春暮而止若夏四月則天氣炎熱粥多酸饐不可用矣大率賑饑以粥委可贍危急之民但其弊不一惟大饑之歲仁明之長度有餘財方可用之五曰疾病之民宜救藥宋吕公著為相為饘粥湯藥以救疾趙抃知越州為病坊以處病民給以醫藥然恐醫少地廣督察無方醫人領銀不盡買藥窮民得藥多不對病須博選名醫臨症裁方病人不能行者醫人就而診視之其患病新起貧民官日給米五合一支五日約至一月止庶可免於夭札矣陳龍正曰此條事種種難行名醫豈可多得臨症裁方豈易易事知脉者一州邑有幾人安能遍就病人診視不如按古成方精製丸藥一二十種隨症領受猶庶幾便而有益六曰罪繫之民宜哀矜年荒疫癘獄囚聚蒸恐多橫死軍徒追贓不完久幽囹圄者必量情輕重暫為保放或從輕決遣絞斬重罪有難保放者必踈其枷杻至於户婚諸不急詞訟當暫停止庶不妨誤賑濟而饑民之隂受其賜者多矣七曰既死之民宜募瘞合增修義冢分别男女仍修募瘞之令凡死而無主者在城保長報主賑官在鄉保長報分賑官各召人瘞埋埋畢給銀五分獄囚死而無主者亦如之城中偶見死者給棺一具八曰務農之民宜貸種宋曾鞏知越州歲饑出粟五萬貸民為種糧使隨歲賦入官農事賴以不乏查道知虢州蝗災給州麥四千斛為種於民大抵宜於季春下種時貸之仍令保甲監其下種有冒領而食費者必連坐追償然則種何時而償乎曰貸時防其濫可也非責以必償也此須酌民災之輕重量官帑之盈縮方可舉行次三曰四權一曰奬尚義之人大司徒保息萬民之政既曰恤貧又曰安富大率民不可以勢驅而可以義動是故民有出粟助賑煮粥活人者上也有富民巨賈趁豐糴穀還里平糶循環行之至熟方持本而歸者次也有借粟借種借牛於鄉人而豐年取償者又其次也凡此之民皆屬尚義於此權其輕重或請給冠帶或特給門匾或給以賞帖後犯杖罪納帖准免皆所以奬之而不負之此在㑹典及纍朝詔㫖俱有之有司所當亟行者也二曰綏四境之內救災恤鄰道也若造為閉糴之令此間之米不許出吾境他境之米亦不許入吾境彼此環視更無告糴之所則饑民必起而作亂然通財之道惟良有司能行之官有積粟仁洽於民即屢通有無民可無怨不然本境之所收有限鄰賈之所販無窮於是民有怨者有羣聚而譁者有攘臂而揭竿者如何則可近有良有司已行者量留商米十分之二即以元糴之價糶之於民民如財詘官為糴之糶亦如元價大率糴糶皆減時價三分之一其餘八分即時給照放行聽其覔利鄰境稽遲有禁詐欺有禁越度有禁凶年行之豐年則止不病商民不病鄰國隨糴隨糶逺邇胥悅除經過地方不得重復留糶外其他産穀之鄉此䇿或可潤澤而行是故救災恤鄰以公天下者正也放八留二以綏四境者權也權而不離於正也三曰興聚貧之工凶年人民缺食雖官府量加賑濟安能飽其一家故凡城之當築池之當鑿水利之當修者召壯民為之日授之直是於興役之中寓賑民之惠一舉兩得之道也宋熙寧間河陽災賜常平穀萬石興修水利范仲淹知杭州吳中大饑吳民喜競渡好佛事乃縱民競渡召諸寺主諭以饑歲工賤令大興土木又新倉厫吏舍工技服力及貿易宴遊之人仰食於公私者日數萬人是歲兩浙惟杭州晏然民不流徙合而觀之水利不可已之工也佛寺吏舍可已之工也二者均足以濟饑則胡安國所謂興工作以聚失業之人董煟所謂以工役救荒者具信矣或曰周禮荒政弛力居一築郿新廏春秋非之興工役何居曰周禮所禁春秋所非者蓋使之而饑之也今則使之而食之也至於城池水利政莫大焉大禹盡力溝洫豈必三江五湖方有水利之可講哉四曰除入粟之罪漢朝錯建言募天下入粟除罪若遭水旱民不困乏則正為救荒設也合行令府州縣凡問革吏承以上不係犯贓情有可原犯罪軍徒以下不係極惡法有可宥者酌令入粟助賑且如問遣一軍未足以實行伍計其長解等費少可易粟百石多可易粟數百石以此賑饑不猶愈乎或曰在外衙門用强罰米穀五十石者問罪降用此議得無違例曰例之所禁為擾民也今之所議為救人也凶年而行豐年而止亦何悖焉次四曰五禁一曰禁侵欺官吏保甲人等品類不同銀一入目不免垂涎糧一到手不無染指情弊多端大明律凡監臨主守盜倉庫錢糧者問罪刺字至四十貫者斬合嚴行禁諭凡侵盜賑濟錢糧者依盜倉庫律例行之然亦顧長吏何如誠能節用愛人清心寡欲而下猶敢侵欺無紀者未之有也二曰禁寇盜凶年饑歲民之不肯就死者必起而為盜所謂安居則不勝凍餒剽掠則猶得延生是也倘一槩姑息患不勝言如劉六趙璲撫於德州而飲馬於蘆溝吳十三閔二十四縱於鄱陽而稱兵於安慶宋辛幼安帥湖南賑濟榜文止用八字曰劫禾者斬閉糴者配新㫖抑價遏糴者以違制論而聚衆搶奪者即梟示首惡正法蓋古今恤饑民不宥亂民類如此然凶年之盜稍與豐年不同周禮荒政既曰除盜賊又曰緩刑故長民者每有法外之仁焉古有鎖項號令地頭來年始放者有斷一足筋傳都示衆者有以死囚代盜沉江聳動逺邇者皆死中求活之意三曰禁抑價穀少則貴勢也有司往往抑之米産他境與客販必不來矣米産吾境與上户必閉糴矣上尸非真閉糴也逺商一至牙儈為之指引則隂糶與之以故逺商可糴而土民缺食是抑價者欲利小民反害之也故不如不抑然前所云八分放行二分平糶不幾於抑價乎曰米産吾境荒歲與鄰共之不節其流則易竭故平糶其十二以安吾邇人非槩抑之也四曰禁溺女今俗有可異者平時生男則舉生女則殺之以故民間少女多鰥夫豐年猶爾况凶年乎准律故殺子孫徒一年合嚴行郡邑以法律示保甲人等仍録條粉壁曉諭且縣賞格銀三兩誘人告官賞銀以犯人及兩鄰保甲長財充客户則及其地主若實貧甚不能舉女者取保甲兩鄰結狀日給米一升三月而止若見育三女以上者每年終取結給穀二石以旌之至於收養遺棄小兒者亦給米男日一升女日二升六月而止米每月一給男女三月送官一驗庶乎男女無夭折矣五曰禁宰牛凶年人多變鬻耕牛以茍給目前之用不知耕牛一鬻方春失耕將來歲計何望查得問刑條例私宰耕牛者發附近衛所充軍𢎞治十二年奏准每宰牛一隻罰牛五隻合申明禁例凡民間耕牛不許鬻賣宰殺賣者價銀入官殺者充軍發遣如果貧民不能存活要賣牛易穀者聽令本保甲富民收買仍令牛主收養即以本牛種田照鄉例與富民分收待豐年或富民取牛或牛主取贖聽從其便如此則牛可不殺春耕有賴而貧富各得其所矣次五曰三戒一曰戒後時救荒如救焚惟速乃濟宋令災傷夏田以四月秋田以七月水田以八月非時災傷者不拘月分聽訴今例夏災不過五月秋災不過七月合而觀之可以見報災之不可緩矣唐莊宗時大雪軍士寒凍宰相請出庫物以給軍不許及趙在禮亂始出之軍士負而詬曰吾妻子已饑死得此何為宋蘇軾言熙寧中荒政之弊費多而無益以救之遲故也合而觀之可以見給賑之不可緩矣合行令大小賑濟官員凡申報災傷務在急速給散錢糧務要及時倘失誤饑民必罰無赦則人人知警民庶其有濟乎二曰戒拘文宋程皓攝上元令盛夏塘堤大決法當聞之府府稟於漕然後計工調役非月餘不能興作皓曰如是苗稿矣民將何食救民獲罪所不辭也遂發民塞之歲則大熟此便宜處事不為文法所拘者也嘗見郡邑賑濟動以文法為拘文未下則不敢行文一行則不敢拂合行司道府州縣等官凡事便於民而文有允駁文裁於上而事有妨礙者並聽便宜處置先發後聞如奉文賑糶矣或宜賑濟或宜賑貸奉文賑銀矣或宜賑米或宜賑粥奉文一賑矣或宜二賑或宜三賑如此之類惟以救民為主不為文法所拘致誤饑民三曰戒忘備保甲既立宜寓之兵每保有正副各一人正以有年德者為之令其表正鄉閭副以有謀勇者為之令其練習鄉兵每甲十人擇年力精壯者一人為兵專習武藝免其直夜等差每月在城保副傳在鄉保副在鄉保副領各甲鄉兵赴城此試操練之責府縣衛所分任之而申其賞罰官軍民快有俸糧者賞罰並行保甲鄉民無工食者有賞無罰荒年之賞惟以倉穀府月賞約以二十餘石縣月賞約以十餘石計一年所費無多此亦救荒之急務也荒政叢書卷四
