body:
  text: 荒政叢書卷十上湖廣布政司參議俞森撰社倉考宋孝宗時趙汝愚知信州乞置社倉疏曰臣伏見州縣之間每遇水旱合行賑濟賑糶去處往往施惠止及城郭不及鄉村鄉村之人為生最苦有終日役役而不能致一錢者使幸而得錢則又一鄉之中富室無幾近者數里遠者一二十里奔走告糴則已居後於是老稚愁嘆始有避荒就熟輕去鄉井之意其間強有力者又不肻坐受其斃奪攘剽竊無所不至以陷於非辜城郭之人率不致此故臣嘗謂城郭之患輕而易見鄉村之害重而難知然而求所以施行之策則亦不過勸諭上户廣行出糶轉移常平義倉之米以賑之而已夫勸諭上户殆成虛文轉移米斛復多欺弊臣愚欲望聖慈遠采隋唐社倉之制而去其損耗乏絶之弊明詔有司將逐州每年合納義倉米斛除五分依見行條法隨正稅就州縣送納外將五分於逐鄉置厫每歲輪差上户兩名充社司掌管受納委本縣丞檢察其欺弊不如法者究治之使幸得連歲豐稔所在稍有儲蓄則鄉里晏然若有所恃雖遇歉歲姦宄之心無自生矣甌寧縣有洞曰回源劇賊范汝為向曾竊據民性悍小遇飢饉羣起殺掠進士魏掞之謂民易動蓋緣艱食乃請常平倉米一千六百石以貸鄉民至冬而取遂置倉於邑之長灘鋪自後每歲散斂如常民得以濟不復思亂草寇遂息陳龍正曰社倉之利一以活民一以弭盜非獨弭本境之盜也且以清鄰寇焉文公賑粟於崇安而盜擒於浦城魏掞之置社倉於長灘鋪而回源洞之悍民以化俗吏見小小禍亂輒議用兵不知窮民之與姦雄非可一例行誅伐也飢餓瀕死威不能戢惟惠澤可以已之而方其飢餓即金錢猶無以解其急也必粟乃可浦城盜距崇安僅二十里用粟六百斛遂安吾民消彼盜兵威有此效乎即金錢有此速乎人疑其收息十二有類青苗然事貴可久非輸息十年何以使其後永不輸息且豪民乘飢取利凡貸粟者出息恆十四五至價貴甚則又不許償本色估計時值至冬以金酬蓋有賣冬粟三四石僅清宿逋一石者社倉之法行則豪右不得施其不仁而細民之倍息可省何必以暫收薄息為嫌哉如一邑若干鄉區每鄉每區立一社倉誠為至計賢士大夫有安和鄉里之心不可不蚤議此但當躬先倡率以風動之而毋強之云耳崇安社倉記朱熹乾道戊子春夏之交建人大飢豫居崇安之開耀鄉知縣事諸葛侯廷瑞以書來屬豫及其鄉之耆艾左朝奉郎劉侯如愚曰民飢矣盍為勸豪民發藏粟下其直以賑之劉侯與豫奉書從事里人方幸以不飢俄而盜發浦城距境不二十里人情大震藏粟亦且竭劉侯與豫憂之不知所出則以書請於縣於府時敷文閣待制信安徐公嚞知府事即日命有司以船粟六百斛泝溪以來劉侯與豫率鄉人行四十里受之黃亭步下歸籍民口大小仰食者若干人以次受粟民得遂無飢亂以死無不悅喜歡呼聲動旁邑於是浦城之盜無復隨和而束手就擒矣及秋徐公奉祠以去而直敷文閣東陽王公淮繼之是冬有年民願以粟償官貯里中民家將輦載以歸有司而王公曰歲有凶穰不可前料後或艱食得無復有前日之勞其留里中而上其籍於府劉侯與豫既奉教及明年夏又請於府曰山谷細民無蓋藏之積新陳未接雖樂歲不免出倍稱之息貸食豪右而官粟積於無用之地後將紅腐不復可食願自今以往歲一斂散既以紓民之急又得易新以藏俾願貸者出息什二又可以抑僥幸廣貯蓄即不欲者勿強歲或不幸小飢則弛半息大䘲則盡蠲之於以惠活鰥寡塞禍亂源甚大惠也請著為例王公報皆施行如章既而王公又去直龍圖閣儀真沈公度繼之劉侯與豫又請曰粟若分貯民家於守視出納不便請倣古法為社倉以貯之不過出捐一歲之息宜可辦沈公從之且命以錢六萬助其役於是得籍黃氏廢地而鳩工度財焉經始於七年五月而成於八月為倉三亭一門牆守舍無一不具司會計董工役者貢士劉復劉得輿里人劉瑞也既成而劉侯之官江西幕府豫又請曰復與得輿皆有力於是倉而劉侯之子將仕郎琦嘗佐其父於此其族子右修職玶亦廉平有謀請得與并力府以豫言悉具書禮請焉四人者遂皆就事方且相與講求倉之利病具為條約會丞相清源公出鎮兹土入境問俗豫與諸君因得具以所為條約者迎白于公公以為便則為出教俾歸揭之楣間以示來者於是倉之庶事細大有程可久而不壞矣豫惟成周之制縣都皆有委積以待凶荒而隋唐所謂社倉者亦近古之良法也今皆廢矣獨常平義倉尚有古法之遺意然皆藏於州縣所惠不過市井遊惰輩至於深山長谷力穡遠輸之民則雖飢餓瀕死而不能及也又其為法太密使吏之避事畏法者視民之殍而不肻發往往全其封鐍遞相付授至或纍數十年不一訾省一旦甚不獲已然後發之則已化為浮埃聚壤而不可食矣夫以國家愛民之深其慮豈不及此然而未之有改者豈不以里社不能皆有可任之人欲一聽其所為則懼其計私以害公欲謹其出入同於官府則鈎校靡密上下相遁其害又必有甚於前所云者是以難之而弗暇耳今幸數公相繼其憂民慮遠之心皆出乎法令之外又皆不鄙吾人以為不足任故吾人得以及是數年之間左提右挈上説下教遂能為鄉閭立此無窮之計是豈吾力之獨能哉惟後之君子視其所遭之不易者如此無計私害公以取疑於上而上之人亦毋以小文拘之如數公之心焉則是倉之利夫豈止於一時其視而效之者亦將不止於一鄉而已也因書其本末如此刻之石以告後之君子云淳熙八年朱熹上社倉議曰臣所居建寧府崇安縣開耀鄉有社倉一所係昨乾道四年鄉民艱食本府給到常平米六百石委臣與本鄉土居朝奉郎劉如愚同共賑貸至冬收到元米次年夏間本府復令依舊貸與人户冬間納還臣等申府措置每石量收息米二斗自後逐年依此斂散或遇小歉即蠲其息之半大飢即盡蠲之至今十有四年支息米造成倉厫三間收貯已將元米六百石納還本府其見管三千一百石並是每年人户納到息米巳申本府照會將來依前斂散更不收息每石只收耗米三升係臣與本鄉土居官及士人數人同共掌管遇斂散時即申府差縣官一員監視出納以此之故一鄉四五十里之間雖遇凶年人不闕食竊謂其法可以推廣行之他處而法令無文人情難強妄意欲乞聖慈特依義役體例行下諸路州軍曉諭人户有願依此置立社倉者州縣量支常平米斛責與本鄉出等人户主執斂散每石收息二斗仍差本鄉土居或寄居官員士人有行義者與本縣官同共出納收到息米十倍本米之數即送原米還官郤將息米斂散每石只收耗米三升其有富家情願出米作本者亦從其便息米及數亦與撥還如有鄉土風俗不同者更許隨宜立約申官遵守實為久遠之利其不願置立去處官司不得抑勒則亦不至騷擾此在今日言之雖無所濟於目前之急然實公私儲蓄預備久遠之計及今歉歲施行人心願從者衆其建寧府社倉見行事目謹録一通進呈伏望聖慈詳察特賜施行孝宗從其言遍下諸路倣行其法任從其便其斂散之事與本鄉耆老公共措置州縣並不得干預抑勒社倉事目一逐年十二月分委諸縣社首保正副將舊保簿重行編排其間有停藏逃軍及作過無行止之人隱匿在內仰社首隊長覺察申報尉司追捉解縣根究其引致之家亦乞一例斷罪次年三月內將所排保簿赴鄉官交納鄉官點檢如有漏落及妄有增添一户一口不實即許人告審實申縣乞行根治如無欺弊即將其簿紐算人口指定米數大人若干小兒減半候支貸日將人户請米狀核對批填監官依狀支散一逐年五月下旬新陳未接之際預於四月上旬申府乞依例給貸仍乞選差本縣清強官一員人吏一名斗子一名前來與鄉官同共支貸一申府差官訖一面出榜排定日分分都支散先遠後近一日一都曉示人户産錢六百文以上及自有營運衣食不缺不得請貸各依日限具狀狀內開説大人小兒口數結保每十人結為一保遞相保委如保內逃亡之人同保均備取保十人以下不成保不支不陳龍正曰不成保不支將聽畸零窮民之餓乎如金華縣規附甲為妥正身赴倉請米仍仰社首保正副隊長大保長並各赴倉識認面目照對保簿如無偽冒重疊即與簽押保明其社首保正等人不保而掌主保明者聽其日監官同鄉官入倉據狀依次支散其保明不實别有情弊者許人告首隨事施行其餘即不得妄有邀阻如人户不願請貸亦不得妄有抑勒一收支米用淳熙七年十二月本府給到新漆黑官桶及官斗仰斗子依公平量其監官鄉官人從逐廳只許兩人入中門其餘並在門外不得近前挨拶攙奪人户所請米斛如違許被擾人當廳告覆重作施行一豐年如遇人户請貸官米即開兩倉存留一倉若遇飢歉則開第三倉專賑貸深山窮谷耕田之民庶幾豐荒賑貸有節一人户所貸官米至冬納還不得過十一月下旬先於十月上旬定日申府乞依例差官將帶吏斗前來公共受納兩平交量舊例每石收耗米二斗今更不收上件耗米又慮倉厫折閲無所從出每石量收三升準備折閲及支吏斗等人飯米其米正行附厯收支一申府差官訖即一面出榜排定日分分都交納先近後遠一日一都仰社首隊長告報保頭保頭告報人户遞相紏率造一色乾硬糙米具狀同保共為一狀未足不得交納如保內有人逃亡即同保均備納足赴倉交納監官鄉官吏斗等人至日赴倉受納不得妄有阻節及過數多取其餘並依給米約束施行其收米人吏斗子要知首尾次年夏支貸日不可差換一收支米訖逐日轉上本縣所給印厯事畢日具總數申府縣照會一每遇支散交納日本縣差到人吏一名斗子一名社倉算交司一名倉子兩名每名日支飯米一斗約半月發遣裹足米二石共計米一十七石五斗又貼書一名貼斗一名各日支飯米一斗約半月發遣褁足米六斗共計四石二斗縣官人從七名鄉官人從共一十名每名日支飯米五升十日共計米八石五斗已上共計米三十石二斗一年收支兩次共用米六十石四斗逐年蓋墻并買藁薦修補倉厫約米九石通計米六十九石四斗陳龍正曰每人日支飯米一斗太多矣應減為一升五合另給酒菜銀數分上下均便張文嘉曰支收交納各有定限為日不多在鄉官士人知此義舉斷不計利至於吏人倉子安肯空勞每名支飯米一斗即寓相犒之意若減為一升五合又給酒菜之資不惟反多煩瑣抑恐不足服此輩之心其鄉官并僕從恐有貧薄者亦必須支米五升方足薪水之用固知朱子非過厚也又按朱子當日始創此事故須官府彈壓倘今舉行社倉則保簿赴官交納及申縣乞差吏斗諸事俱不必行止須支給司社及倉守效勞宣力諸人可也一排保式某里第某都社首某人令同本都大保長隊長編排到都內人口數下項甲户大人若干口小兒若干口居住地名某處或産户開説産錢若干或白煙耕田開店買賣土著外來係某年移來逐户開餘開右某等今編排到都內人户口數在前即無漏落及增添一户一口不實如招人户陳首甘伏解縣斷罪謹狀年月日大保長姓名隊長姓名保正副姓名社首姓名一請米狀式某都第某保隊長某人大保長某人下某處地名保頭某人等幾人今遞相保委就社倉借米每大人若干小兒減半候冬收日備乾硬糙米每石量收耗米三升前來送納保內一名走失事故保內人情願均備取足不敢有違謹狀年月日保頭姓名甲户姓名大保長姓名隊長姓名保長姓名社首姓名一社倉支貸交收米斛合係社首保正副告報隊長保長隊長保長告報人户如闕隊長許人户就社倉陳説告報社首依公差補如闕社首即申尉司定差一簿書鎖鑰鄉官公共分掌其大項收支須監官簽押其餘零碎出納即委鄉官公共掌管務要均平不得徇私容情别生姦弊一如遇豐年人户不願請貸至七八月而産户願請者聽一倉內屋宇什物仰守倉人常切照管不得毁損及借出他用如有損失鄉官點檢勒守倉人備償如些小損壞逐時修整大段改造臨時具因依申府乞撥米斛陸九淵曰社倉固為農之利然農田常熟則其利可久茍非常熟之田一遇歉歲則有散而無斂來歲缺種糧時乃無以賑之莫若兼置平糶一倉使無貴賤之患折所糴為二每存其一以備歉歲代社倉之匱實為長利也陳龍正曰文公社倉之法利賴無窮其最要在不願置立去處官司不得抑勒二語孝宗仁明詔任從民便斂散之事州縣不得干預至矣哉社倉之事蔑以加矣若必強民置立斂散由官即與荆公青苖無異此經世之學最貴於圓通也青苖者田未熟而貸之錢田已熟而收其利安石嘗行此於一邑甚善然猶體悉下情隨其願與不願也至當國時欲以此行之天下而守令者又阿重臣意旨以多散錢多得利為稱職不問貧富緩急強與之又寄權人役出納之際輕重為姦而民遂怨咨載道矣金華潘氏社倉記朱熹淳熙二年東萊呂伯恭自婺來訪豫於屏山之下觀於社倉發斂之政喟然歎曰此周官委積之法隋唐義廪之制也吾將歸而屬諸鄉人士友相與糾合而經營之使閭里有賑恤之儲而公家無籥合之費不尤愈乎伯恭既歸不三年而卒遂不果為其卒之年浙東果大飢豫因得備數推擇奉行荒政按行至婺則婺之人狼狽轉死已籍籍矣豫因竊嘆以為向使伯恭之志得行必無今日之患既而尚書下豫所奏社倉事諸道募民欲為者聽之民蓋多慕從者而未幾豫亦罷歸又不果有所為也是時伯恭之門人潘君叔度感其事而深有意焉且念其家自先大夫時已務賑恤樂施豫歲捐金帛不勝計矣而獨不及聞於此也於是慨然出粟五百斛為之斂散以時規畫詳備一都之人賴之而其積之厚而施之廣蓋未巳也一日以書來曰此吾父師之志豫幸克成之然世俗不能不以為疑也子其可不為一言以解之乎豫惟有生之類莫非同體惟君子為能無有我之私以害之故其愛人利物之心為無窮特窮而在下則禹稷之事有非其分之所得為者然茍以其家之有餘而推之以與鄰里鄉黨則固吾聖人之所許而未有害於不出其位之戒也況叔度之為此特因其墳廬之所在而近及乎十保之間以承先志以悅親心以順師指而何不可之有哉抑凡世俗之所以病乎此者不過以王氏之青苖為説耳以豫觀於前賢之論而以今日之事驗之則青苖者其立法之本意固未為不善也但其給之也以金而不以榖其處之也以縣而不以鄉其職之也以官吏而不以鄉人士君子其行之也以聚斂亟疾而無慘怛忠厚之心是以王氏能行於一邑而不能行於天下子程子嘗極論之而卒不免於悔其已甚而有激也婺人蓋多叔度同門之士必有能觀於叔度所為之善而無疑於青苖之説者則庶乎其有以廣夫君師之澤而使環地千里永無捐瘠之民矣豈不又甚美哉叔度名景憲與伯恭同年進士年又長而屈首受學於伯恭無難色師沒守其説不懈益虔於書無所不讀蓋深有志於當世然以天資峭直自度不能隨世俯仰故自中年不復求仕而獨於此為拳拳也倉在婺女鄉安期里顔光𠂻曰凡害民之政其始盡言利民上開一孔下開百竇城郭富豪之家猶能支吾乃若山谷僻陋矇叟孤稚目不識文告耳不辨官音舌不解敷陳手不能訴寫見里長則面色青黃望公門則心戰膽栗稍有桀驁皆得望風索騙幻弄吞侵其為凌虐寧可數計每見上人撫循至意不得已而為此䇿孜孜丁寧惟恐有失然豫權任事則情勢不能無假借而假借之下復有假借則侵漁之外復肆侵漁於是告訐日煩獄訟日滋罪罟日長愁怨日盈而太平之風索然盡矣金華社倉規約計十四欵一社倉榖本五百石一社倉只置總簿一面紙盡置第二面一一甲不許過三十人甲頭一人不滿十人附甲不許詭名冒籍犯者出社甲頭改替許同甲告罰甲頭所納給賞一散榖以三時謂除夜或下田接新並須甲頭相度一每户借一石甲頭倍之無居止及有藝人不借若口纍衆多作田廣甲頭保明别議增借一借榖上簿不立契還訖就簿勾銷一借榖日每户納錢五十文甲頭免十五文給甲頭十文守倉人十文雜支十五文掌倉量錢此外不許分文乞索許甲內人告以所得錢文給賞陳龍正曰此法免息後猶可行若出息二斗又見納五十文太重矣張文嘉曰不若每石止令納白銀三分彙收一處俟完日共計銀若干作五十股泒開照法分給各項人亦酌中之道一量榖本甲甲頭執槩並見清量掌倉人擅執槩改替一還以三限限以三日謂如十甲每甲若干人一限納若干並甲頭預報定日子一人不到甲內榖並留倉候齊交量一息榖二分謂石取息二斗中飢減半大飢盡免本户納息已滿十年免收息謂第至十一年納年免一耗榖三釐謂榖一石取耗三升以備折閲及充每歲社倉雜費一甲內逃亡甲頭同甲內均填甲頭倍之若係時疫户絶甲頭申倉差人審實候還榖日銷落若不循理者雖已還出社一息榖有餘遇飢荒給散計所有每人大人二升小兒一升十日止並以入籍户口為定一社衆於規約犯一事不借一年再犯出籍清江縣社倉規約五欵一所借給貴均平亦慮失陷米本其支借時鄉官審問社首及甲內人某人可借若干衆以為可方可支借其素號遊手及雖農業而衆以為懶惰頑慢者亦不支貸一鄉官踏逐善書寫百姓一人不得用罷役過犯人專充書寫簿書如收支執槩就差社首遇收支日日支飯米一斗一倉中事務並委鄉官掌管但差使保正編排人户磨對簿厯彈壓斂散踏逐倉厫追斷逋負之類須官司行遣張文嘉曰惟梗化敗度者用官司行遣可也一鄉官從本軍給帖及有朱記主執行遣一簿用紙札每歲於息內支破建寧府建陽縣長灘社倉記朱熹建陽之南里曰招賢者三地接順昌甌寧之境其狹多阻而俗尤徑悍往歲兵亂之餘稂莠不盡去小遇飢饉輒復相挻羣起肆暴率不數歲一發雖尋即夷滅無噍類然願民良族晷刻之間已不勝其驚擾矣紹興某年歲適大祲姦民處處羣聚飲博嘯呼若將以踵前事者里中大怖里之名士魏君元履為言於常平使者袁侯復一得米若干斛以貸於是物情大安姦計自折及秋將斂元履又為請得築倉長灘廄置之旁以便輸者且為後日凶荒之備毋數以煩有司自是歲小不登即以告而發之如是數年三里之人始得飽食安居以免於震擾夷滅之禍而公私遠近無不陰受其賜蓋元履少好學有大志自為布衣而其所以及人者已如此蒙其惠者雖知其然而未必知其所以然也其後元履既沒官吏之職其事者不能勤勞恭恪如元履之為於是粟腐於倉而民飢於室或將發之則上下請賕為費已不資矣官吏來往又不以時而出內之際陰欺顯奪無弊不有大抵人之所得粃粳居半而償以精鑿計其候伺亡失諸費往往有過倍者是以貸者病焉而良民凛凛於凶歲猶前日也淳熙十一年使者宋侯若水聞其事且知邑人宣教郎周君明仲之賢即以元履之事移書屬之且下本臺所被某年某月某日制書使得奉以從事蓋歲以夏貸而冬斂之且收其息什之二焉行之三年而三里之間人情復安如元履亡恙時什二之收歲以益廣周君既以增葺其棟宇又將稍振其餘以漸及於旁近蓋其惠之所及且將日增月衍而未知其所極也周君以豫嘗有力於此者來請文以為記豫與元履早同師門遊好甚篤既追感其陳迹又嘉周君之能繼其事而終有成也乃不辭而為之説如此則又念昔元履既為是役而豫亦為之於崇安其規模大略倣元履獨歲貸收息為小異元履常病豫不當祖荆舒聚斂之餘謀而豫亦每憂元履之粟久儲速腐惠既狹而將不久也講論餘日杯酒從容時以相訾謷而訖不能以相詘聽者從旁抵掌觀笑而亦不能決其孰為是非也及是宋侯周君乃卒用豫所請事以成元履之志而其效果如此於是論者遂以豫言為得然不知元履之言雖疏而其忠厚懇惻之意藹然有三代王政之餘風豈豫一時茍以便事之説所能及哉當時之爭蓋豫之所以為戲而後日之請所以必曰息有年數以免者則猶然不忘吾友之遺教也因并書之以視後人使於元履當日之心有以得之則於宋侯周君今日之法有以守而不壞矣元履名掞之嘗以布衣召見天子悅其對即日除太學録尋以數論事不得久居中既而天子思復召用之則元履既卒矣上為悵然久之詔有司特贈直祕閣云建寧府建陽縣大闡社倉記朱熹招賢里大闡羅漢院之社倉新侯官大夫周君某之所為而長灘之别貯也始祕閣魏君之築倉於長灘非擇其地而處之也因其船粟之委於是而藏焉耳故倉之所在極里之東北而距西南之境遠或若干里貸者多不便之而是時率常數歲乃一往來則猶未甚以為苦也淳熙甲辰周君始以常平使者宋公之檄司其發斂之政而以歲貸收息之令從事既為之更定要束搜剔蠧弊而以時頒焉民已悅於受賜矣周君因益問以用革之宜而有以道里不均之説告者且曰自今以往一步而往來者再則其勞佚之相絶又非前日比矣周君於是白之宋公而更為此倉以適遠近之中且令西南境之受粟者即而輸焉來歲遂以遠近分土使各集於其所以待命民既歲得飽食而又無獨遠甚勞之患於是咸德周君而相率來請文以記其成昔豫讀周禮旅師遺人之官觀其頒斂之疏數委積之遠邇所以為之制數者甚詳且密未嘗不嘆古之聖人既竭心思而繼之以不忍人之政其不可及乃如此及今而以是倉之役觀之則彼其詳且密者亦安知其不有待於厯時之久得人之多而後乃至於此耶因為之記其本末以為後之君子或將有考於斯焉周君字居晦好讀書有志當世之務吏事亦精敏絶人不但此為可書也邵武軍光澤縣社倉記朱熹光澤縣社倉者縣大夫毗陵張侯欣之所為也光澤於邵武諸邑最小而僻自張侯之始至則已病夫市里之間民無蓋藏每及春夏之交則常糴貴而食艱也又病夫中下之家當産子者力不能舉而至或棄殺之也又病夫行旅之涉吾境者一有疾病則無所於歸而或死於道路也方以其事就邑之隱君子李君呂而謀焉適會連帥趙公亦下崇安建陽社倉之法於屬縣於是張侯乃與李君議略倣其意作為此倉而節縮經營得他用之餘則市米千二百斛以充入之夏則損價而糶以平市估冬則增價而糴以備來歲又買民田若干畝籍僧田民田當沒入者若干畝歲收米合三百斛并入於倉以助民之舉子者如帥司法既又附倉列屋四楹以待道途之疾病者使皆有以棲託飲食而無暴露迫逐之苦蓋其創立規模提挈綱領皆張侯之功而其條畫精明綜理纎密者則李君之力也邑人既蒙其利而歌舞之部使者亦聞其事而加勸奬焉於是張侯樂其志之有成而思有以告來者使勿壞則以書來請記豫讀古人之書觀古人之政其所以施於鰥寡孤獨困窮無告之人者至詳悉矣去古既遠法令徒設而莫與行之則為吏者賦斂誅求之外亦飽食而嬉耳何暇此之問哉若張侯者自其先君子而學於安定先生之門則已悼古道之不行而抱遺經以痛哭矣及其聞孫遂傳素業以施有政宜其志慮之及此而能委心求助以底於有成也李君於豫蓋有講學之舊豫每竊歎其負經事綜物之才以老而無所遇也今乃特因張侯之舉而得以粗見其毫末是不亦有感乎故豫既書張侯之事而又附以豫之所感於李君者來者尚有考云常州宜興縣社倉記朱熹始豫居建之崇安嘗以民飢請於郡守徐公嚞得米六百斛以貸而因以為社倉今幾三十年矣其積至五千斛而歲斂散之里中遂無凶年中間蒙恩召對輒以上聞詔施行之而諸道莫有應者獨閩帥趙公汝愚使者宋公若水為能廣其法於數縣然亦不能遠也紹興五年春常州宜興大夫高君商老實始為之於其縣善卷開寶諸鄉凡為倉者十一合之為米二千五百有餘斛擇邑人之賢者承議郎趙君善石周君林承直郎周君世德以下二十有餘人以典司之而以書來屬豫記豫心許之而未及為也會是歲浙西水旱常州民飢尤劇流殍滿道顧宜興獨得下熟而貸之所及者猶有賴焉然豫猶慮夫貸者之不能償而高君之惠將有所窮也明年春高君將受代以去乃復與趙周諸君皆以書來趣豫文且言去歲之冬民負米以輸者襁負爭先視貸籍無籥合之不入豫於是益喜高君之惠將得以久於其民又喜其民之信愛其上而不忍欺也則為之計其所以然者抑又慮其久而不能無弊於其間也則又因而告之曰有治人無治法此雖老生之常談然其實不可易之至論也夫先王之世使民三年耕者必有一年之蓄故積之三十年則有十年之蓄而民不病於凶飢此可謂萬世之良法矣其次則漢之所謂常平者今固行之其法亦未嘗不善也然考之於古則三登太平之世蓋不常有而驗之於今則常平者獨其法令簿書管鑰之僅存耳是何也蓋無人以守之則法為徒法而不能以自行也而況於所謂社倉者聚可食之物於鄉井荒間之處而主之不以任職之吏馭之不以流徒之刑茍非常得聰明仁愛之令如高君又得忠信明察之士如今日之數公者相與併心一力以謹其出納而杜其姦欺則其法之難守不待異日而見之也此又豫之所身試者故并書之以告後之君子云建昌軍南城縣吳氏社倉記朱熹乾道四年建人大飢熹請於官始作社倉於崇安縣之開耀鄉使貧民歲以中夏受粟於倉冬則加息什二以償歲小不收則弛其息之半大侵則盡弛之期以數年子什其母則惠足以廣而息可遂捐以豫民矣行之纍年人以為便淳熙辛丑熹以使事入奏因得條上其説而孝宗皇帝幸不以為不可即頒其法於四方且詔民有慕從者聽而官府毋或與焉德意甚厚而吏惰不恭不能奉承以布於下是以至今幾二十年而江浙近郡田野之民猶有不與知者其能慕而從者僅可以一二數也是時南城貢士包揚方客里中適得尚書所下報可之符以歸而其學徒同縣吳伸與其弟倫見之獨有感焉經度久之乃克有就遂以紹熙甲寅之歲發其私榖四千斛者以應詔旨而大為屋以貯之涖事有堂燕息有齋前引兩廊對列六庾外為重門以嚴出納其為條約蓋因崇安之舊而加詳密焉即以其年散斂如法鄉之隱民有所仰食無復死徙變亂之虞咸以德於吳氏而伸與倫不敢當也則謹謝曰是倉之立君師之教祖考之澤而鄉鄰之助也吾何力之有哉且今雖幸及於有成而吾子孫之賢否不可知異時脫有不能如今日之志以失信於鄉人者則願一二父兄為我教之教之一再而不能從則已非復吾子孫矣盍亦相與言之有司請正其罪庶其懼而有改其亦可也於是衆益咨嗟嘆息其賢以為不可及而包君以書來道其語且遣倫及伸之子來請記熹方病不能文然嘉其意不忍拒也乃為之書其本末既以警夫吳氏之子孫使其數世之後猶有以知其前人之意如此而不忍壞抑使世之力能為而不肯為者有所羞愧勉慕而興起焉則亦所以廣先帝之盛德於無窮而又以少致孤臣泣血號弓之慕也俞森曰觀朱子社倉諸記及各規約法可謂備矣然變通亦顧其人隨其時地之宜而用之有未可執一者按黃震通判廣德軍時社倉法大弊衆以始自朱熹不敢議震曰法出於聖人猶有變通安有先儒為法遂不得救其弊耶為别買田六百畝以其租代社倉息非凶年不得輒貸貸不取息此可謂善法朱子者也毛鼎新黃巖人授浙西提舉茶鹽司準遣改常平司準遣其長有欲獻羡餘四十萬者鼎新力爭以置社倉陳善曰鼎新此舉不啓君上之侈心而於民有德且俾其長免言利干進之咎一舉而三善具焉附乾德四年詔出納之吝謂之有司倘規致於羡餘必深務於掊克知光化軍張全操上言三司令諸處倉場主吏有羡餘粟及萬石芻五萬束以上者上其名請行賞典此茍非倍納民租私減軍食何以致之宜追寢其事勿頒行除官所定正耗外嚴加止絶陳芳生曰錢榖出納積少成多不無餘潤為民牧者特患無實心耳茍有實心以行實政何利不可興建哉浙江運司席某居官清介自正供外力却火耗等事去任時庫中尚存羡餘五千吏請曰此可取也席曰獨非百姓膏血耶卒不受嗚呼席氏誠不可及矣然亦獨為君子耳以天地間有用之物置之無用之地徒飽鼠竊狗偷者之腹不大可惜耶大約司𣙜司鹽司倉羡餘極多雖甚清介亦有饒溢有志斯民何利不舉故特表而出之以為賢士大夫告元張光大議曰古有義倉又有社倉義倉立於州縣社倉立於鄉都皆民間積儲以待凶荒者也國朝酌古準今立義倉於鄉都一舉兼盡社倉之設惠至渥也令附近稅户各以差等出榖為本每年收息榖一斗候本息相停以榖本給還元主以利為本立掌倉循環規運豐年貯積凶年出貸有司許令點檢而不許干預侵借其立法最為詳備惠民之意亦甚切至未及十年倉庾充斥過於本倍然百姓困於義倉民間但見其害而不見其利凶年飢歲而民不免於流離死亡其故何也良由有司任法而不任人法出而姦生令行而弊起以暴心行仁政政無非暴雖曰惠民實所以厲之也略而舉之其弊有四一曰掌倉之弊今之掌倉者非輩間之吏貼祗候則鄉里無藉之潑皮請託行求公納賄賂投充是役上以茍避差役下以侵削小民既已過費重資寧不貪圖厚利官司容其姦偽百姓不敢誰何二曰點檢之弊其有考滿守缺司吏官員門下親知或結託求差或倚勢分付帶領僕從名為計點義倉糧盤繞鄉村呼集社伍需求酒食索取齎發饜其欲則抄寫虛數忤其意則苛細百端遂科斂社民糶賣義榖以為祗待起發前者既去後者復來所積之糧十去其七三曰出貸之弊掌倉素非仁德忠厚之士所儲之榖平時先已侵用至於出貸之際預行插和粳粃􅀈榖砂土及至支遣小斗慳量比及到家簸揚所貸不得一半豐年有米則勒令民户承貸凶荒之歲則推稱已貸盡絶惟務肥已不恤濟人虛裝人户具報官司或立詭名交割下次民之受害其何可言四曰回收之弊百姓貸榖未及半年為之掌倉者既交割前界貸數乃集不逞之徒三五為羣遍繞鄉村催索逋貸呌囂隳突需求酒食何所不為及至人户擔榖到倉一斗必收二斗幹人腳榖上數科陪滿斗豪量不奪不饜稍涉分析則云以後官司計點虧折誰賠若或不從必是解官懲治民之困於義倉有甚於凶荒之歲者醫瘡剜肉誰不惻然有此四弊而欲惠濟於民未之有也又有虛申案驗偽指倉囷觀其數則億萬有餘考其實則百千不足官司視為文具姦吏因緣為私故自立義倉以來展轉繁文州縣徒有幾千萬石之名飢荒之歲民不沾惠是蓋有司不以荒政為心但為黷貨之具委任失當以暴心行之本既不澄弊端滋蔓耳由是而言則擇人委任為第一要事若委任得人亦不須差人計點出納之公自然無弊然君子作事謀始任人之方尤所當慎若一槩委用産稅富豪之家則富而好義者少為富不仁者多中間未免結搆所司侵漁刻剝其害有甚於吏胥無籍之輩今後莫若選擇鄉里有德望誠信謹願好義之人或賢良縉紳素行忠厚廉介之士不拘産稅抵業但為衆所敬而悅服者許令鄉民推舉不必拘以鄉都所司察其行實以禮敦請使之掌管置簿供報依時出納不限年月交替至如出貸之時入水和榖小斗慳支回收之際大斗滿量及需索縻費圖利倍取人户者但有陳告得實依不枉法例追斷移易虛樁坐以侵盜之罪徵取還倉如此則掌倉者知所警懼保守廉恥而不妄為貧者必沾其實惠矣雖然言之非艱行之惟艱必也州縣杜其夤緣求充之源於其前禁其不時計點之弊於其次至於出貸回收之際絶其供報文案之需彼既無所費於官司則下自可安而行之源清流潔上下皆可以誠心為民有其誠斯有其實庶幾義倉儲積不為虛設凶年飢歲得以濟民上不負朝廷立法為民之美意儻若上無公論下有叛心前弊不除純任以法雖有善者亦無如之何也已明張朝瑞圖書編社倉議社倉之制乃古人良法特患上之人不知所以倡之耳有父母斯民之責者果知民為邦本食為民天水旱之凶荒不時官倉之積榖有限思為備荒之善策須酌社倉之事宜乃計之得也合於各保甲鄉約中各創立社倉先捐俸金以為倡率或罰紙贖以便上納且誠心勸諭各村士民使咸知以義相尚不待督責而出榖皆其情願徐因倉置簿登記其數凡出榖多者則破格旌奬民其有不以義相從者乎況因時制宜隨俗勸誘或禁止神廟賽會定為香錢或違犯鄉保規條略示懲罰由此日積月纍則一村之榖自足以養一村之民每年青黃不接之時令其出放息止加二小飢加一大飢免息成熟之年仍令各村量行添入此法若行之有常三數年間各村之榖殆將不可勝食但民之誠偽不一而官司之意向不同若非出納有經姦民或因之以滋侵漁負騙之私官司或移之以補官倉積貯之數是非惟無益於民而且有害於民也然使經官查盤則又重為民纍合無免其查盤止於府縣給印文簿付鄉約正副每歲稽查其各村管理收放即於本鄉每年輪一公直殷實者以司出納量與免其火夫丁差以示酬勸如此則姦民不得以負騙官司不得以那移即遇水旱凶災復有官榖以濟之自是貧者不患於阻飢富者可免於勸借而盜賊亦因以潛消地方之民永有賴矣一社倉之設本以為一鄉也榖以義名則當以義相先斯為善俗除捐俸并發紙贖以為之倡及士民尚義出榖多至百十石者不可為例外大凡當秋熟之時或每畝量出榖半升或通鄉各户富者以石計貧者以升斗計俱報數約正副登簿保長收入社倉每春有闕食者量準借與就於保長處會同約正副批立合同登記簿籍候秋收之日加息二分納還但借榖者亦不得多至十石以外恐一人姦頑無耻催收稍難則將并一鄉之義舉而壞之也一每遇年荒大户例有勸借蓋官榖有限各村又無義榖故也若使村村有榖則一鄉之積自足以供一鄉之人加以縣倉積有官榖勸借之事以後可免且尚義出榖而使本鄉之人俱感其惠亦處富和鄰之一道也不然富本衆所忌也積心慳吝因之阻壞義舉設遇凶荒寧能獨保其富哉一出榖雖非貧者之事而歲時豐稔或一斗或二三斗亦可量力出辦準與荒年揭借義榖亦有數倍之利若豐收之年斗榖不肯出者荒歉之年義榖官糧俱不準與一各鄉舊有土神廟即有社祭之禮但俗尚奢侈因而迎神賽會花費不資不特褻瀆神明幽有鬼責致怠事端且明有人非從今鄉約舉行一切禁止或有情願施捨冀神佑助即宜準作香錢自家告諸神明登記鄉約簿積為義榖以濟人貧難豈不神人兩得之乎每歲春秋祈報買辦豬羊酒果香燭等項即於義榖內支用祭畢舉行社飲申明約法和睦鄉里庶彬彬然成禮讓之俗矣或有貧不能存喪不能舉者亦於義榖內量給以助之會衆公議而後動支各明白登簿以偹稽查毋得循私濫支冒破一各村納榖或社倉未備權借民間空房收貯待置倉後再行收入或鄉村空曠苦於看守不願立倉者即公議積貯亦從其便一給借固貴均平亦慮陷失榖本每年支借之時須會衆公議量其可借方準托保借與敢有輕借遊手無賴之人以致負騙及強梁姦貪之徒以市私恩俱於收管人名下追賠其收管人敢有揑開花名私取規利者衆共呈官追罰若出入公明每年亦宜量給以酬收管之勞湖廣澧州社倉規約序萬鎮嘗謂周禮一書為民慮深矣其比閭族黨必相救相賑六行教民必使任恤繼於姻睦之後古之聖人既愛其民又欲使其民之交相為愛故法立而俗厚有由也吾鄉自罹兵革之餘故老凋零習俗頺弊富家巨室溺於商功課利之習又無君子長者之論以激發之故舉事而益於己則為舉事而稍損於己則弗為甚至積粟紅腐以俟飢歉穹其價以厚其售曾未聞有倡於義舉者吁何薄也間有稍異流俗能好義者不過曰修道路之崎嶇治溪澗之瀰漫以為往來稱便而已夫道路未甃止艱行溪澗未矼止病涉此一夫之任爾假令民日乏食久之弱者轉溝壑強者奮臂大呼相率而為盜事勢至此以富自足者可保乎余平生念此久矣因觀先儒文公朱先生在建遇大飢請於官作社倉建甚德之其事有感於豫欲率鄉中富而有德者法而行之凡與盟者榖以十斛為率十人所聚榖百斛擇里之賢有才者司出納焉其法則倣文公規模使貧民歲以中夏受粟於倉冬則加息十二以償歲小不收則弛其息之半大䘲則盡弛之期以數年子什其母則惠足廣而息遂捐之於民不惟民有所給食無復變亂之虞而古人相救相賙任恤之法所以使之交相愛者庶幾復見於今之俗矣顧不偉與因書此以為同志告幸相與勉而行之汪道亨修舉社倉事宜一議本榖本社集社長社副社衆會議各量貧富家口為多寡户分三等等列三則其輸榖之法每月一會約定會期上上户每會一石上中户每會六斗上下户每會四斗中上户每會三斗中中户每會二斗中下户每會一斗下户不與社榖初貯榖本尚微不許輕易斂散如遇便肯以一歲之榖盡輸於社或分為三四會輸完亦可不必拘定作十二次如粟不便者許納銀錢登簿遇賤糴貯社中若有家道頗殷而絶無斗榖入倉者即書某人名加以頑吝二字貼社倉內但遇荒歉官社倉榖俱不準給其有鄉村隘小不能分三等等不能列三則者即隨社大小減之其榖之數亦酌量增損一議義榖凡社中富而好行其德者能於本榖外願輸二石入倉者紀善一次四石者紀善二次十石者紀大善一次二十石者紀二大善三十石者紀三大善州縣掌印官奬賞輸五十石以上者該府暨州縣送扁書好義二字輸百石以上者本道送匾書施仁二字照例給與冠帶輸至二百石以上者準給冠帶優禮本道及兩司送匾書樂善二字其輸四百石以上者申請兩院送匾書積德二字給與冠帶仍優免雜泛差役犯罪不許加刑此外若輸粟八百石以上者申請兩院照例奏請竪坊表里一議罰榖凡官司自理贖榖除照舊入預備官倉外其各社有鄉約演禮不到保甲直牌怠玩及一切違犯稍輕者聽約正副酌處罰榖其有本社小事口訴不平者聽約正副量剖曲直罰榖使之平息以省赴告及株連干證之費或赴告而自願和息者該有司酌量罰榖輸之該社取具倉收免罪情輕者批約正副查處量罰是為罰榖登簿備查一議息榖倉榖收貯若干每年於二月起至三月四月止宜出陳易新餘月不得輕借其交還月分自九月起至十月止不得延捱以致榖價漸貴輸納愆期初年榖本尚微每石取息二斗如時小歉則減息之半行至三年之後榖本漸裕每石取息一斗如時小歉止取五升大歉則盡免其息凡給借之户或過時不還或還而濕惡不堪者送官重治後次不準再借出借之時須會同集議量其可償方準托保關借如遊手無賴刀頑無信強豪不馴者不得輕與如或輕與以致負騙者俱在保人及收管人名下追賠收管之人揑開詭名冒領私取規利者許人訐告另行追罰每放借完日即將本社中下人户支借過榖石若干應該息榖若干一一登簿以便稽考餘榖收貯不得混支升合每年終結算出入明白給與收管人一石以償其勞胡其重曰社倉之制原為周窮恤乏若量其不能償而遂不借是極貧極苦之人反不獲沾周恤之例似難為情雖以糴本為重殊失立倉之本意矣此處仍須酌議至於年終償收管之勞當以二石為則一議倉庾以上四等倉榖收貯倉庾之法不可不講須查各處舊有倉者基址或嫌狹隘相應設法量增房屋或係假借相應措處凡建倉屋四圍空曠不近居民煙火其有與之相近者須買磚堆砌以備不虞以上費用俱於四等榖內取之或有尚義之士獨任其費者官司重加奬賞其平素無倉地方若新斂有榖或於各鄉約寬餘處所寄囤或各鄉約所有空居即處其值易買俾鄉約社倉合置一處尤便或借廢寺廟庵觀暫貯俟榖積果多則公議扣榖建倉凡有人樂助者或銀榖或木石隨意多寡俱登記於簿勒石埀名各該州縣每年終通查所屬共建社倉若干仍將千字文挨順里甲編立字號共若干處各置牌匾大書其字號社倉五字懸挂倉門該州縣將總數報之府州以便稽察一議收掌各處既有社榖社倉其收掌出入當立社長一人以本處齒行俱優者為主更兼家資殷實者為之更妙或即以約正保正為之凡社中事務皆聽裁決又立社副二人以年力強壯行能服衆者為之或即以約講約副保副為之俱要犬牙相制社長專管封鎖社副二人一管出簿一管入簿又立社傑二人或四人以壯年公直有才幹者為之俱從社長社副指使分任勤勞既立諸人之後須置社榖出入二簿先將各户輸榖登記入簿內待出放之時仍將各户借過若干數目登記出簿內造完送官查驗印發本社待後照數催收一議典守社倉既設則典守不可不議如或社長近倉則即以社長兼主守之事社副社傑亦然或俱不近倉則宜另立社直數名或以本地人夫輪流值日或換甲選擇一季一換俱聽便酌處不若於社倉之傍公立社學令子弟在學讀書則莫非看守之人不必更立社直矣務須加意防間不致疏虞為要一議稽核各倉積榖既多姦民或因之以滋侵漁若經官逐一查盤則必重為民纍合無免其查盤止於本府管糧廳置循環簿二扇各州縣每年五月將放過若干十二月將收過若干赴廳倒换備查各倉放出收完俱報本州縣其餘出入民自收掌官司或因路便或出不意抽查以革姦弊其經管之人如果公勤謹慎衆所悅服增息榖至三百石以上者稟官旌奬其有侵欺及借貸之人負掯互相容隱者許諸人指名首告官司著實查追不得姑息一議分賑凡遇大䘲之歲官府行賑之時約算本社除上等可以自給外其餘中下人户各照本榖原數聽其分領自非凶荒不許討支其本榖之外尚有義罰息等榖約算若干社長等公議酌量本社應存若干以防後日應賑若干以救目前分數議定而後開倉其平時施榖入倉先上上户次上中户次上下户次中上户次中中户次中下户其凶年賑榖則先下下户次下中户次下上户等而上之至中上户而止仍查其中有先富而後貧者準賑先貧而後富者不準賑其年力強壯能為人營運及堪為人傭社中有興作者收之給與工食傭工有力強而不為傭不事生業坐以待賑者賑凡二次即止其分賑宜常留贏餘以備後賑一議推恩社倉行至三年以後粟有贏餘凡社中好修貧士孝子順孫不能舉火宗族親戚俱無足恃者貧而有喪不能舉及子女過時不能嫁娶情景可傷者節婦年自二十四五以前孀守至今已踰五十一向無隙可議者民年七十以上貧而且病衣食俱乏者俱聽社長等酌議周恤登簿報官不許徇私冒濫一議費用倉中逐年紙劄及修整倉厫書算守倉人等茶食工雇并春秋祈報應辦儀饌俱各訂為定式使不豐不儉經久可行或所用反過於所積或所積僅供其所用則非立法之意預備儲蓄之策矣務宜斟酌若日久榖多又將榖本漸置社田亦無不可一議社學古之教者里有社家有孰黨有庠此教化之所以易行也故社學亟宜舉行社長人等各查本處現有社學或只有蒙館幾所坐落某處原無社學須公同酌議於公衆地基置建社學亦照社倉出榖事例勸諭衆人隨力樂助或待社倉行久以義息等榖創立建立之後即報州縣亦順里挨甲編號置匾書寫某字號社學懸挂館門既富而教亦化行俗美之一大關係也勸輸文沈鯉夫倉以社名則非獨有司之事也蓋所在居人均與有責焉傳曰未有上好仁而下不好義者也未有好義其事不終者也今吾邑侯為吾邑賑荒計既肫肫若此矣豈鄉士大夫與居民有力者自為桑梓身家計反不能好義終其事與吾知其必不然蓋往見里中士大夫饒於財者未有不結社飲酒以一日之樂糜小民終歲之費也未有不窮奢治具集水陸之珍強客屬饜而客謝不能不止也未有不盛飾山池臺館魚鳥花竹聲容耳目之玩而費纍千金不惜也未有不以其鼠壤棄餘委諸無用而明以資火盜陰以損已福也諸如此類費何可勝計吾不謂諸君之盡然間亦有不免焉者儻稍裁百分之一以輸之社廪備荒年賑濟而起人溝壑之中不過升斗中一粒耳而遂能施仁義以行德化無用為有用諸君亦何憚而不為此而忍負賢大夫此意也夫既名為士大夫讀書明道理當思天下飢由已飢顧乃於同室之困不少置念凶年飢歲家有餘資廪有餘糧僮僕溫飽而目睹鄉井餓夫枕藉溝壑者曾不少顰蹙其眉則亦與凡民何異於讀書明道理謂何此無論陰隲暗虧觖望難釋苐人皆有不忍人之心豈以吾輩號士大夫反不能善推其心以為鄉閭倡耶且條陳民間疾苦以請命於邑大夫亦吾輩責也今邑侯不待斥言先自軫恤厪思善後之策欲使吾父老子弟長無凍餒吾輩有不感激踴躍相率首應者非夫也諸君必不爾也乃若環邑居民雖稱不腆然其間有力者不嘗有結社攢錢隨會講經為人所籠取乎不嘗有修寺建塔鑄佛塑神望南海走東岱跋涉道途足重繭不惜乎不嘗有齋僧飯道建醮設壇為遊食供糗􅖲而自謂修因果種福田乎夫此數者皆無益之事而為人所鼓勸輒竭蹶恐後積榖備賑乃有益之事而邑大夫惓惓焉反趦趄不前此何以説也夫神明正直無可私媚所福祐者必是好人既是好人必行好事行好事無大於濟人利物濟人利物無過於凶年飢歲與人盂飯可當斗粟舉我一念可活一人故欲積陰德行好事者惟此時最得力亦惟此時最省事神明降鑒惟此事最分明亦惟此事最錫福諸君如欲為今生為來世為身家為子孫當無以逾此者何故不為而乃營營焉役役焉求之於茫昧窈𡨕之中不見有分毫報應之益也吾又為諸君大惑之夫公輸苦浩繁而社輸有限量公輸有程督有稽核有罪係而社輸緩急自便賠纍無虞且自積自備雖為人亦為已也況貧富何常吾今以濟人安知他日不有人濟我也惟願士大夫與居民有力者謹承邑大夫教令而道揚其波澤以贊成盛舉無忽荒政叢書卷十上欽定四庫全書荒政叢書卷十下湖廣布政司參議俞森撰沈鯉社倉條議官廪之備賑社倉之廣積均以為民也然就兩者而較之則官賑終不若民間社倉之為愈也官賑不過一二所社倉則逐里各有建置積之多方備之無窮而輸散不出境其便一官賑者官自為之也其勢獨社倉者里人合力為之也其勢分分則集其力於衆獨則總其勞於已衆力易舉獨力難周則任獨不如任衆其便二官賑必須慿里甲報舉而里甲諸人皆素以漁獵自資者也報者未必貧貧者未必賑反使公家積貯徒以惠姦則賑施文具耳社倉則有公正好義衆所推服者為有司分任其事而又有賢人君子可備咨訪故本里居民孰貧孰富孰上孰下一一皆有真見粒粒皆有實惠也其便三官賑必須按里甲次第較户口貧富多寡逐一審問有司或有他務相妨則勢又不能速審曠日持久遂使枵腹垂斃之民日望倒懸之救或不及一饜以死者有矣社倉則各濟各坊隨投隨給其周之若燭照而豫之如取擕其便四官賑不免有盤撥轉運之煩有需索使用之費有斗斛高下之分有推挽負戴之勞而社倉則悉無此纍其便五官賑率不過一二所而境內飢民嗷嗷待哺者常千萬計駢肩聚集沴氣薰蒸多有他虞社倉則各里各坊分局自濟散而不聚自無他患其便六且民俗之日以澆漓也如逝波之東下而不可復返也社倉既立則里閈共為有無必藹然有同室之義一體之情蓋不但緩急相周即百姓親睦民德歸厚亦且由此其便七人情不能無公私今令于國中曰吾勸輸備賑出爾私藏而公諸同邑不相識之人非甚倜儻誰能應之哉惟各里有社各社有樂善而好義者各相勉其本里之人動以惻隱之良勸以隂德之報人必不能恝然於此而荒年賑濟亦惟此里之人得用之而不以泛及其他即輸者有時而貧亦反以自取給焉嚮其利為有福此民之情也因而導之當趨之如流水矣其便八且古人于搜狩寓講武于井田寓譏察于東南其畝而溝澮互分者寓禦暴於先公後私者寓作忠於相助相友者寓厚俗大抵制一事則默寓一法如社倉之法行則里中之善惡賢愚孰可用孰不可用皆得周知之是政教之助又在此矣故曰官賑終不若社倉之為愈也社倉千古良法其終於不行者則以尚義樂助慮有大户之名出陳入新恐有催徵之擾官司稽察則有吏胥之纍甚至官長公事所需或借此以應急久假不歸私藏化為公用積之艱難者必且廢之一旦是以士民旁顧遠慮懷疑搖手而不願為也必得良有司堅意主持誘掖奬勸鼓舞作興鄉先生表帥閭閻倡率贊勷力請當事具題飭禁凡力行社倉處所永不科𣲖大户決不官吏監督決不經由查盤決不那移借用設有姦蠧蠱惑有司擾民紊社者立治以法則民志一定而不疑知積聚皆實濟里中緩急綢繆桑土之具靡不爭先從事矣世有治人無治法法之善者全藉得人以相助為理今擬各里先推舉好善而公正老誠而精敏者紳襟士民十餘人如本里縉紳雖多止須推舉一二位坐鎮主持其餘俱選士民耆德以便效勞宣力立為社正二人社副四人正副專司其成但恐或以冗奪或以病廢故多備員以便司董正務社直四人凡社中應舉應廢之事社直得調停之不公不正之事社直得糾正之社幹八人凡急公輔弼如徵收銀米出納錢榖開寫册籍策應公務皆須多人以便分任得人最難善任尤難喜事者未必堪充堪充者未必喜事凡賢良先達及孝廉庠序中忠厚廉潔之士或鄉里有德望誠信謹願好義之人有司察其行實以禮敦請既舉之後即須實心任事虛公博訪務求盡善盡美倘里中有敏智博達議論平實可用者不妨延請同事或他里有良法足採者不妨改絃易轍若局中之人惟知執拗事外之人徒行腹誹不惟有失同井友愛之風亦何以令社事可大而可久耶社正之任與州縣鄉約長之名不同蓋鄉約長則以良善耆民為主然既繫籍在官則有參謁迎送調處地方則有伺候審理至於公私藉賴則又未免妨功費用今之社正則以紳士聞望之人為主專司社倉一事不必責以參謁迎送也惟社中有梗法頑賴者方據實聞官官為懲治不必伺候審理也而又公私不擾無妨功費用之虞故以鄉約長之有才幹者或兼攝社正之事則可如以社正而欲兼鄉約長之名則斷無人肯任社事終無可成之日矣社倉之莫舉也貧者恆自諉於貧富者又恐自揚其富以此因循緣無真實任事之人遂無真實辦事之日也今各里既推舉數人為之董率矣即將本里保甲册逐户詢之願者入社不願者勿強其願者可即用黃寸楮印成樂善助倉四字實貼本家門首每月止勸輸銀二分一年共輸銀二錢四分計日積七毫即可勷事但恐立志不堅始勤終怠耳於鄉則須履畝勸輸腴産畝輸米二升中産畝輸米一升下産隨其便或遇大有下産亦宜勸輸蓋鄉民愚而寡謀粒米狼戾之年多為無益妄費之事與其妄費而無益何如存於本里社倉為吾他日飢荒救命之有益而不虛耶況農民最苦青黃不接之時貸富室米一石者必加四五利償之一夫之力所入幾何宿逋既要償還新租又難遲緩以致日瘠日貧流為頑鈍無賴而産主亦陰受其弊焉社倉一行則有無相通不致重困貧富交利之道也須共諭之或每里於同志中擇廉隅有素望實心肯任事者十人為會首作為一朋每會首名下各募樂善好義者十人人月輸銀一錢如力不足者不妨合數人共出一錢會首斂集投社月計積銀十兩歲可得銀百二十兩於鄉倣此積米不出三年社倉可成若好義者多不妨多立會首列為二朋三朋可也三吳風俗浮薄武林尤甚雖屋宇華好被服粲然而或家無宿舂之儲且俗尚釋道好善者每竭力以事方外家本無中人之産而樂齋僧建寺以兾冥福外此二者或有饒裕之家則又惜金如命錙銖難割者也夫此正大光明濟人利已之事饒裕慳吝者既不肯為家無儲蓄與崇尚釋道者又不及為是則相助為理必賴於通達世務而好義之人矣合於城市鄉都廣勸樂輸多少悉聽待利至數倍之日仍遵朱子法撥還元本凡有祈福􅓙災犧牲淫祀壽辰生子優伶筵宴等無益妄費悉當勸省以益社倉此外里中或有鬭毆爭訟事在有司尚可調處者或令其量力捐助具息回官更有罣誤小罪應干吏議者或情願捐助免其究理仍不暴其過犯之由書以義助美名隨緣鼓舞事可以集也稽察户口社正副等公同里書及保甲等逐户挨查書其居址何地房屋幾間或係已産或典或租年甲幾何男婦幾口同居幾人作何生業或有高年七十八十以上或有孤寡殘疾之人皆須一一詳列而所抄户口又須分别四種如衣食充足者書以仁字衣食僅足者書以義字衣食拮據者書以禮字衣食不足者書以智字以為後日平糴張本內中設有孝子順孫義夫節婦以及安貧樂道賢良方正之士必須訪實以備當事採擇其有不良之輩亦須密密令人委曲開誠化導令其悔過自新更有一種精力強幹遊手失業之人當思收羅撫用或勸習手藝生業而又怵以禍福忠義戒其恃勇露才以取禍患至於土妓流娼窩盜作姦夜聚曉散蹤迹可疑者當曉諭本甲協同地方令之出境以免他纍凡此皆以本里之人稽察本里之事自能數計燭照物無遁情則保甲之事即寓於其中從此力行鄉約擇善講者宣揚解説月一舉行於以阜民裕俗何有各里每保置收銀米小簿二扇公所置收銀米總簿二扇用銀米簿二扇雜記條約告示等項簿二扇其簿俱用鈐縫印記其一社正掌之其一社副或社直掌之以杜曖昧不明及防水火意外遺失之事仍置大簿一扇書某某輸助銀若干共收銀若干糴米若干糶米若干仍存若干其其助米若干共收米若干貸出米若干得利米若干雜費米若干仍存米若干逐年條列舊管新收開除實在四柱清數造册報縣批驗用印仍各領回外再用簡明總數開具一呈存縣立案以防欺弊里人既肯同心樂輸每日清晨即宜拈銀少許另置一處積至月終雖極貧者不患無二分之積矣銀期足紋隨便零頓交納其收銀者即用社中人每人分認一保保各一簿逐月逄九收銀給票於每月初八日齊集公所併銀稱估面同登簿本月收銀若干折色若干實收銀若干隨傾十足積貯某所今以小里分計之里中好義者或有三百家家月輸銀二分經年可積七十二兩隨以此銀分寄典鋪或殷實之家可朝呼而夕應者薄起利以生息之或竟至冬囤米夏間乘時價糶之如此漸積至十年又併每年生息雖小里可得千金之米況又有樂助者乎故亦不必拘定十年但使每年徵積得本里有米五六百石即可停止輸助矣城市積貯最難初年集資未廣且宜將銀生息惟擇店業茂盛及溫厚信義之家多則貸之十金少或一二金周年二分或分半起息但取呼吸立應耳若夫薦紳則不敢勞生息庠友則不能勞生息胥吏則不便勞生息也鄉都曠野之處或效北地社倉之制蓋建倉必須上棟下宇有磚瓦木石之費有透風重簷之設而雨雪薄簷易於沾濡鳥雀緣空易於剝啄倉鼠穴墻易於圯壞則又必歲時修葺費且不資況榖既入倉陳陳相因則紅腐而不可食出而晒晾之則遞晒遞減因緣為姦矣社倉狀若圓囷所需惟草木泥芭無磚瓦木石之費日色易透則不煩晒晾無重簷則鳥雀難入四周時有人迹則鼠不為耗誠便利也城市多流寓遷徙不常若槩用朱子加息之法倘貸米者一旦遷去則社本化為烏有矣城中社倉斷宜兼用平糶一法每歲五六月間先算積貯幾何石里中貧者幾何家通盤打算約可平糴幾何審其户口量減時價給票赴糴先儘最貧後及次貧此為榖貴設也若是冬米糴價一兩至夏米糶價亦止一兩則折耗無償似不必逐户平糶但照時價總糶之為推陳致新之計可也若冬米一兩夏米一兩二錢除去折耗亦獲息僅十之一止可積為荒年平糶與賑濟之用本年亦不能減價糶也朱子社倉法諸路有願依此置立社倉者州縣量支常平米責於本都出等人户主執斂散每石收息米二斗收到息米十倍本米之數即送原米還官却將息米斂散每石只收耗米三升其有富家願出米本者亦從其便息米及數亦與撥還今議州縣常平空虛勢須里中自輸自積如銀米積至十倍本等之日其城市之人除遷徙别里者未及還外其原居本里者仍總其本銀之數一一扣還至於鄉都之人亦總其本米之數皆一一扣還由此言之每年積之零星十餘年後却能收之整頓在貧者既可抵正務之需而在富者亦足為高深之助是猶藏之外府耳而又有好義樂助之名人亦何憚而不為耶朱子法將息米斂散每石只收耗米三升蓋朱子有遇飢蠲息之議初無賑濟之事也今當稍更其法待息米斂散之日每石仍取利一斗另記一册號曰倉餘一以備荒年賑濟之需一以備常年勸善之用如禮高年恤孤寡立義學拯疾病禍患之屬是也社倉雖聽民間措置有司並不干預抑勒但事成之日必須呈明上臺設有侵欺等弊或暗敗公事者許諸人直陳其姦官司立行處分務使懲一而警百以杜亂法之萌可也小飢固蠲息矣設遇奇荒不妨併免其本待後陸續帶徵徐圖如前措本可也按以上社倉條議係歸德沈鯉所作後為杭人張文嘉所增刻本不復分别今併録之不及辨也倪元璐翼富倉敘歲大䘲民多死徙公私上下皆以成周委積之義為當求其當事大夫規𢎞經遠惄然聚而謀其大者以求儲於官元璐繭存城曲以拘墟之見退而與其鄉之士大夫訾然謀其小者以求儲於社乃稽古社倉自隋及唐參之伍之要皆有未協者以其資計威教悉仰朝廷蓋非鄉之自為功者也鄉之自為功者古今惟考亭一法然在考亭自為之則良他人行之或敝繼此真文忠行之武安亦良其後人踵為之日益敝考亭不曰里社不皆可任之人乎所謂可任之人者能人義人慎人信人廉人天下茍不得是數者之人昔之碧血今為冷風悲哉法之倚人行也元璐之法因時制冝欲使雖不得數者之人而亦可不害者則有五道焉曰託卑託卑者何也夫託尊於官即廢興由官官雖賢三年而權盡崇安之法之所以不復者亦以其後舉倉歸官耳今以士人世其事以中壽量之極其身三十年其子若孫親見其事習其所持各人三十年是則百年常在望也百年之法以官守之須三十人以土人守之父子孫三人而已家無繁令而安里有多言而憚此為雖不得能人亦可不害者一也曰居約居約者何也千人之聚有田者常數十人若以王戴之法畝責輸升是使數十人共執倉命也此數十人者必有數鵂焉必有數蟊焉今約之五人則尊爼揖讓定縱堂皇者五人耳其千人常在階下其數十人常在壁上謀靜而專志咸則鋭此為雖不得義人亦可不害者二也曰絶纍絶纍者何也劉晏以假貸非福青苖直以貸禍即崇安良法後人敗之拘催不堪咸以咎貸是故以粟貸民求息則粟有再死民亦有再死民頑不時歸粟粟小死歲大飢問諸鳩殣粟大死以法治民頑民小死春散秋斂五六月間價踴求粟不得民大死今就糴徵利以平為功金粟迭處不離其據此為雖不得慎人亦可不害者三也曰制欺制欺者何也大嚼者咋斷其舌左手持鍖右指惕血一身不可相信而況於人乎故鳴鼓雖公不救往過要鼎雖薄不形來愆今質入榖出以鍾易石是使受者不私私者不負驥駑同橛不見驥亦不見駑夷跖並居不患夷亦不患跖蚨飛去來倚枕聽之周鄭交質之謀而有邃古結繩之化此為雖不得信人亦可不害者四也曰藏富藏富者何也過府而戟指者希不有盜心執炙終日寧當不知其味乎寢處京坻而我無與焉不及十年庸人皆倦矣今以為其家之肥期而歸子旬而歸母後乃盡子囷子凡榖六千石受息千二百石計土田歲入榖五石千二百石則為腴田二百四十畝是則五家子孫世世之業也富此五家而千家乃不飢食五家於倉而倉乃足千家之食自抱其珠誰得脫者此為雖不得廉人亦可不害者五也凡此五者皆古所未嘗謀自元璐以意創為之妄計雖甚淺踈斷可百年而上因著為説以諗同人今飢民習賑等於驕子更一年不登誅求富者必立盡此云翼富是為富者策救使不得貧耳至所寓意保甲鄉兵云然者安知是倉不為武庫耶或疑此法終難行者固也當考亭始議社倉時吕東萊規以任所難任恐不成功朱吕且然何況今日雖然請自隗始翼富倉條例一每坊村各建義倉一所度可容六千石者或初年物力不敷暫借同會中私囷貯之俟後資集補建充拓可也一倉以防盜備火為要一會侣以少為貴五家足矣內有資計不足集兩為朋者其出名任事惟只一人意防敗羣此為切著更少至三家兩家或一人獨任尤妙一千石五百石各隨其便一倉分運定二號運倉以供春夏平糴轉輸於秋成之前者也定之為言停也留之秋成之後以防臨穫忽荒如萬厯戊子大稔將收忽大風落穗遂成奇荒故須八月萬寶告成然後發糶凡新榖入時人爭貴陳米礲淨出糶較新米可贏息三分少亦一分五釐即時回糴新榖以一本一利還倉一每年入榖以蚤榖方旺晚榖將升之時為度其出糶初年榖少恐太蚤猝遇米貴無以為救須六月中旬以後幾及秋成之時方可出倉其後榖數漸增惟權飢口扣留平糴百日之資為備其餘不妨隨時徵貴糶之地方又初年每五百石量留百石至新榖既升以陳榖發糶亦防意外此因定倉無榖而然其後定倉榖入至五百石以上運倉即不必更留餘榖遲糶矣或當五六月時大水亢旱荒徵己見即應悉留停糶以備非常蓋大飢極歉非留經歲之糧不足以濟也一每年以七月十五日交盤運倉糶出本利銀兩以九月初一日交盤定倉及遲糶陳榖本利銀兩承領者必先輸質物田屋照活賣貨物照典當以十抵六仍集衆公驗由票真偽産業虛實器物佳惡計榖本利萬全無失就册開寫明白交下肩收執方準承領其次年下肩領到本利不欠方準發還原質如少欠留質勒補多欠即以所質物當之此為經久之計不容不慎且相稽相察一彼一此不須拘嫌違約者罰一榖息運倉以二分定倉以一分五釐為率浮者悉入定倉充修倉犒丁及抵補等費縮者於所給五家剩息內扣抵如又不足明於册內開載本年少利若干俟後贏年補足一每年交盤之際上首知會定期次及者陳戒牲醴集諸家於關聖及本境土榖啓焚誓文隨具散福小飯公同交割承領一每年糴榖既集司會具五簋小飯集諸家驗過仍將糶數及價登載册內至出糶平糴之時俱各知會諸家集議而行不得專擅徑遂違者議罰一平糴查清户口分為上中下極四等上户不聽糴中户六日一糴下極户三日一糴極户仍減平糴價什之二每口日五合初年榖少或只三合給票驗發往年凶米價騰時坊分二等次貧平糴極貧給賑今有社倉歲歲平糴則無凶年矣故不分糴賑惟減價示優若有非常又非此論一坊各管坊本坊平糶所餘發糶他村坊者一準時價一糶價賤與糴等即免科利亦不分給五家或糶賤於糴虧折原本五家仍斂資補足如數俟贏年補足五家一定倉榖隨用隨補取之五家分息一年不足則以兩年三年完之務如原數而止一五家先而收息既而還本久而徒手得利日久益充此為藏富於社猝遇大飢大賑倉所不足此五家者即責之傾資以應其何辭之與有一榖以極燥入倉自然不耗升合耗即始入不慎之故司會自行賠補一日後榖盈或上官以公事勒借他方以缺糴告通者皆須死爭不應不得則率一方之衆操引誓條婉切陳曉事必當止若畏禍徇情以致虧廢者具如誓言難逃神斧一每常平糶之時懼有他方起而強糴者預選本坊壯丁自十人漸增至五十人初年物力未敷只可十人或二十人以後漸充則漸益至五十人而止署曰護糶鄉丁每一次平糶輪十人防護有事則紏衆遏禦每一次值班十人各給榖六升秋收新榖既入統給各丁人榖一石俟後榖充漸可加厚秋給歲以為常日給不遇平糶即除自初年選定人數姓名年貌登載丁册永永用之不堪則革遇缺即補以寓保甲鄉兵之意云一助罰等榖皆入定倉一建倉之費五家各出糴榖之費取之糴本惟修倉及護丁工食司會借發取償公息先扣後分本年或無可扣明年補之倉或間歲或三年一修一給賑無告雖豐年亦然然且索之十年之外者惟因初年資薄尚難廣捐要在仁人豈能等待因時起義隨所用心爾一置册八扇共一套運倉出納册一扇定倉出納册一扇贏息出納册一扇交盤册一扇納質册一扇雜費册一扇助罰榖册一扇護丁册一扇誓文某年歲次某干支某月某日某干支某坊鄉司社某某等昭告于某神之靈曰循古之制如何得飢常平制公崇安制私私之扶公譬轂輻持爾坊我鄉則各有司積貯大命閭黨連枝同道為朋主善為師道存救患善在因時非若青苖貸之督之以濟取利如草春滋乃倉乃箱千斯萬斯菜不著色珠不入炊堯不怒鯀湯不畏􅖆凡若此者皆神之為以饗以祀敬歌楚茨冀神有靈明昭孔時水火盜賊屏諸四裔並形彰疸間邪禁欺或有不率具如誓詞一侵沒三百石以上承上誓二百石以下五十石以上承中誓五十石以下承下誓變賣所質不失原數許於完日牲酒告神懴釋一欺隱贏息及飾贏為虧者承中誓一既分倉息而遇倉缺乏應斂資分吝不應者承下誓一以偽由物質者承上誓一官借民借不能力爭以致虧廢者承上誓豫受皆然一一切費用妄報浮濫者五十石以上承中誓上誓奪算祿俱盡身無可奪則及子孫中誓奪算一紀身無可奪則及子孫下誓奪算三年蔡懋德修復社倉議從來救荒無奇要在平時預備如古人常平倉義倉皆可行而朱子社倉之制為最善近見臺臣申飭天下守令乘時積榖一疏此皆備於未荒老成憂時深慮則凡可推廣德意與軫恤氓艱者似不妨權宜變通況良法亡弊成規可遵如社倉者乎但法須簡便著實其中事宜僣陳六則於左一定倉制朱子社倉法初建之崇安開耀鄉請於本府得常平米六百石夏間賑貸至冬納還每石量收息米二斗自後隨年斂散歉則蠲其息之半大飢則盡蠲之凡十有四年得息米造倉三間及以元數六百石還府見儲米三千一百石在倉不復收息每石止收耗米三升一鄉四五十里雖遇凶年人不缺食其有富家願出米作本者亦從其便息米及數亦與撥還此社倉之制朱子請於朝通行天下者也今宜倣其意而消息之即附鄉約保甲而行每鄉有約每約有倉以本里之蓄濟本里之飢權豐歲之贏救歉歲之乏緩急相通不出同井子母相生總利吾儕此鄉中人何苦而不樂從哉曩時社倉難舉易廢者以士民一輸榖入倉即為官物封貯不動有耗無增人安得常樂施廪安得有餘積蓋襲社倉之美名而失社倉之妙用所以間行而不能經久也今一如朱子隨時斂散加息減蠲之法而更因時變通於其間則法可久行而澤遍郡邑矣一因倉基建倉工費此時必難即辦既奉憲行鄉約必有約所在寬厰寺觀即於寺觀內擇堅固空房一間或三間量里蕃寡以為增減杭地梵宇甚多不難設法修改其他預備常平之剩厫空間公署之餘屋亦可隨宜酌用總求因便以省營造之費一裕倉本昔朱子請府米六百石為本今議每鄉置倉難盡請給於官矣欲勸民間義助恐杭地鮮蓄兵火加𣲖之餘未必樂輸響應今奉明旨四積之法中可斟酌推行如納粟援例事關達部而本鄉絶産為姦里影占者可清出即充本社榖本也金作贖刑部文除大辟外照例準贖所括甚廣然恐開富室便門而罪外批加刑責及例重情輕者可量納榖本社從輕宥免也時雖詘而尚義有人即於講約中委曲勸諭賢士大夫留心桑梓身先為倡并如朱子法息米足時撥還原本其樂善義士必有風行雲輳者而又通以憲頒約保旌善懲惡之意如一約中人户富而好義者量力輸榖若干石與孝子悌弟輩一體載紀善簿其犯罪應記懲釘扁而知悔改者願輸榖若干石姑免載懲惡簿再犯不悛然後載簿釘扁其門總在本鄉中隨方設法鼓舞流通而倉本不患為無米之炊矣一推倉長社倉既附約所即用選舉有家有行約正約副司之夏散冬收聽在本約通融權貸仍量議看守折耗之費縣正官印簿二扇一存縣一存倉止報出入時日數目以慿不時清查官府不必另委查盤滋擾一發倉儲凡倉榖賑貸無法則姦猾占賴強梁擠奪而貧弱仍無實惠須編保甲時立法精詳如一甲十户預先分别上中下最下户等次開列在簿與給挂牌符合無於青黃不接時出貸至冬收納量加息耗一如朱子法其間權歲有大荒小歉計户有極貧次貧而減免有差及節婦孤寒火災病患情尤可矜者亦可公議減免如有頑户年豐力充故意拖頑者稟官追榖仍不許再貸總以裒富益貧酌盈濟歉政不必避加息之名要足備一鄉之緩急而已一釐倉蠧凡約正約副管倉務要斂散公平登報清核為里中服從三年官給扁奬賞并優免雜差以示勸厲如不稱者許講約時里衆公稟選換甚有武斷生事欺侵倉榖者按法治罪右社倉法附約保而行雖有限蓄儲未能供無窮食指而鄉有倉倉有積猝遇災警少覺有備亦足安輯人情即平時同里相周不失敦讓風俗是在因時而力行之將古人不專美于前而疲黎庶幾有起色乎蔡懋德通積備荒議一實在官廪往時收貯積榖多係倉吏圖便折乾挪移營運凡遇查盤歲核或以折價貯庫秋成補糴為辭或因迫限督催強糴不堪充數年年減耗有損無增以致倉廪日虛有司留心者非不嚴飭而積習一時未掃今後凡追應納倉榖務要即糴本色上倉如果青黃不接或仍折銀初冬實糴或即照榖計算納米以杜姦胥折乾侵蝕其米榖亦須設法出陳易新每歲夏季給借冬初收納不得數年久貯致滋浥爛耗減庶倉廪非空名而備賑有實益矣給借倉榖市民舂杵不便合聽鄉里願領十人同具一劵收時量加息榖以補耗減一勸民間自積杭不産米又俗尚趨末家鮮蓋藏貧民無力可積雜作諸色力能隨時趂食而不事積富厚之家多開典租房收絲蓄貨以取利而不肯積一遇飢饉束手無策甚有愚民遊棍家無擔石外競奢華年豐視粟如土交易定􅀈銀錢曾不思荒歉之日鄰封遏糴始而價湧繼且持錢擠候無處可糴嗷嗷待哺圖救然眉雖有奇策無如何矣今後合無通行曉諭保甲牌上懇切申明此意除貧窘小民不計外稍足之家毋論縉紳士民在城在鄉常思此際之艱各乘秋成時候隨力糴積其富户積至千石保甲公舉核實報官官為勸奬即遇凶荒發糶仍照時價官司勿與定價姦民不得強糴其平時一應民間貿易許令銀米均用使民間自為積貯之圖而隨豫以疏通之法官不擾而民樂勸有益無損之術也更有一法民間積米百石以上者許令報官驗實府縣給與樂積良民印票奬勵遇有詞訟當杖責者執票量為輕重豁免注銷似亦不費之惠一鼓典鋪樂積使典鋪積米而責令官糶勉應一時勢難久遵欲使人人樂積莫若亦許其時價發糶為便非為典鋪省數金之資也蓋官價之名甚美苐行之目前徒添姦棍擠搶之擾而訛傳遠方復阻米商趣赴之期況典商算析錙銖惟知營利積米既奉官法發米不虧私本又何憚而不多積乎更有一法許令民間以物質米以銀取質悉照時價銀米通融蓋窮民質銀仍多糴米過活或全要米或半用銀一聽民便如此則所積之米陸續散出民受接濟之惠而積米之資還得花息商獲儲峙之利而官府曾無益此厲彼之令但積糴之時務要領批往遠處産米地方販歸實數著同保正具呈甘結以虛數妄報者罪以貪便近揭者罪法在必行彼保身家自知遵守不必另托衙官查核以滋搔擾如是而典鋪仍藐玩不遵者即繩以三尺亦復何辭況彼自鼓舞樂赴也一通行商遠米所云通者欲其舟車飛挽如水流而不止也昔盧坦為宣歙觀察使歲飢或有請抑榖價者坦曰宣歙榖少仰藉四方若價賤則商船不來益貴矣因每石量加十許錢四方聞之爭相輻輳價遂日減此通商之利也商賈徵貴徵賤趨利如鶩别無招之之法惟不抑市價無損其利則不招自集矣又有一弊每緣姦牙猾鋪空手斛其米貨負價任意遷延是以外商束手耽誤望風畏縮阻於中道隨地發賣米船鮮至米價不得其平也今後務宜公舉誠實有身家者一人為牙首許其稽察各牙不係無本之人方許開行接商凡商船一空即行交足米價令其即行不致久滯如有侵用久拖者許本商呈官定為追給又請憲臺備行各經由關𣙜凡糧食重載悉蠲其稅查驗明白船到即發毋久掯留或有米商夾帶别貨希圖漏稅者三尺自在不得慮噎而廢飱也又通行曉諭凡屬米船另行優恤決無裝兵雜運之差勒石各處要津以垂永久如此則外商聞風四集雖欲遏之而不可得米貸迸輳米價自平矣一檄鄰封弛禁遏糴之令列國時已知不善況今率土王民乃忍秦越視乎彼固曰吾以自保其民耳不知遏令一下姦賈偷行徒飽巡役之壑姦民鼓衆挾制囷積之家致扄鑰善藏本地之米不出截留強糴行商之米不通飢民嗷嗷羣情洶洶如今歲蘇常諸郡邑産米自富一經嚴禁而米價反高打搶屢屢見告遏糴不特病鄰而還以自病此明鑒也至於杭郡上仰食於紹金新秈下俯給於嘉湖晚粳而蘇常以及湖廣實為四時不匱之源吳中遏糴甚且截留楚米是米源已涸武林處坐稿之勢安得不驟然騰沸日增三價乎今議合於平時先請三臺嚴督所轄守令不許禁阻并移檄湖廣應天撫按轉諭各屬盡弛遏禁糧食時時疏通商民兩聽其便庶無米之地自受疏通之利矣一勸棧房接濟夫塘棲四面水鄉各省直米豆與諸貨物輻輳縉紳及富厚之家皆於此置造棧房或自積營利或召貯取租其來久矣大抵米粟出産有限積囤無窮秋成榖賤則收次夏絲齊則發换易之利積計每至數倍合無因其棧房之便積囤之利勸令隨力加積據實報數在縣或置一簿聽各棧户認填餘積米若干石除五月間換絲發變外務照原認米數於青黃時候督令湖墅發糶接濟省下飢荒仍照時價不虧原本彼則總之取利我則借以濟荒又或官有帑銀即令塘棲積米之家領批附糴其人起家斗斛粳粃之間計算必精駕輕就熟其從必勇而又得借官批庇其私米所利亦不少舳艫銜尾因公及私此誠兩便也一通常平遺法以廣儲蓄昔朱紫陽以常平倉米六百石計歲盈歉貸民行之數年以原數六百石還府所羡至三千餘石夫貸則有給借之煩有拖欠追呼之患今第即借今歲所發三千金及查帑庫餘金為本每歲於産米價賤時委廉幹丞簿收積至來歲照時價糶之必有微息逐歲漸增以備荒歉或嫌官與民市而必欲減價以糶不知減價之名徒致鬨爭孰若稍收微息多儲新米米多則價自減糶平則人不爭為更便乎蓋地不産米惟貴設法使米有餘不在減省錙銖見德也但今公帑告乏此銀或難久懸更在當事者設處移借耳一復社義倉以敦風俗昔隋長孫平令民間每秋家出粟麥一石以下貧富為差儲之當社以備凶年其意甚善顧今富民耗於侈靡貧民疲於征求自贍不給誰復肯出一粒以備荒者然亦未有以作興之耳杭俗崇釋每建宇修剎禮僧放生爭捐鏹金立成勝果如鄉約講畢申諭之曰爾輩同里同甲生斯育斯出入相友守望相助何等情誼倘遇荒警目擊餓莩寧忍秦越相視夫建宇修剎何如每里修厫積粟禮僧放生何如同里賑助煢乏其每里推賢士夫為倡或有司稍捐羡贖以興起之令各富户隨力捐資修建社倉漸次積貯仍於里中擇一家殷行篤者為主置一簿聞於有司而平時出入則聽民間通融權貸出陳易新如遇凶荒或煮粥或賑米總之還周一里之急此際所救飢民必真所活生命必衆即是目前真實功德其視捐金布施徼福冥冥奚啻萬倍哉蓋即借彼習尚施吾轉移不特備濟凶荒亦可敦厚風俗矣湯來賀勸設義倉序昔紫陽夫子特舉社倉西山先生設為義廪皆以萬物一體之心居安而慮危先事而夙防也丙子吾鄉歲歉吾家與姻友皆施米家大人曰小惠勿遍何如夙設義倉之為愈也賀心志斯訓久矣邇來數遇水旱舊歲稍愈亦非大有年也然而榖值愈廉者何哉人懲丁亥之飢耕者竭力而户多陳積也且家窘户乏購物無資而皆以榖為市也户多陳積故擔薪可易斗米小民不見有飢似可茍安於目前矣然以榖市物則可貯日少非如丁亥已前之廣積也家窘户乏則無可稱貸非如丁亥之荒猶有族黨親鄰可以相救援也假令一旦有荒則載道飢民望屋而食雖或自擁倉箱豈得而獨享哉今春吾邑大姓倉庾悉空矣春夏之交榖值雖廉而時聞飢殍幸秋霖優渥差可補救而食猶未足也兹遵家大人夙訓遍懇有仁心者互相鼓勵各設義倉以防飢饉在城居者或設倉於祠堂以賙宗族或設倉於近境以濟鄰人在鄉居者或各堡創設之或一都合力為之每歲秋成各出榖輸倉或拾餘石或數石或數斗隨其心量其力委曲勸勉而不強人以所難雖所積無多而荒年得此猶愈於未設也每歲初夏必出陳易新則無積久成塵之患矣擇本地與宗族之誠恪者司其散斂每歲輪流則可無侵用之弊矣小荒則減價以利農大荒則商於衆而酌給之先給孝子順孫義夫節婦之窘乏者次則老羸之無告者次則良農之缺食者惟不孝不友敗常亂俗事確名著及遊食不事生業之人咸勿給焉此倉一舉可以免溝壑可以杜爭奪可以睦鄉鄰可以維風化利莫大焉繇此推之則凡慶壽者求嗣者禱病者何不出榖以酬所願則轉無益為有用化虛文為實利不亦善乎王文成曰為善之人非特宗族親戚悅之鄉黨鄰里敬之雖鬼神亦陰相之夫所謂為善孰有大於賑人之飢救人之命哉今慶壽者若能以濟人為稱觴之祝則自求多福知必壽考且寧也求嗣者若能以救荒為續後之謀則天監在下知必子孫千億也禱病者若能以賙人之飢為悔過遷善之圖則神聽和平知必勿藥有喜也移請客數宵之費師巫一夕之資於以救數命不充然有餘哉昔楊旬每遇荒年輒貴糴賤糶以賑貧民後其子楊椿遂魁天下陳天福平糶濟人而子孫咸登顯要遂為湘湖世家昔人有云豫舊館於當湖陸氏見其堂中一軸文乃先世兩代出粟賑飢而人贈之者文中厯敘古先濟飢之人子孫皆膺高位謂陸氏他日必有顯者今日東濵公而下三代皆為九卿其言若左劵矣來賀讀家譜先祖民悅公月軒公父子賑飢不遺餘力而讓能今子孫數世亦著文名矣夫楊陳諸君子豈有心於求福哉然不求福而福自至亦足徵為善之顯報矣吾鄉親友嘗思六月大旱情形則不忍不為之豫備況師紫陽西山咸以萬物一體為心則不因無報而不為惻然亦豈因有報而始為躍然也哉一每歲將秋成即委曲相勸稍有衣食者各出榖輸倉隨心量力不得相強以致嫌隙一本村有孝子順孫義夫節婦聞其真確者若屬家貧每歲將榖送與其人每家各幾石秋成免還若小荒各奉榖若干大荒各奉榖若干就所積之多少為所饋之厚薄急宜行此以見勵俗維風至意一地方或有不孝不悌著名者及犯倫傷化逐出祠外者及遊手好間不事生理者縱貧亦不得給借縱荒亦不得賑濟必須嚴拒以端風化以警遊惰一榖久必乾且有鼠耗每十石必算折數四斗以免賠纍一凡生日或子為父母慶壽或孫為祖父母慶壽其尊人好靜不喜飲酒請客則為子孫者隨力隨意入榖義倉以祈神祝壽此實福也親朋送禮而主人不肯受者亦不妨隨分入榖代為祈福古人有放鵲縱魚以祝永年者況活人之命乎竊見鄉間糶榖以買禮儀何不即以榖送較殽儀侈費省錢省力所益更多一凡求嗣許願者即於福神前拜謁倘得生子即入榖若干於義倉留為賑濟以謝神祐及生子後即以湯餅之費糴榖入倉或請客情不可缺即減其酒肉之半以助義倉於是神前焚一疏文以酬願信可也即親朋以榖當賀儀亦有裨於實用一凡有病祈禱者即於神前發願拜許病痊之後入榖若干於義倉留為賑濟以謝神祐及病愈身安即於神前焚疏入榖以酬願信只隨心量力不拘多少此實實功德較之建醮演戲功德不啻十倍一義倉每年拈􅍐輪管算清量過上手傳下手接管必須素行忠信又稍有身家之人方許承管若家力甚貧縱有忠信者恐其急時那散不得徇情與之輪管庶無侵用而事可久行沈蘭先社倉議每里各設鄉約取私創寺院改造里中推年高有德誼者一二人主之或老鄉貢耆儒老諸生皆可月朔則召民講諭讀法教子弟以孝弟廉讓即於其後為倉房高其牆垣每遇收獲時聽有田者各捐米一石以上至於十石封貯之多寡從人不以相強此不過省數日宴會之資無益之費即可救異日數人之命近多見士紳廣施僧尼益造佛殿不若貯倉粟為救荒備功甚大也里中貧富高下户户幾人作何生業立為册籍以時稽察其子弟馴良及無賴者皆如燭照有不肖者訓飭之召其父兄俾董正之必不可教者署為兵亦可弭盜户有籍則姦宄無所容又即寓保甲之意遇凶年則按籍而稽其極貧户若干次貧户若干在本里所熟悉其稍有體者月致米若干下户貧不堪者人給米日一升按册三日總發男子一人領之不須扶老挈幼而至如此亦可省挨擠之苦凡社倉每里一鄉約則一社倉倉粟賑其本里之人或本里貧而積少旁里積多遇凶年則以富里所積分賑之務期公同協於義毋私所有鄉村慮盜劫則大户家撥一人守之許備木棍剛義之類人多吝於私財不肻捐積不知當荒亂時盜賊蜂起劫而去之則私財亦非其有然則社倉正以保富非獨安貧也其有豪富慳吝不樂為義者里中共糾之罰令出粟倍於常格每鄉約立約正一人或二人副二人倉榖出入悉聽正副册籍用約正鈐記此法遍行當無流民即有流移以官府之常平賑之天下無餓莩矣但恐今日不能遽行此事别為酌法如左欲立社倉必先立鄉約講明德義人皆樂輸又為法簡便易行如鄉約未能立仍須勸置大凡勉強之事一時即或奉行久之終歸廢壞社倉之舉願入者書其名不願從者聽倘官設印簿使里遞沿門勒書則與科斂民財等不可行也今先就數里樂行者任募於一里之內設為一倉或兼數里之衆統立一社收者散者持籌者糴糶者各俾自便官不與焉鄉間願入社者行每畝出米二升之法城市無田有業願入社者則可行每月出銀二分之法其好義自肯多出數十百倍者任之尤多者里人言於官官為給奬嘗謂民間醵錢斂分嬉戲其無益之費不少惟兹社倉才減百分之一以輸之當社設遇凶荒即以備本里賑濟而起人溝壑之中不過出平日升斗中一粒耳且仍以本里之米應本里之需積之數十年之久俾吾父老子弟永無凍餒流離其為利賴無窮矣社倉之法人不樂行者有故總在收貯於官設遇飢饉以還民猶費上納之苦況當賑濟小民未必實沾其惠即如文公遺法始行甚美其後行之不終額定報數無異正供之徵收歸官督催頓失大賢初意以至徵募之先人不樂有大户之名恐將來本里有事得指名妄報雖有仁心廢然自沮積蓄之後又恐官府那借將農夫手足胼胝民間錙銖積纍者一朝烏有則遵行之念又息若能斟酌可否因事制宜使通行於今日無貽害於將來則大善矣朱子社倉初行時貸常平米六百石今使倉本仍貸於官恐日後操縱亦聽於官而流為民害總之行於官府者則為常平不必下涉於民行之民間者則為社倉不必上經於官宜聽民間自為積散所煩憲禁具題者凡力行社倉處永不科𣲖大户決不官吏監督決不經由查盤而又官司不得借貸支動經過軍馬不得強行占取更或姦蠧蠱惑有司擾民紊社者定以某法某例則積之艱難者不至罄奪於一旦民志既定自不視為上官苦我之事而各為桑梓身家計矣有田者當極荒之歲亦多艱於舉粒設使平時舉所有以入社倉荒年但以散之他人而已則坐視無有未有不嘆社倉之法厲已矣今更酌為融通之法平時所納幾何具有册籍設遇奇荒之歲中等之家仰貸無資者照數撥還社倉原積至豐年如常量行入粟永守社倉良法既經此一凶荒一周接人家親受其益有不樂行者乎無有也其不願領歸原積者聽存貯本社以濟本里極貧之民及惠孤恤寡之用此社倉一法猶之民間結會積錢或三五十文或千百文貯之一所及歲終始出而瓜分之亦各如所輸數還歸之則出之最少而力且易為得之頗多而更適於用頌言其利而無害自然鼓舞樂行也每見豐穰之時人家得米多便不珍惜或以飼鵝鶩或飽食而棄其餘暴殄者必有天殛何如積之倉者為有益乎社倉之行全賴得人為理但里社不能皆有可任之人喜事者未必堪充而堪充者未必喜事若使經官開報遂為官身每有守候謁見之勞而無復優待之禮有品望者自不樂為此必同里自相推舉始為無弊賢鄉紳主之於前素行忠厚老成廉潔者佐之於後并心同力謹其出納以杜姦欺則社倉可行矣社倉既立其有仁孝節烈孤寡無依者里中時行周給不待凶年後數條即前一條意也稍異者鄉約之立不立及每里一倉法耳然鄉約之行易於社倉必舉鄉約其美始全鄉約舉則每里社倉亦舉矣通前後法酌而行之庶有益乎荒政叢書卷十下
