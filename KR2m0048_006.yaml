body:
  text: 荒政叢書卷六湖廣布政司參議俞森撰劉世教荒箸畧萬歴戊申夏四月九日麥秋甫至雨晝夜不止凡四十有五日而後霽於是江以南靡非壑矣農人無所舉趾衆心嗸嗸旦暮莫能必其命輒不自量妄欲借前箸籌之而藿食者之謀鄙曽亡當于千慮之一又性不能甘斶前躊躇亡適與語者第以敝帚故災木而存之是嵗六月旣朢平原劉世教識吳越故澤國也其於國賦則外府也在昔丁亥常一中於鴻水矣於時粟賈翔踊斛㡬二金殣殍塞塗疫癘駢踵郊野之間四望烟絶迄今談者猶為色動曾未二紀而霪霖復肆虐矣七郡膏壤一時遂為巨浸其未波者百不能一也有之則髙陵荒原不毛之瘠耳蓋視昔不啻倍己未魚之氓誠不能旦暮自必其命惟是遺穗未没而斛且及一金矣竊恐秋冬之交納稼之望已絶而待哺者且日益衆焉寧復知所底止哉輕餒死而重為辟介士之操也可概望之蚩蚩之衆乎其能無寒心也者今逺而遲來牟則十閲月而盈也又逺而遲新穀則嵗有五月而盈也人日不再食而餒七日而斃矣引西江以濡涸轍其能及否乎且非獨於此也大祲之後必有大札丁亥之己事可鑒也弱者轉溝壑強者散而流離焉勢所必不免也即幸而無死與徙而札且祟之即又幸而無及於札而力能縁南畮者鮮矣野不闢不能亡虞氓野不闢而賦無所自出不能亡虞國即復盡蠲賦以寛氓而氓實重困矣氓重困則不獨民受之是又不能亡虞國也故小潦小暵者一歳之祲也而大潦大暵者數嵗之祲也祲之小者竭賢有司之力而可辦乃若非常之祲則亦必有非常之舉而後濟自非朝廷沛德音發帑藏破拘攣之見越故常之規而能迓旣乖之天和収將渙之人心乎聞之患貴先防籌惟預定蒭蕘之賤廟議所不廢也爰借前箸籌之曰蠲曰賑曰糴曰賈曰禁賑之事八蠲以下並一凡十有二篇用備採擇蠲惟是七郡地不能當天下二十之一而賦乃㡬十之五六蓋豐嵗而力已竭矣矧兹千里為壑夭如之卉不可復得民旦夕捄死不暇安所得賦而輸之故蠲亦無賦不蠲亦無賦蠲則朝廷猶任其恩不則遂斂之怨矣蠲則吏得藉手以安集不則潰決而莫可支矣蠲則損之一嵗而嗣之入者固亡涯也不則徒據其虚名而意外之芽蘖且漸長矣等失賦耳孰與蠲之之為得哉顧此猶以利害言也夫寧有方千里之災民父子至不相保而聖明在上能不下哀痛之詔罷田租之入重計其安全而亟拯之溺乎謂國體何及今抗章力請凡今嵗額賦悉與蠲除有如小緩而司農之尺一下有司以期㑹從事即敲骨而椎之髓自二三巨室外烏能神運而鬼輸之哉且得賦而失民智者不以易也矧賦必不得而第以攖其心乎藉令喜亂樂禍之夫乘之而起事將有不可勝言者矣夫非不知司農之蓄方甚罄嵗入之不支出而九塞之需若灼眉也者顧民之顛隮極矣司農即告匱而水衡將作之儲可暫貸也問寺留署之蓄可稍括也甚而瓊林大盈之積鏹可特發也是國計非遂終詘也彼窮民者設不于朝廷請命而何所復之乎藉令主計者之持之也奈何則及兹稽天時請特使以行勘可乎夫非以使者之言能重于當道也又冠蓋之客從此而之長安者賁相望于道非不足于咨詢也蓋必如是而司農之後言塞耳蠲得請而賑之事可徐策也賑之一夫遇祲而賑蓋歴代之故事也其善不善視當其時與否耳猶之療疾然始病而藥藥未竟而霍然矣迫而投焉人重困而藥且倍矣濟不濟半矣若必俟其殆而後藥之則生氣薄而勢已亡及矣其濟者幸而不濟者常矣賑之先後胡以異此昔己丑冬吳越大暵朝廷特發三十萬金以省臣莅賑矣孑遺之氓實賴以全活而識者尚微謂其後時焉則丁亥之潦顛連泰甚而至是弗能支也然先是者嘗以御史大夫吳公時來議扣存漕粟之十三是雖未賑而粟則已幸留矣顧獨失之于其春而溝壑者無及耳今而議賑其必于獻嵗之春乎計入冬而粟且漸踊矣入春而且寖甚矣東作俶始時固不可失也顧今之潦非昔之潦也七郡之為州若邑凡四十有二而靡非壑也截長補短邑可得田百萬畝畝嵗穫粟二斛而贏是總之失八九千萬斛矣然往者京口滸墅之間百穀之舫無日夜不灌輸而南者蓋在豐嵗而已藉資于境外矣何者其生齒繁而土之毛不能給耳今待哺者若故而粟則已烏有矣即盡蠲兩都之供勢不能二十之一也將何策而可獨有大賑之而已夫賑之事有二曰金曰粟賑之所自出有三曰朝廷曰有司曰富家巨室夫朝廷待命者也有司則不待命矣富家巨室則又必待命于有司矣是其為富家巨室也者靡非有司也而其為有司也者又靡非朝廷也法則孰先請先覈有司之積貯而嗣請之朝廷而嗣風之富家巨室之慕義者可乎蓋有司之蓄無㡬即朝廷之大賚亦當有限勢必有所不逮也彼其休戚利害之與共孰有切于富家巨室也者而能秦越視哉試及今而亟圖之方春而徐賑焉將餒者藉以飽死者藉以生而耕者亦藉以耒已賑之二夫賑之自朝廷出者則曩之斥帑金是巳日者大倉之金錢匱大司農至仰屋歎驟而議賑金必不得之數也不再計而審矣藉令徼非常之恩而金非可食也亦安所得粟而易之即有之非巨室之滯穗則豪商之居積輕千里而來者耳勢且必大踊費金多而易粟寡寡予之而氓亡濟也多予之而帑不能堪也豈惟氓不能宿飽而于主計者先已坐困矣非策也則莫若截留漕粟便今夫豫章荆楚之漕艘獻春而入真州者尾相銜也其順流而下吳若越又甚便也請議截百萬分予兩地期以中春而集各聽設法行賑其他道路一切之費並計而歸之司農竊謂其便有七上不廢曠蕩之恩亦不致損度支鏹一民捷于得粟二國中粟驟益則賈必不大踊三當春耕時農有所藉四賑得其時民不致憊極而難拯五賑金則胥吏易緣為奸粟則差不便六漕卒終嵗道路暫而獲息肩且可稍殺其行糗七其便于賑金勢相百也而其得請于司農又不啻易也然而非百萬石不可何者今其委波濤者已不下八九千萬石矣即幸而得請亦僅僅百之一而差盈耳損之而所濟㡬何且以司農之折色例為金可五十萬其浮于己丑十不能七也然而道里之費與行糗之殺計亦已當其半矣況今之祲又不啻倍之昔也者天子方將南顧而痌瘝大司農仰承德意直振廩竭粟之不暇而寧靳此為是在力請之耳賑之三漕粟之請便矣然而事在獻嵗也失寧無遺穗計涉冬而罄耳能久枵其腹以待乎即不然而詎能取必于百萬也矧其虞于不給也將若之何則有郡國之積貯在往者固有成命矣曰以備不虞今獨非其時哉逺無復論自己丑迄今蓋二十年所矣日積而嵗累焉計當有陳陳而因者顧法久則弊生事久則蠧起其不能無牟漁勢也請一切覈以從事可乎其穀可賑也即其或為賈者可合一郡之所有而擇亷幹吏以逺市也又膠序之義畮巖邑以千計即下者猶以百計其嵗入固可按籍數積之數年而不億矣然而弊亦與之等其名若輸于民而實不出自民者可覈也其貌若斂于官而實不入于官者尤可覈也蓋膠庠原非錢穀之媒而慢藏終為誨盜之餌弊所從來久矣顧安得燭照而數計之乎昔人之論節儉曰無輕其毫釐今日之事何以異此第取盈于故額而姑寛三尺以比于弛刑之誼奚不可且有甚于此者下終嵗竭蹷以終事稍失期㑹而鞭笞待之矣然而堂亷遼絶問其所輸者何而終不能畧舉其概也上亦終嵗竭蹷以從事稍失期㑹而停罰隨之矣然而簿領殷凑問其所徵者何而亦不能縷舉其悉也徒令積猾巨奸蟊􅈮其間顛倒下上而屬厭焉非一日矣亦非一事矣夫寧知剜肉補創剔髓朘血而輸之者乃以填若曹亡當之壑哉詎惟此二端而已且謂二者之遂足以盡賑乎夫賑公事也兹其在公者也不先覈之在公而遽以風勵私室可乎賑之四蓋今之所最患而勢不能遏者不曰粟貴哉即厲禁抑之不得惟實有不貴之粟在使民左手予鏹而右絜之囊則龍㫁之子無所復用其巧將不禁而自平矣顧吾方欲為民請命而惴惴焉不能亡虞于不盡得重以郡國之拮据歴二十年而未知所儲蓄為㡬可全活者若而人公家之力概可見矣謂亡藉于富家巨室可乎夫中産而上故漸有餘粟矣今非若勸借者之擾也第稍令輸其所餘視市直而少損焉以市之窶人是于藏者初無大損而餒者不啻重受益矣薦紳先生夫孰無慕義之致此一時也當必有投袂而起者第無程以格而風之市義以自為德也可若夫素封之家請視其蓄而程之蓄不及三百石者聽五百石者二十而一千石者十而一二千石者十而一五三千石者十之二浮之十二而止官豫索其數而揭諸塗與衆共覈之敢有欺匿者令得亷實以告告有賞賞以匿之十一粟則仍藏于其家異日者以賈予主其匿而見告者沒其半以賑是所損者特不過意外横溢之賈而實未嘗少損于其質也且可以博義聲可以為德于鄉可以善完其所有一事而三善集焉詎惟無損抑亦重有利矣至于緇黄者流業已棄離一切何復擁厚貲以自汚即在彼教不能無禁矧其作奸蒐慝往往而是則財實為之請姑貰而概覈焉百石以下聽五百石以下微益之千石以上更益之何者彼固無所事此耳此非必盡粟也其藏穀者等獨慮夫拘攣之士不能亡泥于膠柱也夫死亡禍亂之日迫而必斤斤曰無動為擾焉不因噎而廢食哉且財非從地出也銅山金穴其始能亡掊剋而致者鮮矣是故吳越之間一小豪起而方數里之内靡非其屬厭之餘也一巨豪起而方數十里之内無不被之矣滿則必概天道固然兹固其全之之日也且昔之善聚斂者廣漢元寶之屬有一能自全者乎即齊奴元雍身都弁冕而何以卒不免也彼素封者而知之方將虞守鹵之難終規散之之不暇而尚區區滯穗之是靳也噫賑之五夫素封之家即有恒産而要之踐更輸輓其奔走于公家者亦甚繁且苦矣獨旅人之質庫不然其擁貲甚厚其朘利甚渥其經營又甚逸而名不挂版圖事不涉催科抑何其多倖甚也請極言之逺不暇援引姑以鹽論鹽自均甲以來田畝三百二十而役役稍重則破矣又重則蕩矣又甚則殺身者有之矣何者其最上腴不能及二千金而瘠者僅三四百金耳瘠無論上田嵗得粟可三百斛以三之一輸公家積十豐嵗而不能二千斛也賈當中金千然而十嵗中俯仰倚之矣公家之百需又倚之矣其能有贏焉鮮矣質庫不然其上者每至盈萬金即寡亦不下五六千是上者一而當沃壤之役田五六矣下者亦不啻三之其于瘠壤則上者遂三十而盈下者亦不啻十五六嵗以什一計而子錢之入可知也矧其二之而三之乎是質庫之最下者其一嵗之入已當上田之十嵗矣顧此則終嵗奔走而不給彼第髙枕卧而子母倍息矣未㡬子復為母而又息之矣其土著者人弓人得猶之乎楚也不則一襆載之而去闗譏之法未聞稅金遂令若曹據此全利即比者𣙜使出而始議及焉然僅僅嵗數金止耳是以富室鮮累世之産而質庫多百年之業當十嵗而更版圖一里之中慮無不易其三四甚且六七而質庫無論大小凡三年必益其一其甘苦利害較若列眉豈待智者而後辨哉莫非民也懸絶乃爾夫豐則朘其脂祲則乘其急而倍入焉且又坐視其溝壑也忍乎損有餘補不足天道人事固所宜然請計嵗以為之格嵗輸粟若干石以賑未及三嵗者勿輸輸至二十有五嵗而止逺勿論其有慕義好施至溢額者或旌其廬或錫之冠服官司以禮優異用示風勵此非獨便于窮民也於質庫亦大有利焉不然而民無所得食睊睊而睨其厚入也終能髙枕而偃有之乎抑是說也即無事時所不得置而弗議以任其尾閭而逝波者也矧此日也哉賑之六夫漕粟截矣積貯罄矣巨室之義糶廣矣質庫之樂輸者麕而集矣若是而賑不亦有藉哉惟是待哺之方衆也嵗月之方遙也無已則請推廣令甲之意而稍開拘攣之路可乎往兩宫三殿之鼎建與漕河之有事也當事者嘗首疏開納之議矣其鬻爵諸事弗論乃若輸金而入太學亡議亡之夫太學賢士藪蓋自聖祖以來翠華黄屋歴世所親莅而廣厲者也然猶得以輸金入今獨不可推之郡邑以濟一時之急乎請下令曰民間少年有文藝稍通願遊膠序者聽輸粟若干石備賑准補博士弟子候試試而異等如例敘補即或稍劣以六嵗故事寛之至九嵗踰期而試仍不前聽以冠服終或以諸生名入太學如是彼才者得自見即駑者亦冀倖全而應必夥矣顧得無以始進難之乎則太學又何異焉彼其取上第者累累也何傷乎其貲進也且天子尚不難収之太學而有司者何獨靳之膠序耶又往嵗督學使者嘗創之令矣凡入田膠宫者得以諸生入太學其諸生而入田者得超等而以餼稟入夫田猶有之粟奚不可餼廩猶可以田得而何獨難于其始階也且夫収一士而遂可以活數百千人是仁人者之所褰裳而前者也不然將亡乃重惜士而輕忍人之死乎異日者鬻爵之令下旦捐朽貫而夕疏仕籍儼然而被繡矣而乘軒矣其籧篨戚施而旅進退于郡邑之庭者亡論獨不有身列赤墀之下者乎其以視逢掖孰重輕焉是不可謂非賑之一策也賑之七鬻爵非古也有之自漢始乃若刑之有贖唐虞以降蓋世守之而周為甚其初第于鞭扑耳卒乃五刑皆用之故周禮荒政十有二而弛刑居一焉贖所從來非一日矣豈其亡當而代襲之為今即懸造士之令而邑可㡬千石乎竊以為贖可議也在制鬼薪城旦而下法得入粟以贖其重辟不然然嘉靖間島夷之難作軍興不給即大辟且及之矣請自今以前凡已讞而赦令所不原者並不得贖其他稍可矜疑許以贖論或衡其罪之重輕或權其力之豐嗇而衷之其自今以後迄于獻嵗之麥秋諸大辟如制外其他雜犯以下非力不能贖者悉以贖從事其罪稍重而力饒于貲非亡意者從刑故論勿贖罪稍薄而非有意者且力不任贖者從弛刑論勿贖贖以粟以穀勿以金其多寡視罪而微以力為軒輊計一笞贖而所活倍之矣一杖贖而所活更倍之矣若鬼薪以上則所贖一而所活者且十之而百千之矣於法初無大屈而于窮民則所濟博矣且三代已試之故事也宜若無不可然第其名為賑而贖之也者必其實為賑而用之者也夫寧有民之阽危如是而為之上者忍復計其他哉是二策者固非聖世之所宜有也第不得已而佐時之急可耳則所謂破拘攣之見者也然要之于令甲故亦無徑庭也賑之八審如是而賑之源辟已廣已請詳其事彼巨室之餘廩以義糶者非賑而賑者也法不必及春也時而昂昂而立斥以抑之可粟有餘日斥之亦可升可活二人日百石可活二萬人中邑倍之巨邑更倍之自十月迄四月而粟可計也第自升以上盈斗而止禁弗得多糴務使盡入于貧民之腹而毋令力可自活者與黠者得猥冒焉斯善矣若夫賑則難言哉往者籍具于里胥餒者不必籍籍者不必餒甚則一人耳而籍五六其姓名也又甚則五六其姓名未巳也至并其一人者而無之民莫得而質也官亦莫得而詰也不㡬于虚明詔蠧曠典乎哉兹將釐之其說有二其一曰擇人夫環一里之中寧無有饒于力而為衆所憑信者乎凡里之人其家之豐嗇丁之多寡必其所稔知者也擇一人焉俾司其事次者副之而令具籍焉胥第供筆札毋得上下其手籍既成復環數里之内擇其更饒而材者二人主且副之俾家至而覈焉其有未當者亟為釐正是謂擇賑之人其一曰覈丁夫賑以賑乏也無論不當賑者即不計其人之㡬何而等予之是寡者獲宿飽而衆者猶之乎餒也非法也請計丁以為率家十人者為上七人者為中四人者為下令籍者明疏之毋以幼稚入必若干嵗乃與復令覈者慎稽之是謂覈賑之丁于是合一邑之籍而計焉凡上丁家若干中及下各若干賑之粟可若干家可賑粟若干損其下者以益上者凡三等一以丁為差並計以授司者並出納畀之官親莅其地按籍以賑賑之時徧召里之人令得舉其失失三人有罰六人以上倍之十人以上並罰覈者其無失有賞竊謂是舉也其便凡六居同井里豐約多寡必不敢顛倒懸絶一也方賑時目屬于一方之衆即欲為欺罔不能亡憚于發露二也饑民無奔走期㑹之苦不致匍匐顛頓于道路三也粟皆入餒腹不致若往者之虚冒四也富者操籍與覈之柄情相聨絡窶人不致生他心五也富者即不無往來給散之勞而初無損其庾廩且令示德焉六也賑之便慮亡善于此者矣顧此為荒野言耳若夫城郭闗廂之間擇人而具之籍一佐貳之良者家至户到覈之而無難也抑古有為糜以食餒者意非不美也第其羣聚穢惡勢不能亡薰蒸疫癘之虞請姑以是待流民之亡籍者可乎誠于四郊之外擇寺觀之𢎞厰者遴緇黄以主之而官予之粟若器具且時稽察焉其善若事者即以其官官之計無有弗盡力者矣凡此第其大畧耳若夫斟酌損益講求盡善之策是在用之者矣糴蓋賑之力至是亦㡬竭矣而賑之粟終不能亡虞匱也行百里者半九十豈其奪之溝中而復委棄之也者于是乎有糴之事在曰官曰民必互用之而後可今郡國之帑即不至大饒然獨無餘鏹可暫發者乎即所當上輸而獨無可稍緩者在乎請括而斥之又集一郡之所有而計之擇佐領之強幹者二三人分領其事予之符繻及至西成之先或之豫章或之荆楚為移檄于所在而告糴焉返之日仍于彼索檄以報必明疏其價毋令得増益于間而為之蠧其能勤于事而潔亷無議者予上考甚者特薦而敘遷之粟則合其賈與舟楫之費而共計焉石為金㡬何分予諸邑使設法平市如賑之義糶法粟散于民金歸于帑便孰甚焉顧非獨粟可市也即菽麥亦奚不可者此糴之在官者然也若夫民間之逺市者計必不乏特不無道路之虞與闗市之阻耳今誠予之以符使亡虞于往來諸闗市悉不得以稅𣙜為名横有科擾迨其歸也悉聽以時價受直毋有減抑則願往者必衆而粟必充牣于市矣此糴之在民者然也糴于官者壹以原價糶以陰制猾牙狙獪之命而持其衡糴于民者聽以時價糶以明闢懋遷有無之路而通其權然有其在官者而民必不能過為之昻也又有其在民者而官又不必過虞其不能繼也故曰官與民互用之而以濟賑之不逮者此也賈等糴耳而胡其出之異耶官傾儲而致之邑必不能盈數千也不及旬而盡矣夫民也自非覬錙銖之潤而能驅之數千里之外以相灌輸乎且民之安土而重服賈莫此諸郡為甚其躡蹻而奮者鮮矣則所藉者亦惟是四境之外素習于商者耳彼其左顧右盼徵貴賤而權棄取𨽻首之所不能窮也今將鼓舞而招徠之使危舸巨艑稇載争前以紛集于吾土令官無告糴之勞民無炊玉之歎其何術而可則請斟酌于限賈之令而已蓋屬者商羊為政市價驟騰自非禁令之畫一勢且日益而未巳一時單窶之子其幸脫于立槁者非此令之力歟第一嵗之産止共一嵗之食今之所及禁者大都境内之粒多計秋盡而罄矣請自今亟著為令凡商賈以粟至者賈髙下悉聽民間時直官無所與若牙獪欺罔必重法勿宥夫非故昻之也物之不齊神聖所不能強而商賈之趨利則不啻若騖也惟毋抑其賈而粟之至者日益多矣粟之至者日益多又不必其抑之而自平矣即不然而厲禁之意非不仁也法非不善也彼慮夫數千里之僕僕而所獲之不償也必將有却步而不前者矣且夫生生者造化之大機也機不暫息則不能長動而出故物生之數有大虧無大贏今吳越之粟驟而淪胥者至八九千萬石是所謂大虧者也彼荆楚豫章之間即幸而有年其必不能大贏兹數明矣即殺而取足其半彼中詎能無稍踊也者而焉能遙㫁其質之必亷而遽限之哉惟獨計其來之繁則必不能大踊云爾曰有如踊也若之何曰郡國之有積貯也巨室之有義糶也質庫之有樂輸也官之有告糴也備之則已悉矣時出而抑之其何難之與有曰一市而二賈可乎曰官糶之為法也糴弗得過斗以飽窶夫也彼民之自為糶者多寡無制非矛盾也夫寧有棄亷而趨貴者乎且又不有賑之事在乎必如是而後足以濟官糴之窮也禁牧之去敗羣也耕之薙非種也夫豈不慈勢實使然今得無有不令之民藉口饑饉而輒肆其蠆尾也者有如上之人重愛其力而輕視其死亡則亦何辭之有乃今所極計而亟拯之者即令其自為慮曽不是過而能無去之而薙之乎請事制而坊之曰道路之禁凡一切周行畫地而戍五里一艘五艘一裨校十艘一偏校二十艘一都尉各警于其地毋令宵人得以竊發發則當其地者坐之發而匿者罰終月而無事則勞終半嵗則大勞或俾之事任曰荒野之禁卒伍追胥其人故非乏也第令嚴偵焉間有草竊攘奪能合其人而絏之者勞非追胥者倍即不能亟以告而窮治焉匿則罰匿而有所私重罰曰聚落之禁狹者艘一廣者倍之司以裨校其事若賞罰視荒野曰坊市之禁城郭之間干掫舊矣然特故事耳宜益申飭而加毖或殺其地而得以時及可夫如是不將有所加置而重糜糗哉曰非然也海艘之非汛而輟者不可庸乎其卒不可役乎即郭之内外不可令畫地而戍乎不費斗粟不増一人而尺地無弗嚴矣然此第為探囊胠篋者備耳夫氛祲者明聖之所憂而奸雄之所幸者也今之民非昔之民矣逺弗及見即遡之十嵗前而何其澆之甚哉重以比者廟堂之上百廢百敝豈其草野之氓人盡聾瞶寧獨無占風角習䜟緯若唐之巢宋之臘也者窺伺于其間乎無之宗社之靈也即萬一有之非藿食者所敢深言也荒政叢書卷六
