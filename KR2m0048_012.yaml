body:
  text: 荒政叢書附錄下湖廣布政司叅議俞森撰捕蝗集要一王禎農書言蝗不食芋桑與水中菱芡或言不食菉豆豌豆豇豆大麻􅔾麻芝麻薯蕷呉遵路知蝗不食豆苗廣收豌豆敎民種植次年三四月民大獲其利一飛蝗見樹木成行或旌旗森列每翔而不下農家多用長竿挂紅白衣裙羣逐之亦不下也又畏金聲砲聲聞之遠舉鳥銃入鐵砂或稻米擊其前行前行驚奮後者隨之去矣一用稈草灰石灰等分細末篩羅禾稻之上蝗即不食一蝗最難死初生如蟻之時用竹作搭非惟擊之不死且易損壞宜用舊皮鞋底或草鞋舊鞋之類蹲地摑搭應手而斃且狹小不傷損苖種一張牛皮可裁數十枚散與甲頭復收之一蝗在麥田禾稼深草中者每日侵晨盡聚草梢食露體重不能飛躍宜用筲箕栲栳之屬左右抄掠傾入布袋蒸焙泡煮隨便或掘坑焚火傾入其中若只瘞埋隔宿多能穴地而出一蝗有在光地者宜掘坑於前長濶為佳兩旁用板及門扇接連八字擺列集衆發喊推門捍逐入坑又於對坑用掃帚十數把見其跳躍而上者盡行掃入覆以亁草發火焚之然其下終是不死須以土壓之過宿方死一燒蝗法掘一坑深廣約五尺長倍之下用亁茅草發火正炎將袋中蝗傾入坑中一經火氣無能跳躍詩云秉畀炎火是也一捕蝗不可差官下鄉一行人從蠶食里正里正又只取之民户未見捕蝗之利先被捕蝗之擾蹂踐田舎民不聊生然小民多愚愚者必惰非官督率不能踴躍且必彼村此集合力驅捕一人惰則衆勤者皆阻故必遣官董事惟以亷謹者充選一附郭鄉村即印刷捕蝗法作手榜告示每米一升換蝗一斗不問婦人小兒携到即時交支如此則回環數十里内者可盡捕得蝗種一升者給米一升則捕蝗種者多後之生而為害者必少矣又萬厯四十四年御史過庭訓山東賑饑䟽捕蝗男婦皆饑餓之人如一面捕蝗一面歸家喫飯未免稽遲時候遂向市上買現成麺做餅擔至有蝗去處不論遠近大小男婦但能捉得蝗蟲與蝗子一升者換餅三十個又查得崮山隣近兩厰領糧饑民一千二百名可乘機撥用即傳告示云朝廷自去年十一月養爾等饑民使免於逃死當知報効今蝗蟲生發正爾等報効之日也自今以後能將近地蝗蟲或蟲子捕得半升者方給米麺一升為五日之糧如無不許准給一嚴督保甲使知不可不捕然其要法只在不惜常平義倉榖米博换蝗蟲雖不驅之使捕而四遠自輻輳矣倘或尅減邀勒則捕者氣阻一元仁宗皇慶二年復申秋耕之令蓋秋耕之利掩陽氣於地中蝗蝻遺種翻覆壞盡次年所種必盛於常禾一蝗災之時最盛於夏秋之間與百榖長養成熟之時正相值也故為害最廣小民遇此乏絶最甚若二三月蝗者是去歲之種蝗非蟄蝗也聞之老農言蝗初生如粟米數日旋大如蠅能跳躍羣行是名為蝻又數日即羣飛是名為蝗所止之處喙不停嚙又數日孕子於地矣地下之子十八日復為蝻蝻復為蝗如是傳生害之所以廣也秋月下子者則依附草木枵然枯朽非能蟄藏過冬也然秋月下子者十有八九而災於冬春者百止一二則三冬之候雨雪所摧損滅者多矣其自四月以後而為災者皆本歲之初蝗非遺種也故詳其所自生與其所自滅可得殄絶之法矣一蝗有蒸變而生者有延及而生者故蝗生之地必於大澤之涯然洞庭彭蠡具區之旁終古無蝗也必也驟盈驟涸之處如幽涿以南長淮以北青兖以西梁宋以東諸郡之地湖漅廣衍暵溢無常謂之涸澤蝗則生之故徐光啓以為蝦子江以南多大水而無蝗蓋湖漅積瀦水草生之南方水草農家多取以壅田就不其然而湖水常盈草恒在水蝦子附之則復為蝦而已北方之湖盈則四溢草隨水上迨其既涸草畱涯際蝦子附於草間既不得水春夏鬱蒸乘濕熱之氣變為蝗蝻其勢然也故知蝗生於蝦蝦子之為蝗則因於水草之積也故宜令凡地方有湖蕩􅞇窪積水之處遇霜降水落之後即親臨勘視本年潦水所至到今水涯有水草存積即多集夫衆侵水芟刈斂置高處風戾日曝待其亁燥以供薪燎如不堪用就地焚燒務求净盡春夏之月居民於湖􅞇中捕得子蝦一石減蝗百石亁蝦一石減蝗千石但令民通知此理當自為之不煩告戒矣光啓又言見傍湖居民言蝗初生時最易撲治宿昔變異便成蝻子散漫跳躍勢不可遏治之者宜於每年十月州縣官廵視境内有蝗蟲遺子之地多方設法除之蓋蝗蟲遺子必擇堅垎黑土高亢之處用尾栽入土中下子深不及一寸仍畱孔竅且同生而羣飛羣食其下子必同時同地勢如蜂窼易尋覔也一蝗所下十餘形如豆粒中止白汁漸次充實因而分顆一粒中即有細子百餘或云一生九十九子不然也夏月之子易成八月内遇雨則爛壊否則至十八日生蝻矣冬月之子難成至春而後生蝻故遇臘雪春雨則爛壊不成亦非能入地千尺也此種傳生一石可至千石故冬月掘除尤為急務且農力方閑可以從容搜索官司即以數石粟易一石子猶不足惜苐得子有難易受粟宜有等差且念其衝冐嚴寒尤應厚給使民樂趨其事可矣一捕蝗宜重其事嚴其法昔宋淳熙勅諸蟲蝗初生若飛落地主鄰人隠蔽不言耆保不即時申舉撲除者各杖一百許人告報當職官承報不受理及受理而不即親臨撲除或撲除未盡而妄申盡净者各加二等諸官司荒田牧地經飛蝗住落處令佐應差募人取掘蟲子而取不盡因致次年生發者杖一百諸蝗蟲生發飛落及遺子而撲掘不盡致再生發者地主耆保各杖一百諸給散捕取蟲蝗榖而減尅者論如吏人鄉書手攬納税受乞財物法諸係工人因撲掘蟲蝗乞取人户財物者論如重祿工人因職受乞法諸令佐遇有蟲蝗生發雖已差出而不離本界者若緣蟲蝗論罪并在任法又詔因穿掘打撲損苗種者除其税仍計價官給地主錢數母過一頃此外復有二法一曰以粟易蝗晉天福七年命百姓捕蝗一斗以粟一斗償之此類是也一曰食蝗唐貞元元年夏蝗民蒸蝗暴亁颺去翅足而食之如此則蝗雖遺種不致發生即發生或延及亦不患蔓衍矣荒政叢書附錄下
